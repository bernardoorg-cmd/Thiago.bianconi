<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weiku TEC — PCP</title>
<!-- ajuste: conclusão produtiva em Baixar Intranet + efetividade por período produtivo -->

<!-- Firebase SDK v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- SheetJS para Excel export/import -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- PDF.js para leitura de PDF de fabricação -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* ============================================================ RESET & VARS */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--sur:#ffffff;--sur2:#f8f8f8;--bor:#dcdcdc;
  --acc:#c9a96e;--txt:#1a1a1a;--mut:#8a8fa8;
  --ph:#1e5a3a;--ph2:#174d31;
  --pexp:#e07b1a;--pconcl:#2d8a4e;--pcoleta:#2a8080;
  --pbor:#c8d0c8;--prow2:#f0f4f0;
  --dan:#e05c5c;--war:#e8a44a;--ok:#4ecdc4;
}
html,body{height:100%;background:var(--bg);color:#1a1a1a;font-family:Arial,sans-serif;font-size:12px}

/* ============================================================ LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)}
.login-card{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:36px 30px;width:100%;max-width:400px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.login-field input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:10px 12px;color:var(--txt);font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.login-field input:focus{border-color:var(--acc)}
.btn-login{width:100%;padding:12px;background:var(--acc);border:none;border-radius:8px;color:#1a1209;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-login:hover{opacity:.9}
.login-err{display:none;background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.4);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--dan);margin-bottom:14px}
.login-loading{display:none;text-align:center;padding:12px;font-size:12px;color:var(--mut)}

/* ============================================================ APP LAYOUT */
.app-wrap{display:flex;height:100vh;overflow:hidden}
.sidebar{width:195px;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .22s ease, opacity .22s ease}
.app-wrap.sidebar-collapsed .sidebar{margin-left:-195px;opacity:0;pointer-events:none}
.app-wrap.sidebar-collapsed .main-area{width:100%}
.sb-logo{padding:16px;border-bottom:1px solid var(--bor)}
.sb-mark{font-size:18px;font-weight:700;color:var(--acc);letter-spacing:2px}
.sb-sub{font-size:9px;color:var(--mut);letter-spacing:1.2px;text-transform:uppercase;margin-top:3px}
.sb-sec{font-size:9px;color:var(--mut);padding:11px 16px 3px;text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--mut);font-size:12px;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--sur2);color:var(--txt)}
.nav-item.active{color:var(--acc);border-left-color:var(--acc);background:rgba(201,169,110,.08);font-weight:700}
.sb-sec-toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none}
.sb-sec-toggle:hover{color:var(--txt);background:var(--sur2)}
.sb-sec-toggle.open{color:var(--acc);font-weight:700}
.sb-chevron{font-size:10px;color:var(--mut)}
.nav-group{display:none;padding-bottom:4px}
.nav-group.open{display:block}
.nav-group .nav-item{padding-left:22px}
.sb-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--bor)}
.sb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.logout-btn{display:flex;align-items:center;gap:6px;padding:6px 0;margin-top:9px;cursor:pointer;font-size:11px;color:var(--mut)}
.logout-btn:hover{color:var(--dan)}
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;transition:width .22s ease}
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* ============================================================ TABELA PLANILHA */
.sheet-toolbar{display:flex;align-items:center;gap:7px;padding:9px 13px;background:#fff;border-bottom:2px solid var(--pbor);flex-wrap:wrap;flex-shrink:0}
.sheet-title{font-size:13px;font-weight:700;color:var(--ph)}
.sBtn{padding:5px 11px;border-radius:4px;border:1px solid #bbb;background:#fff;font-size:11px;cursor:pointer;font-family:Arial;color:#333;transition:background .15s;white-space:nowrap}
.sBtn:hover{background:#f0f0f0}
.sBtn.green{background:var(--ph);color:#fff;border-color:var(--ph);font-weight:700}.sBtn.green:hover{background:var(--ph2)}
.sBtn.teal{background:var(--pcoleta);color:#fff;border-color:var(--pcoleta);font-weight:700}.sBtn.teal:hover{opacity:.9}
.sBtn.orange{background:var(--pexp);color:#fff;border-color:var(--pexp);font-weight:700}.sBtn.orange:hover{opacity:.9}
.sBtn.red{border-color:#cc2222;color:#cc2222}.sBtn.red:hover{background:#fff5f5}
.sInput{background:#fff;border:1px solid #bbb;border-radius:4px;padding:5px 9px;font-size:11px;color:#333;outline:none;font-family:Arial}
.sInput:focus{border-color:var(--ph)}
.sSel{background:#fff;border:1px solid #bbb;border-radius:4px;padding:5px 7px;font-size:11px;color:#555;outline:none;cursor:pointer;font-family:Arial}
.urp-total{background:var(--ph);color:#fff;padding:4px 11px;border-radius:4px;font-weight:700;font-size:11px;white-space:nowrap}
.tbl-outer{overflow:auto;flex:1}
table.sheet{width:100%;border-collapse:collapse;min-width:1740px;font-size:11px}
table.sheet thead th{padding:7px 7px;font-weight:700;white-space:nowrap;text-align:center;border:1px solid #999;font-size:10px;position:sticky;top:0;z-index:3}
table.sheet thead th.th-main{background:var(--ph);color:#fff}
table.sheet thead th.th-exp{background:var(--pexp);color:#fff}
table.sheet thead th.th-concl{background:var(--pconcl);color:#fff}
table.sheet thead th.th-coleta{background:var(--pcoleta);color:#fff}
table.sheet tbody td{padding:5px 7px;border:1px solid var(--pbor);vertical-align:middle;white-space:nowrap;text-align:center}
table.sheet tbody tr:nth-child(even) td{background:#f0f4f0}
table.sheet tbody tr:nth-child(odd) td{background:#fff}
table.sheet tbody tr:hover td{background:#d8edd8!important}
.drag-col{width:30px;min-width:30px}
.drag-handle{cursor:grab;color:#888;font-size:14px;line-height:1;display:inline-block;padding:2px 4px;border-radius:4px}
.drag-handle:hover{background:#e9ecef;color:#555}
tr.dragging{opacity:.45}
tr.drag-over-top td{box-shadow:inset 0 2px 0 var(--ph)}
tr.drag-over-bottom td{box-shadow:inset 0 -2px 0 var(--ph)}
.reorder-hint{font-size:10px;color:#777;margin-left:2px}
.reorder-hint.warn{color:#cc6600;font-weight:700}
/* Column drag */
th.col-dragging{opacity:.4}
th.col-drag-over{box-shadow:inset -3px 0 0 var(--acc)}
th[draggable="true"]{cursor:grab;user-select:none}
th[draggable="true"]:active{cursor:grabbing}

/* Editable cells */
.editable-cell{cursor:pointer;position:relative}
.editable-cell:hover::after{content:'✎';position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:9px;color:#aaa}
.inline-edit{width:100%;border:1px solid var(--ph);border-radius:3px;padding:2px 4px;font-size:11px;font-family:Arial;outline:none;background:#fff}
.urp-selectable{cursor:pointer;user-select:none;transition:all .15s}
.urp-selectable:hover{background:#eef7ee!important}
.urp-selected{background:#d9f2dc!important;box-shadow:inset 0 0 0 2px var(--ph)}
.cor-badge{display:inline-block;width:22px;height:22px;border-radius:50%;border:2px solid #999;vertical-align:middle}
.setor-exp{background:var(--pexp);color:#fff;padding:2px 6px;border-radius:3px;font-weight:700;font-size:10px;display:inline-block}
.setor-other{background:#555;color:#fff;padding:2px 6px;border-radius:3px;font-size:10px;display:inline-block}
.pr-normal{color:#1a5a2a;font-weight:700}.pr-prior{color:#cc6600;font-weight:700}.pr-atras{color:#cc0000;font-weight:700}

/* ============================================================ DASHBOARD */
.dash-inner{padding:18px;flex:1;overflow-y:auto;background:#f5f5f5}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi-card{background:#fff;border-radius:8px;padding:14px;text-align:center;border-top:4px solid;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:700;color:#555}
.kpi-val{font-size:26px;font-weight:700}
.kpi-sub{font-size:10px;margin-top:3px;color:#888}
.kpi-card.kpi-inf{border-color:var(--ph)}.kpi-card.kpi-inf .kpi-val{color:var(--ph)}
.kpi-card.kpi-war{border-color:var(--pexp)}.kpi-card.kpi-war .kpi-val{color:var(--pexp)}
.kpi-card.kpi-dan{border-color:#cc2222}.kpi-card.kpi-dan .kpi-val{color:#cc2222}
.kpi-card.kpi-ok{border-color:var(--pconcl)}.kpi-card.kpi-ok .kpi-val{color:var(--pconcl)}
.kanban-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:0}
.k-col{background:#fff;border:2px solid var(--ph);border-radius:8px;padding:10px;text-align:center}
.k-title{font-size:10px;font-weight:700;color:var(--ph);text-transform:uppercase;margin-bottom:5px}
.k-cnt{font-size:24px;font-weight:700;color:var(--ph)}
.k-urp{font-size:10px;color:#888;margin-top:2px}
.prazo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prazo-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.prazo-card-hdr{font-size:11px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid}
.pitem{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:11px}
.pitem:last-child{border-bottom:none}

.dash-top-wrap{display:grid;grid-template-columns:1.45fr .75fr;gap:12px;margin-bottom:14px}
.dash-kanban-card,.dash-alert-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.dash-alert-stack{display:grid;grid-template-rows:1fr 1fr;gap:12px}
.dash-kanban-card .kanban-grid{grid-template-columns:repeat(5,minmax(110px,1fr))}
.dash-main-grid{display:grid;grid-template-columns:minmax(270px,.58fr) minmax(900px,2.42fr);gap:12px;align-items:start}
.dash-controls-card,.dash-chart-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.dash-controls-card .meta-prod-kpis{grid-template-columns:repeat(2,1fr)}
.dash-controls-card .meta-prod-stats{grid-template-columns:repeat(2,1fr)}
.dash-quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.dash-quick-grid .meta-stat{padding:10px}
.dash-chart-card .meta-chart-wrap{margin-top:0;min-height:560px;height:100%}
.dash-chart-card .meta-svg{height:560px}
.meta-hover-band{fill:transparent;cursor:crosshair}
.dash-controls-card .meta-prod-kpi{padding:10px}
.dash-controls-card .meta-prod-kpi .val{font-size:19px}
.dash-controls-card .meta-prod-kpi .sub{font-size:9px;line-height:1.25}
.dash-controls-card .meta-stat .n{font-size:15px}
.dash-chart-note{font-size:11px;color:#74808a;margin-top:4px}
.efet-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f7f9fb;border:1px solid #dde4ea;border-radius:8px;padding:9px 10px;margin-top:10px}
.efet-chip .l{font-size:10px;text-transform:uppercase;color:#6b7680;font-weight:700}
.efet-chip .v{font-size:18px;font-weight:800;color:var(--ph)}
.efet-chip .s{font-size:10px;color:#7a8691}
.efet-badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:800;color:#fff;white-space:nowrap}
.efet-ruim{background:#d63b3b}.efet-regular{background:#d1a000}.efet-bom{background:#2d8a4e}.efet-muito-bom{background:#117a65}.efet-neutral{background:#6b7680}

/* ============================================================ DASHBOARD META X PRODUÇÃO */
.meta-prod-wrap{display:grid;grid-template-columns:1.25fr .75fr;gap:12px;margin-bottom:16px}
.meta-prod-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px}
.meta-prod-title{font-size:14px;font-weight:700;color:var(--ph);margin-bottom:10px}
.meta-prod-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-bottom:12px}
.meta-prod-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.meta-prod-kpi{border-radius:8px;padding:14px;color:#fff;border:1px solid rgba(0,0,0,.08)}
.meta-prod-kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;opacity:.95;margin-bottom:6px}
.meta-prod-kpi .val{font-size:26px;font-weight:700;line-height:1.1}
.meta-prod-kpi .sub{font-size:11px;opacity:.92;margin-top:4px}
.meta-kpi-orange{background:#ef7d00}
.meta-kpi-green{background:#00c93a}
.meta-kpi-blue{background:#456f8a}
.meta-kpi-red{background:#f3150f}
.meta-kpi-yellow{background:#d1a000;color:#fff}
.meta-prod-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.meta-stat{background:#f8f8f8;border:1px solid #e6e6e6;border-radius:6px;padding:10px}
.meta-stat .l{font-size:10px;text-transform:uppercase;color:#777;font-weight:700}
.meta-stat .n{font-size:18px;font-weight:700;color:var(--ph);margin-top:2px}
.meta-prod-side{display:flex;flex-direction:column;gap:12px}
.meta-chart-wrap{margin-top:12px;background:linear-gradient(180deg,#fbfbfb 0%,#f4f6f8 100%);border:1px solid #e4e7ea;border-radius:10px;padding:12px}
.meta-chart-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.meta-chart-title{font-size:12px;font-weight:700;color:#506070;text-transform:uppercase;letter-spacing:.4px}
.meta-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#5d6770}
.meta-legend span{display:inline-flex;align-items:center;gap:6px}
.meta-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.meta-svg{width:100%;height:340px;display:block}
.meta-axis-label{fill:#6f7b86;font-size:10.5px;font-weight:600}
.meta-grid{stroke:#e8edf2;stroke-width:1}
.meta-grid-v{stroke:#f3f5f7;stroke-width:1}
.meta-line-meta{fill:none;stroke:#ff5a52;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 3px rgba(255,90,82,.18))}
.meta-line-prod{fill:none;stroke:#18b45b;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 3px rgba(24,180,91,.16))}
.meta-area-prod{fill:url(#prodGrad);opacity:.20}
.meta-point-meta{fill:#fff;stroke:#ff5a52;stroke-width:2}
.meta-point-prod{fill:#fff;stroke:#18b45b;stroke-width:2}
.meta-hover-band{fill:transparent}
.meta-hover-band:hover{fill:rgba(22,150,240,.06)}
.meta-marker-hoje{stroke:#9ec400;stroke-width:1.5;stroke-dasharray:4 4}
.meta-marker-semana{stroke:#1696f0;stroke-width:1.2;stroke-dasharray:3 5}
.meta-badge{fill:#ffffff;stroke:#dce4ea}
.meta-badge-text{fill:#4c5a67;font-size:10px;font-weight:700}
.meta-tooltip-bg{fill:#13202b;opacity:.96}
.meta-tooltip-text{fill:#fff;font-size:10.5px;font-weight:700}
.meta-axis-label{font-size:10px;fill:#6b7280;font-weight:700}
.meta-grid{stroke:#d8dde3;stroke-width:1}
.meta-grid-v{stroke:#edf0f3;stroke-width:1}
.meta-line-meta{stroke:#ff3b30;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.meta-line-prod{stroke:#00c93a;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.meta-area-prod{fill:rgba(0,201,58,.16)}
.meta-point-meta{fill:#ff3b30}
.meta-point-prod{fill:#00c93a}
.meta-marker-hoje{stroke:#9ec400;stroke-width:3}
.meta-marker-semana{stroke:#1696f0;stroke-width:3}
.meta-badge{fill:#30333a}
.meta-badge-text{fill:#fff;font-size:10px;font-weight:700}
@media (max-width:1200px){
  .dash-top-wrap,.dash-main-grid{grid-template-columns:1fr}
  .dash-chart-card .meta-chart-wrap{min-height:420px}
  .dash-chart-card .meta-svg{height:420px}
}
@media (max-width:1100px){
  .meta-prod-wrap{grid-template-columns:1fr}
  .meta-prod-kpis,.meta-prod-stats,.dash-controls-card .meta-prod-kpis,.dash-controls-card .meta-prod-stats{grid-template-columns:1fr 1fr}
  .dash-kanban-card .kanban-grid{grid-template-columns:repeat(3,minmax(110px,1fr))}
}
@media (max-width:900px){
  .meta-svg{height:260px}
  .kpi-grid,.prazo-grid,.dash-alert-stack,.dash-quick-grid{grid-template-columns:1fr}
}
@media (max-width:700px){
  .meta-prod-kpis,.meta-prod-stats,.dash-controls-card .meta-prod-kpis,.dash-controls-card .meta-prod-stats,.dash-kanban-card .kanban-grid,.kpi-grid{grid-template-columns:1fr}
}



/* ============================================================ DASHBOARD QUALIDADE - LAYOUT NOVO */
.qualidade-grid{display:grid;grid-template-columns:minmax(620px,1.65fr) minmax(360px,.95fr);gap:12px;align-items:stretch;margin-bottom:12px}
.qualidade-right{display:grid;grid-template-rows:1fr 1fr;gap:12px}
.qualidade-bottom{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qualidade-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.qualidade-line-card{min-height:430px}.qualidade-line-card svg{height:335px}.qualidade-meta-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;display:flex;align-items:end;gap:8px;flex-wrap:wrap}
.qualidade-fit{height:100%;overflow:hidden!important;padding:8px!important}
.qualidade-fit .kpi-grid{gap:8px;margin-bottom:8px!important}
.qualidade-fit .kpi-card{padding:8px 10px;border-radius:8px}
.qualidade-fit .kpi-lbl{font-size:9px;margin-bottom:2px}
.qualidade-fit .kpi-val{font-size:22px;line-height:1.05}
.qualidade-fit .kpi-sub{font-size:9px;margin-top:2px}
.qualidade-fit .qualidade-meta-card{padding:7px 9px;margin-bottom:8px}
.qualidade-fit .qualidade-grid{grid-template-columns:minmax(620px,1.72fr) minmax(340px,.9fr);gap:8px;margin-top:8px!important;margin-bottom:8px;height:calc(100vh - 485px);min-height:300px}
.qualidade-fit .qualidade-right{gap:8px;min-height:0}
.qualidade-fit .qualidade-bottom{gap:8px;height:260px;min-height:240px}
.qualidade-fit .qualidade-card{padding:9px 10px;border-radius:8px;min-height:0}
.qualidade-fit .qualidade-line-card{min-height:300px;display:flex;flex-direction:column}
.qualidade-fit .qualidade-line-card > div:last-child{flex:1;display:flex;flex-direction:column}
.qualidade-fit .qualidade-line-card svg{height:calc(100vh - 585px)!important;min-height:230px;flex:1}
.qualidade-fit .qualidade-bottom .qualidade-card{overflow:hidden}
.qualidade-fit .qualidade-bottom svg{height:210px!important;max-height:210px!important}
.qualidade-fit .meta-prod-title{font-size:12px;margin-bottom:4px}
.qualidade-fit .dash-chart-note{font-size:9px;margin-top:2px}
.qualidade-fit .meta-stat{padding:7px}
.qualidade-fit .meta-stat .l{font-size:8.5px}
.qualidade-fit .meta-stat .n{font-size:15px}
.qualidade-fit .mfl label{font-size:9px}
.qualidade-fit .mfl input{padding:5px 7px;font-size:11px}
@media(max-width:1200px){.qualidade-grid,.qualidade-bottom{grid-template-columns:1fr}.qualidade-right{grid-template-rows:auto auto}}

@media (max-width:1400px){
  .dash-top-wrap,.dash-main-grid{grid-template-columns:1fr!important}
}

.dash-chart-card,.dash-kanban-card,.dash-alert-card,.prazo-card{height:100%;display:flex;flex-direction:column}

.mfl input,.mfl select,.mfl textarea{width:100%;background:#f8f8f8;border:1px solid #ccc;border-radius:4px;padding:8px 10px;font-size:12px;outline:none;font-family:Arial;color:#333;transition:border-color .15s}

.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #eee;flex-wrap:wrap}
.mBtn{padding:8px 18px;border-radius:4px;border:1px solid #ccc;background:#fff;font-size:12px;cursor:pointer;font-family:Arial;color:#333;transition:background .15s;white-space:nowrap}

.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12px;margin-bottom:14px}
.det-item label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:2px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:#aaa;margin:12px 0 6px;letter-spacing:.5px}
.info-box{background:#e8f5e8;border:1px solid var(--pconcl);border-radius:4px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:var(--ph);display:flex;align-items:center;gap:8px}
.warn-box{background:#fff8e0;border:1px solid var(--pexp);border-radius:4px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#cc6600;display:flex;align-items:center;gap:8px}

/* Import preview table */
.import-preview{max-height:200px;overflow:auto;font-size:10px;margin:10px 0}
.import-preview table{border-collapse:collapse;width:100%}
.import-preview th{background:#1e5a3a;color:#fff;padding:4px 6px;border:1px solid #999;position:sticky;top:0}
.import-preview td{padding:3px 6px;border:1px solid #ddd}
.import-preview tr:nth-child(even) td{background:#f5f5f5}
.import-ok{color:var(--ph);font-weight:700}
.import-err{color:#cc2222;font-weight:700}

/* Spinner */
.spinner{width:20px;height:20px;border:3px solid #ddd;border-top-color:var(--ph);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px}
.toast.show{opacity:1}
.toast.ok{border-left:4px solid var(--pconcl)}
.toast.err{border-left:4px solid #cc2222}
.toast.info{border-left:4px solid var(--pexp)}

/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,.85);z-index:99998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay .msg{color:var(--txt);font-size:14px}

/* ============================================================ IMPRESSÃO */
@media print{
  html,body{background:#fff!important;height:auto!important}

  /* Ocultar sidebar, navegação e todos os controles */
  .sidebar{display:none!important;margin-left:0!important}
  .sheet-toolbar .sBtn,.sheet-toolbar .sInput,.sheet-toolbar .sSel,
  .sheet-toolbar .reorder-hint,.sheet-toolbar .urp-total + .sBtn,
  .logout-btn,.sb-footer,.sb-logo,.sb-sec,.nav-item,.toast,.loading-overlay,
  .ped-more,.ped-action-cluster,.ped-search,.ped-chip-row,.ped-view-chip,
  details,summary,.ped-fdrop-btn,.ped-fdrop-menu{display:none!important}

  /* Layout sem sidebar */
  .app-wrap{display:block!important}
  .main-area{width:100%!important;flex:none!important;display:block!important;overflow:visible!important;height:auto!important}
  .app-wrap,.page,.tbl-outer{display:block!important;overflow:visible!important;height:auto!important}
  .page{display:block!important}

  /* Toolbar */
  .sheet-toolbar{border:none!important;padding:4px 0 6px 0!important;background:#fff!important}
  .ped-toolbar{background:#fff!important;border:none!important;padding:0!important;box-shadow:none!important}
  .sheet-title,.ped-title{font-size:13px!important;color:#000!important;font-weight:700!important}

  /* Pills de status */
  .ped-status-strip{display:flex!important;flex-wrap:wrap!important;overflow:visible!important;gap:8px!important;padding:6px 0 8px 0!important;border-bottom:1px solid #ccc!important;margin-bottom:6px!important;background:#fff!important}
  .ped-status-pill{display:flex!important;flex-direction:column!important;align-items:center!important;min-width:0!important;padding:4px 10px!important;border:1px solid #ccc!important;border-radius:6px!important;box-shadow:none!important;page-break-inside:avoid!important}
  .ped-status-pill .l{display:block!important;font-size:7px!important;text-transform:uppercase!important;letter-spacing:.4px!important;color:#555!important;font-weight:800!important;white-space:nowrap!important}
  .ped-status-pill .v{font-size:13px!important;font-weight:900!important;line-height:1.1!important}

  /* Tabela */
  .tbl-outer{overflow:visible!important;height:auto!important}
  table.sheet{min-width:0!important;width:100%!important;table-layout:fixed!important;font-size:7.5px!important;border-collapse:collapse!important}
  table.sheet thead th{padding:3px 2px!important;font-size:6.5px!important;white-space:normal!important;word-break:break-word!important;line-height:1.15!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;position:static!important}
  table.sheet tbody td{padding:3px 2px!important;font-size:7px!important;white-space:normal!important;overflow-wrap:anywhere!important;word-break:break-word!important;line-height:1.2!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  table.sheet thead{display:table-header-group}
  table.sheet tbody tr{page-break-inside:avoid}
  .drag-col,.acoes-col{display:none!important}

  /* Coluna Localização — badge compacto */
  table.sheet td:nth-child(11) span{max-width:40px!important;font-size:6.5px!important;padding:2px 2px!important;line-height:1.1!important}
  /* Coluna Cor pedido — só a bola SVG */
  table.sheet td:nth-child(17){text-align:center!important;padding:2px!important}
  table.sheet td:nth-child(17) svg{width:14px!important;height:14px!important}

  .cor-badge{width:12px!important;height:12px!important}

  /* Página A4 paisagem */
  @page{size:A4 landscape;margin:8mm 6mm}
}

/* ── INVENTÁRIO ──────────────────────────────────────────── */
.inv-inner{padding:20px 24px;flex:1;overflow-y:auto;background:#f5f7f5}
.inv-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.inv-title{font-size:20px;font-weight:800;color:var(--ph)}
.inv-sub{font-size:11px;color:#888;margin-top:3px}
.inv-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.inv-kpi{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px;border-top:4px solid var(--ph)}
.inv-kpi .l{font-size:9px;text-transform:uppercase;font-weight:800;color:#888;letter-spacing:.4px}
.inv-kpi .v{font-size:24px;font-weight:800;color:var(--ph);line-height:1.1;margin-top:2px}
.inv-kpi .s{font-size:10px;color:#aaa;margin-top:2px}
.inv-section{background:#fff;border:1px solid #e0e4e0;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.inv-section-title{font-size:13px;font-weight:800;color:var(--ph);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.inv-mat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.inv-mat-card{border:1px solid #ddd;border-radius:8px;padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.inv-mat-card:hover{border-color:var(--ph);background:#f0faf0}
.inv-mat-card.done{border-color:#2d8a4e;background:#f0faf4}
.inv-mat-card.divergente{border-color:#e8a44a;background:#fffbf0}
.inv-mat-card .mat-icon{font-size:28px;margin-bottom:6px}
.inv-mat-card .mat-nome{font-size:13px;font-weight:800;color:#333}
.inv-mat-card .mat-stat{font-size:11px;color:#888;margin-top:3px}
.inv-mat-card .mat-badge{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:999px;font-size:10px;font-weight:800}
.inv-hist-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.inv-hist-row:last-child{border-bottom:none}

/* Tela de contagem */
.inv-count-wrap{display:flex;flex-direction:column;height:100%;background:#f5f7f5}
.inv-count-header{background:var(--ph);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.inv-count-title{font-size:15px;font-weight:800}
.inv-count-sub{font-size:10px;opacity:.8;margin-top:2px}
.inv-count-tbl{flex:1;overflow-y:auto;padding:12px}
.inv-count-tbl table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.inv-count-tbl thead th{padding:10px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#fff;background:var(--ph);text-align:left;position:sticky;top:0}
.inv-count-tbl tbody td{padding:8px 8px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:middle}
.inv-count-tbl tbody tr:hover{background:#f8faf8}
.inv-count-tbl tbody tr.divergente{background:#fff8f0}
.inv-count-tbl tbody tr.convergido{background:#f0faf4;opacity:.7}
.inv-count-input{width:90px;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-weight:700;text-align:right;font-family:Arial}
.inv-count-input:focus{border-color:var(--ph);outline:none;box-shadow:0 0 0 2px rgba(30,90,58,.15)}
.inv-count-input.filled{border-color:#2d8a4e;background:#f0faf4}
.inv-count-footer{padding:10px 16px;background:#fff;border-top:1px solid #e0e4e0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.inv-badge-pvc{background:#1565c0;color:#fff}
.inv-badge-alu{background:#e65100;color:#fff}
.inv-badge-aco{background:#880e4f;color:#fff}
.inv-badge-ace{background:#6a1b9a;color:#fff}
.inv-badge-lp{background:#2a8080;color:#fff}

// Normaliza nomes de setor para evitar falhas por diferença de maiúsculas, acentos ou espaços.
function setorKey(v){
  return String(v||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/\s+/g,' ')
    .trim();
}
function isBaixarIntranetSetor(v){
  const s = setorKey(v);
  return s.includes('3. baixar intranet') || (s.includes('baixar') && s.includes('intranet'));
}

const NC_INTERNAL_PROCESSOS = new Set(['corte','embalagem','usinagem','montagem','solda','especiais']);
function sanitizeText(v, maxLen=500){
  return String(v==null?'':v)
    .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g,' ')
    .replace(/\s+/g,' ')
    .trim()
    .slice(0, maxLen);
}
function sanitizeHtmlText(v, maxLen=500){ return escH(sanitizeText(v, maxLen)); }
function getQuadrosMortos(v){
  const n = normalizeHours(typeof v === 'object' && v ? v.quantidadeQuadros : v);
  return Number.isFinite(n) && n > 0 ? n : 0;
}
function classifyNcNatureza(r){
  const processo = sanitizeText(r && r.processo || '', 120).toLowerCase();
  const processoNorm = processo.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const interno = NC_INTERNAL_PROCESSOS.has(processoNorm) && getQuadrosMortos(r) > 0;
  return interno ? 'Interna' : 'Externa';
}

    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');

    const base = new Date(1899,11,30);

    const y=base.getFullYear(), m=String(base.getMonth()+1).padStart(2,'0'), dd=String(base.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }

// Renderiza só a parte da tabela de pedidos (status strip + table) sem reconstruir o painel de filtros
// Extrai strip e tabela do HTML gerado por renderPedidos() usando marcadores únicos.
// renderPedidos() é a única fonte de verdade — buildPedidosPartial nunca diverge.
function buildPedidosPartial(){
  const fullHtml = renderPedidos();

  // Extrair innerHTML do status-strip (entre <!--STRIP_START--> e <!--STRIP_END-->)
  const STRIP_OPEN  = '<!--STRIP_START--><div class="ped-status-strip">';
  const STRIP_CLOSE = '<!--STRIP_END-->';
  const s0 = fullHtml.indexOf(STRIP_OPEN) + STRIP_OPEN.length;
  const s1 = fullHtml.indexOf(STRIP_CLOSE, s0);
  // O strip vai até o </div> antes do STRIP_CLOSE — remove o </div> do container
  const stripRaw = s0 > 0 && s1 > 0 ? fullHtml.slice(s0, s1) : '';
  const stripHtml = stripRaw.replace(/<\/div>\s*$/, '');

  // Extrair innerHTML do tbl-outer (entre <!--TABLE_START--> e <!--TABLE_END-->)
  const TABLE_OPEN  = '<!--TABLE_START-->';
  const TABLE_CLOSE = '<!--TABLE_END-->';
  const t0 = fullHtml.indexOf(TABLE_OPEN) + TABLE_OPEN.length;
  const t1 = fullHtml.indexOf(TABLE_CLOSE, t0);
  const tableHtml = t0 > 0 && t1 > 0 ? fullHtml.slice(t0, t1) : '';

  return { stripHtml, tableHtml };
}


function renderPedTable(){
  // Atualiza só as pills e a tabela, sem reconstruir o painel de filtros.
  // Assim o dropdown permanece aberto e os checkboxes não perdem foco.
  const stripEl = document.querySelector('.ped-status-strip');
  const tblEl   = document.querySelector('.tbl-outer.ped-table-wrap');
  if(!stripEl || !tblEl){
    // Se os elementos ainda não existem (primeira carga), faz render() completo
    render();
    return;
  }
  // Gera o HTML parcial reutilizando a lógica de renderPedidos()
  const { stripHtml, tableHtml } = buildPedidosPartial();
  stripEl.innerHTML = stripHtml;
  tblEl.innerHTML   = tableHtml;
  // Reanexar listeners de drag-and-drop nas novas linhas
  if(typeof rebindPedidosDrag === 'function') rebindPedidosDrag();
}

function startOfISOWeek(date){
  const d = new Date(date);
  d.setHours(12,0,0,0);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d;
}
function endOfISOWeek(date){
  const d = startOfISOWeek(date);

  return d;
}
function dateToISODate(date){
  const d = new Date(date);

  return `${y}-${m}-${dd}`;
}
function getISOWeekInfo(input){
  const base = input ? new Date(input) : new Date();
  const monday = startOfISOWeek(base);
  const thursday = new Date(monday);
  thursday.setDate(monday.getDate()+3);
  const firstThursday = new Date(thursday.getFullYear(),0,4);
  const firstMonday = startOfISOWeek(firstThursday);
  const weekNo = 1 + Math.round((monday - firstMonday)/(7*864e5));
  const weekKey = `${thursday.getFullYear()}-W${String(weekNo).padStart(2,'0')}`;
  const sunday = endOfISOWeek(base);
  return {
    weekKey,
    weekStart: dateToISODate(monday),
    weekEnd: dateToISODate(sunday),
    label: `Semana ${String(weekNo).padStart(2,'0')} · ${fmt(dateToISODate(monday))} a ${fmt(dateToISODate(sunday))}`
  };
}
function parseWeekInputToInfo(weekInput){
  if(!weekInput || !/^\d{4}-W\d{2}$/.test(weekInput)) return getISOWeekInfo(new Date());
  const [yearStr, weekStr] = weekInput.split('-W');
  const year = Number(yearStr), week = Number(weekStr);
  const jan4 = new Date(year,0,4);
  const firstMonday = startOfISOWeek(jan4);
  const monday = new Date(firstMonday);
  monday.setDate(firstMonday.getDate() + (week-1)*7);
  return getISOWeekInfo(monday);
}

  if(!(denom>0)) return null;

}

  if(override > 0) return override;
  const startISO = r.periodStart || r.weekStart;
  const endISO = r.periodEnd || r.weekEnd;

}

function getEfetividadePeriodo(monthKey){
  const rng = getPeriodoProdutivo(monthKey);
  if(!rng) return {regs:[], horasTrab:0, horasExt:0, horasImp:0, urps:0, efetiv:null, faixa:getEfetividadeFaixa(null), rng:null};
  const regs = efetividadeRegs.filter(r=>{
    if(r.periodKey===monthKey || r.monthKey===monthKey) return true;
    const startISO = r.periodStart || r.weekStart || '';
    const endISO = r.periodEnd || r.weekEnd || '';
    return endISO >= rng.startISO && startISO <= rng.endISO;
  });
  const horasTrab = regs.reduce((a,r)=>a+normalizeHours(r.horasTrabalhadas),0);
  const horasExt  = regs.reduce((a,r)=>a+normalizeHours(r.horasExtras),0);

  const urps      = getEfetividadeURPsPeriodo(rng.startISO, rng.endISO);

}




function getMonthKey(input){
  const d = input ? new Date(input) : new Date();
  if(isNaN(d)) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function parseMonthKey(monthKey){
  if(!/^\d{4}-\d{2}$/.test(String(monthKey||''))) return null;
  const [y,m] = String(monthKey).split('-').map(Number);
  return {year:y, month:m};
}
function getMonthLabel(monthKey){
  const info = parseMonthKey(monthKey);
  if(!info) return '';
  return new Date(info.year, info.month-1, 1).toLocaleDateString('pt-BR',{month:'long', year:'numeric'});
}
function getPeriodoProdutivo(monthKey){
  const info = parseMonthKey(monthKey);
  if(!info) return null;
  const start = new Date(info.year, info.month-2, 26, 12);
  const end = new Date(info.year, info.month-1, 25, 12);
  return {
    start,
    end,
    startISO:dateToISODate(start),
    endISO:dateToISODate(end),
    monthLabel:getMonthLabel(monthKey),
    periodLabel:`${fmt(dateToISODate(start))} a ${fmt(dateToISODate(end))}`
  };
}
function isBusinessDay(date){

function getDashboardMetaRecord(monthKey){
  const rng = getPeriodoProdutivo(monthKey);
  if(!rng) return null;
  const now = new Date(); now.setHours(12,0,0,0);
  let compareDate;
  // Usa o período produtivo atual (26 a 25), não o mês calendário.
  // Ex.: em 30/04, o período atual já é 2026-05 = 26/04 a 25/05.
  const currentKey = getPeriodoAtualKey();
  const currentPeriod = getPeriodoProdutivo(currentKey);
  if(currentPeriod && now >= currentPeriod.start && now <= currentPeriod.end && monthKey === currentKey){
    compareDate = now;
  } else if(compareMonthKeys(monthKey, currentKey) < 0 || (currentPeriod && now > currentPeriod.end && monthKey === currentKey)){
    compareDate = rng.end;
  } else if(compareMonthKeys(monthKey, currentKey) > 0 || (currentPeriod && now < currentPeriod.start && monthKey === currentKey)){
    compareDate = new Date(rng.start); compareDate.setDate(rng.start.getDate()-1);
  } else {
    compareDate = now < rng.end ? now : rng.end;
  }
  const totalBusinessDays = [];
  const elapsedBusinessDays = [];
  const producedByDay = {};
  const allDays = [];
  const metaMensal = Number(metasProducao[monthKey]||0);
  for(let d=new Date(rng.start); d<=rng.end; d.setDate(d.getDate()+1)){
    const curr = new Date(d);
    const iso = dateToISODate(curr);
    const b = isBusinessDay(curr);
    allDays.push({date:new Date(curr), iso, business:b});
    if(b) totalBusinessDays.push(iso);
    if(b && curr<=compareDate) elapsedBusinessDays.push(iso);
  }
  getProducedPedidosPeriodo(rng.startISO, rng.endISO).forEach(p=>{
    const iso = toISO(p.conclProd||'');
    producedByDay[iso] = (producedByDay[iso]||0) + (parseFloat(p.urp)||0);
  });
  const dailyTarget = totalBusinessDays.length ? metaMensal/totalBusinessDays.length : 0;
  const metaAteHoje = dailyTarget * elapsedBusinessDays.length;
  const produzido = allDays
    .filter(d=>d.iso<=dateToISODate(compareDate))
    .reduce((acc,d)=>acc + (producedByDay[d.iso]||0), 0);
  const statusPct = metaAteHoje>0 ? (produzido/metaAteHoje) : null;
  let runningMeta = 0, runningProd = 0;
  const calendarRows = allDays.map(day=>{
    const producedDay = producedByDay[day.iso] || 0;
    if(day.business) runningMeta += dailyTarget;
    runningProd += producedDay;
    return {
      iso: day.iso,
      date: day.date,
      business: day.business,
      metaDia: day.business ? dailyTarget : 0,
      metaAcum: runningMeta,
      prodDia: producedDay,
      prodAcum: runningProd,
      gapAcum: runningProd - runningMeta,
      isToday: day.iso===dateToISODate(compareDate) && compareMonthKeys(monthKey,currentKey)===0,
      passed: day.iso<=dateToISODate(compareDate)
    };
  });
  const todayISO = dateToISODate(compareDate);
  const todayRow = calendarRows.find(r=>r.iso===todayISO) || null;
  return {
    monthKey,
    monthLabel:getMonthLabel(monthKey),
    periodLabel:rng.periodLabel,
    compareDateISO: todayISO,
    compareDate,
    metaMensal,
    totalBusinessDays: totalBusinessDays.length,
    elapsedBusinessDays: elapsedBusinessDays.length,
    dailyTarget,
    metaAteHoje,
    produzido,
    statusPct,
    producedByDay,
    todayProduced: todayRow ? todayRow.prodDia : 0,
    todayMeta: todayRow ? todayRow.metaDia : 0,
    gapHoje: todayRow ? (todayRow.prodDia - todayRow.metaDia) : 0,
    gapAcumulado: produzido - metaAteHoje,
    calendarRows
  };
}

function buildMetaChartSVG(metaRec){
  if(!metaRec || !metaRec.calendarRows || !metaRec.calendarRows.length){
    return '<div class="efet-mini">Sem dados para projetar a meta neste período.</div>';
  }
  const rows = metaRec.calendarRows;
  const width = 1000, height = 340, ml = 68, mr = 22, mt = 26, mb = 42;
  const plotW = width - ml - mr, plotH = height - mt - mb;
  const maxYBase = Math.max(metaRec.metaMensal||0, ...rows.map(r=>Math.max(r.metaAcum||0, r.prodAcum||0, r.prodDia||0, r.metaDia||0)), 10);
  const stepBase = maxYBase <= 200 ? 25 : maxYBase <= 500 ? 50 : maxYBase <= 1000 ? 100 : 250;
  const paddedMax = Math.ceil((maxYBase * 1.10) / stepBase) * stepBase;
  const tickCount = 5;
  const x = i => ml + (rows.length===1 ? plotW/2 : (i * plotW / (rows.length-1)));
  const y = v => mt + plotH - ((v||0) / paddedMax) * plotH;
  const fmt = v => Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});

  function smoothPath(vals){
    const pts = vals.map((v,i)=>({x:x(i), y:y(v)}));
    if(pts.length === 1){
      const p = pts[0];
      return `M ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    }
    let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const p0 = pts[i];
      const p1 = pts[i+1];
      const cx1 = p0.x + (p1.x - p0.x) * 0.38;
      const cx2 = p1.x - (p1.x - p0.x) * 0.38;
      d += ` C ${cx1.toFixed(1)} ${p0.y.toFixed(1)}, ${cx2.toFixed(1)} ${p1.y.toFixed(1)}, ${p1.x.toFixed(1)} ${p1.y.toFixed(1)}`;
    }
    return d;
  }

  const metaPath = smoothPath(rows.map(r=>r.metaAcum||0));
  const prodPath = smoothPath(rows.map(r=>r.prodAcum||0));
  const areaPath = `${prodPath} L ${x(rows.length-1).toFixed(1)} ${(mt+plotH).toFixed(1)} L ${x(0).toFixed(1)} ${(mt+plotH).toFixed(1)} Z`;

  let grids = '', vGrids = '', yLabels = '', xLabels = '', metaPoints = '', prodPoints = '', markers = '', hoverBands = '', tooltipGroup = '';

  for(let i=0;i<=tickCount;i++){
    const val = paddedMax * i / tickCount;
    const yy = y(val).toFixed(1);
    grids += `<line class="meta-grid" x1="${ml}" y1="${yy}" x2="${width-mr}" y2="${yy}"></line>`;
    yLabels += `<text class="meta-axis-label" x="${ml-10}" y="${Number(yy)+4}" text-anchor="end">${fmt(val)}</text>`;
  }

  rows.forEach((r,i)=>{
    const xx = x(i).toFixed(1);
    const day = new Date(r.iso+'T12:00:00').getDate();
    const left = i===0 ? ml : (x(i-1)+x(i))/2;
    const right = i===rows.length-1 ? (width-mr) : (x(i)+x(i+1))/2;
    const bandW = Math.max(8, right-left);
    const topY = Math.min(y(r.metaAcum||0), y(r.prodAcum||0));
    const tip1 = `Dia ${day}`;
    const tip2 = `Meta: ${(r.metaAcum||0).toFixed(2)} URP`;
    const tip3 = `Produção: ${(r.prodAcum||0).toFixed(2)} URP`;
    const tip4 = `No dia: ${(r.prodDia||0).toFixed(2)} URP`;
    vGrids += `<line class="meta-grid-v" x1="${xx}" y1="${mt}" x2="${xx}" y2="${mt+plotH}"></line>`;
    if(rows.length <= 16 || i % 2 === 0 || i === rows.length-1){
      xLabels += `<text class="meta-axis-label" x="${xx}" y="${height-12}" text-anchor="middle">${day}</text>`;
    }
    metaPoints += `<circle class="meta-point-meta" cx="${xx}" cy="${y(r.metaAcum).toFixed(1)}" r="4.2"></circle>`;
    prodPoints += `<circle class="meta-point-prod" cx="${xx}" cy="${y(r.prodAcum).toFixed(1)}" r="4.2"></circle>`;
    hoverBands += `<g>
      <rect class="meta-hover-band" x="${left.toFixed(1)}" y="${mt}" width="${bandW.toFixed(1)}" height="${plotH}"></rect>
      <g opacity="0" class="meta-tooltip-group">
        <line x1="${xx}" y1="${mt}" x2="${xx}" y2="${mt+plotH}" stroke="#8ea0af" stroke-width="1" stroke-dasharray="3 4"></line>
        <rect class="meta-tooltip-bg" x="${Math.min(width-190, Number(xx)+10)}" y="${Math.max(10, topY-76)}" rx="8" ry="8" width="178" height="66"></rect>
        <text class="meta-tooltip-text" x="${Math.min(width-180, Number(xx)+18)}" y="${Math.max(26, topY-56)}">${tip1}</text>
        <text class="meta-tooltip-text" x="${Math.min(width-180, Number(xx)+18)}" y="${Math.max(40, topY-40)}">${tip2}</text>
        <text class="meta-tooltip-text" x="${Math.min(width-180, Number(xx)+18)}" y="${Math.max(54, topY-24)}">${tip3}</text>
        <text class="meta-tooltip-text" x="${Math.min(width-180, Number(xx)+18)}" y="${Math.max(68, topY-8)}">${tip4}</text>
      </g>
    </g>`;
  });

  const todayIdx = rows.findIndex(r=>r.isToday);
  if(todayIdx>=0){
    const xx = x(todayIdx).toFixed(1);
    markers += `<line class="meta-marker-hoje" x1="${xx}" y1="${mt}" x2="${xx}" y2="${mt+plotH}"></line>`;
    markers += `<rect class="meta-badge" x="${Math.max(6, Number(xx)-26)}" y="6" rx="6" ry="6" width="52" height="24"></rect><text class="meta-badge-text" x="${xx}" y="22" text-anchor="middle">Hoje</text>`;
  }
  [6,13,20,27].forEach((dayNum,idx)=>{
    const rowIdx = rows.findIndex(r=>new Date(r.iso+'T12:00:00').getDate()===dayNum);
    if(rowIdx<0) return;
    const xx = x(rowIdx).toFixed(1);
    markers += `<line class="meta-marker-semana" x1="${xx}" y1="${mt}" x2="${xx}" y2="${mt+plotH}"></line>`;
  });

  return `<div class="meta-chart-wrap">
    <div class="meta-chart-head">
      <div class="meta-chart-title">Projeção da meta acumulada x produção acumulada</div>
      <div class="meta-legend">
        <span><i class="meta-dot" style="background:#ff5a52"></i>Meta acumulada</span>
        <span><i class="meta-dot" style="background:#18b45b"></i>Produzido acumulado</span>
        <span><i class="meta-dot" style="background:#9ec400"></i>Hoje</span>
        <span><i class="meta-dot" style="background:#1696f0"></i>Marcos semanais</span>
      </div>
    </div>
    <svg class="meta-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" aria-label="Gráfico de meta e produção">
      <defs>
        <linearGradient id="prodGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#18b45b" stop-opacity="0.26"></stop>
          <stop offset="100%" stop-color="#18b45b" stop-opacity="0.02"></stop>
        </linearGradient>
        <style>
          .meta-tooltip-group{transition:opacity .15s ease}
          .meta-hover-band:hover + .meta-tooltip-group,
          .meta-hover-band:hover ~ .meta-tooltip-group{opacity:1}
          g:hover > .meta-tooltip-group{opacity:1}
        </style>
      </defs>
      ${grids}${vGrids}${markers}
      <path class="meta-area-prod" d="${areaPath}"></path>
      <path class="meta-line-meta" d="${metaPath}"></path>
      <path class="meta-line-prod" d="${prodPath}"></path>
      ${metaPoints}${prodPoints}${hoverBands}${yLabels}${xLabels}
      <text class="meta-axis-label" x="24" y="18">URP</text>
      <text class="meta-axis-label" x="${width/2}" y="${height-4}" text-anchor="middle">DIA</text>
    </svg>
  </div>`;
}

function deriveStatusFromSetor(setor){
  const raw = String(setor||'');
  const s = setorKey(raw);
  if(s.includes('0. pendente corte')) return 'Pendente corte';
  if(s.includes('1. corte') || s.includes('2. montagem') || isBaixarIntranetSetor(raw)) return 'Em produção';
  if(s.includes('4. expedi') || s.includes('3. expedi')) return 'Aguardando coleta';
  if(s.includes('5. entregue') || s.includes('4. entregue')) return 'Finalizado';
  return '';
}
function isPedidoFinalizado(p){
  const setor = String((p && p.setor) || '');
  const status = String((p && p.status) || '');
  return deriveStatusFromSetor(setor)==='Finalizado'
    || status==='Finalizado'
    || setor.includes('5. Entregue')
    || setor.includes('4. Entregue');
}
function isPedidoEmExpedicao(p){
  if(isPedidoFinalizado(p)) return false;
  const setor = String((p && p.setor) || '');
  const status = String((p && p.status) || '');
  return setor.includes('4. Expedi') || setor.includes('3. Expedi') || status==='Aguardando coleta';
}
function isPedidoPendenteCorte(p){
  if(isPedidoFinalizado(p)) return false;
  return String((p && p.setor) || '') === '0. Pendente corte';
}
function isPersianaValida(v){
  const s = String(v||'').trim().toLowerCase();
  return !!s && s!=='n/a' && s!=='nao' && s!=='não' && s!=='sem';
}
function subtotalPersianas(arr){
  return arr.reduce((acc,p)=>{
    const n = parseFloat(String(p.persiana||'').replace(',','.'));
    return acc + (Number.isFinite(n) ? n : 0);
  }, 0);
}

const NC_DRAFT_DEFAULTS = new Set(['dataOcorrencia','feld','reposicao','quantM2','quantM','pesoKg','quantidadeQuadros','disposicao','turno','material','grupo']);
const NC_DRAFT_INIT_VALS = { feld:'Folha', reposicao:'Parcial', quantidadeQuadros:1, disposicao:'Sucata', turno:'1º Turno', material:'PVC', grupo:'TEC' };

function ncHasDados(){
  if(!ncDraft) return false;
  // Se é edição de NC existente, sempre perguntar antes de fechar

function getNcPesoPorMetro(codigo){
  const found = NC_PROFILE_WEIGHTS.find(p=>p.code===String(codigo||'').trim());
  return found ? Number(found.peso||0) : 0;
}
function getNcDefeitoByNr(nr, processo=''){
  const proc = String(processo||'').trim().toLowerCase();
  return NC_DEFEITO_OPTIONS.find(d=>String(d.nr)===String(nr||'') && (!proc || String(d.setor||'').trim().toLowerCase()===proc)) || null;
}
function getNcDefeitosByProcesso(processo=''){
  const proc = String(processo||'').trim().toLowerCase();
  if(!proc) return [];
  return NC_DEFEITO_OPTIONS.filter(d=>String(d.setor||'').trim().toLowerCase()===proc);
}
function recalcNcDraft(draft){
  const d = draft || getNcDraft();
  const rep = d.reposicao || 'Parcial';
  const larguraMm = normalizeHours(d.largura);
  const alturaMm = normalizeHours(d.altura);
  const comprMm = normalizeHours(d.compr);
  const larguraM = larguraMm / 1000;
  const alturaM = alturaMm / 1000;
  const comprM = comprMm / 1000;
  const quadros = Math.max(1, normalizeHours(d.quantidadeQuadros) || 1);
  const pesoPm = getNcPesoPorMetro(d.codigo);
  const quantM2 = rep==='Total' ? (larguraM * alturaM) : 0;
  const quantM = rep==='Total' ? ((2*larguraM)+(2*alturaM)) : comprM;
  const pesoKg = quantM * pesoPm * quadros;
  const defeito = getNcDefeitoByNr(d.defeitoNr, d.processo);
  d.quantM2 = Number.isFinite(quantM2) ? quantM2 : 0;
  d.quantM = Number.isFinite(quantM) ? quantM : 0;
  d.pesoKg = Number.isFinite(pesoKg) ? pesoKg : 0;
  d.descricaoOcorrencia = defeito ? defeito.defeito : '';
  return d;
}

    'nc-prev-quadros': String(Math.max(1, normalizeHours(d.quantidadeQuadros)||1)),
    'nc-prev-descricao': d.descricaoOcorrencia || '—',
  };
  Object.entries(mapText).forEach(([id,val])=>{
    const el = $(id);

  const defectBox = $('nc-defect-box');
  if(defectBox){
    if(defect){
      defectBox.style.display = '';

    } else {
      defectBox.style.display = 'none';
      defectBox.innerHTML = '';
    }
  }
}

  d[field] = value;
  if(field==='idSetor'){
    const found = NC_SETOR_OPTIONS.find(s=>s.id===value);
    d.setorOrigem = found ? found.desc : '';
  }
  if(field==='processo'){
    const defeitoAtual = getNcDefeitoByNr(d.defeitoNr, value);
    if(!defeitoAtual) d.defeitoNr = '';
  }
  if(field==='defeitoNr'){
    const defeito = getNcDefeitoByNr(value, d.processo);
    if(defeito && !d.processo) d.processo = defeito.setor || d.processo;
  }
  if(field==='reposicao'){
    if(value==='Total') d.compr = '';
    else { d.largura=''; d.altura=''; }
  }
  recalcNcDraft(d);
  updateNcFormUI();
}

  const d = recalcNcDraft(getNcDraft());

    quantidadeQuadros: Math.max(1, normalizeHours(d.quantidadeQuadros)||1),

    observacoes: d.observacoes || '',
    criadoPor: CU ? CU.name : '',
    criadoPorUid: CU ? CU.uid : '',
    criadoEm: firebase.firestore.FieldValue.serverTimestamp(),

  };
  showLoading('Salvando não conformidade...');
  try{

      payload.criadoPor = existing.criadoPor || payload.criadoPor;
      payload.criadoPorUid = existing.criadoPorUid || payload.criadoPorUid;
      payload.criadoEm = existing.criadoEm || firebase.firestore.FieldValue.serverTimestamp();
      payload.atualizadoPor = CU ? CU.name : '';
      await db.collection('naoConformidades').doc(ncEditingId).set(payload, {merge:true});

function getRenderScrollTarget(el){
  let node = el || document.activeElement;
  while(node && node !== document.body){
    if(node.classList){
      if(node.classList.contains('modal')) return node;
      if(node.classList.contains('tbl-outer')) return node;
      if(node.classList.contains('dash-inner')) return node;
      if(node.classList.contains('efet-inner')) return node;
      if(node.classList.contains('exp-inner')) return node;
      if(node.classList.contains('cfg-inner')) return node;
      if(node.classList.contains('users-inner')) return node;
    }
    node = node.parentElement;
  }
  return document.scrollingElement || document.documentElement;
}
function captureRenderFocus(){
  const el = document.activeElement;
  if(!el || !el.id) return null;
  const tag = String(el.tagName||'').toLowerCase();
  if(!['input','textarea','select'].includes(tag)) return null;
  const scrollTarget = getRenderScrollTarget(el);
  return {
    id: el.id,
    start: typeof el.selectionStart === 'number' ? el.selectionStart : null,
    end: typeof el.selectionEnd === 'number' ? el.selectionEnd : null,
    scrollSelector: scrollTarget && scrollTarget !== document.scrollingElement && scrollTarget !== document.documentElement
      ? (scrollTarget.className || '')
      : '__window__',
    scrollTop: scrollTarget ? scrollTarget.scrollTop || 0 : 0,
    scrollLeft: scrollTarget ? scrollTarget.scrollLeft || 0 : 0,
    windowX: window.scrollX || 0,
    windowY: window.scrollY || 0
  };
}
function restoreRenderFocus(state){
  if(!state || !state.id) return;
  setTimeout(()=>{
    let scrollTarget = null;
    if(state.scrollSelector && state.scrollSelector !== '__window__'){
      const classes = String(state.scrollSelector).split(/\s+/).filter(Boolean);
      const selector = classes.map(c=>'.'+c).join('');
      if(selector) scrollTarget = document.querySelector(selector);
    }
    if(!scrollTarget) scrollTarget = document.scrollingElement || document.documentElement;
    try{
      scrollTarget.scrollTop = state.scrollTop || 0;
      scrollTarget.scrollLeft = state.scrollLeft || 0;
    } catch(_e){}
    try{ window.scrollTo(state.windowX || 0, state.windowY || 0); } catch(_e){}
    const el = $(state.id);
    if(!el) return;
    try{ el.focus({preventScroll:true}); } catch(_e){ try{ el.focus(); } catch(__e){} }
    if(state.start!==null && typeof el.setSelectionRange === 'function'){
      const len = String(el.value||'').length;
      const start = Math.min(state.start, len);
      const end = Math.min(state.end===null ? state.start : state.end, len);
      try{ el.setSelectionRange(start, end); } catch(_e){}
    }
    try{
      scrollTarget.scrollTop = state.scrollTop || 0;
      scrollTarget.scrollLeft = state.scrollLeft || 0;
    } catch(_e){}
  }, 0);
}
function renderFatalScreen(err){

async function getUserProfileForAuthUser(user){
  const directRef = db.collection('users').doc(user.uid);
  const directDoc = await directRef.get();
  if(directDoc.exists){
    return { ref: directRef, doc: directDoc, data: directDoc.data(), migrated:false };
  }

  const emailOriginal = (user.email||'').trim();
  const email = emailOriginal.toLowerCase();
  if(!email) return null;

  let legacyDoc = null;

  // 1) Documento legado salvo com ID baseado no e-mail
  const legacyDocId = 'email_' + email.replace(/[^a-z0-9]/gi,'_');
  const legacyRefById = db.collection('users').doc(legacyDocId);
  const legacyByIdDoc = await legacyRefById.get();
  if(legacyByIdDoc.exists){
    legacyDoc = legacyByIdDoc;
  }

  // 2) Busca por e-mail em minúsculo
  if(!legacyDoc){
    const byEmailSnap = await db.collection('users')
      .where('email', '==', email)
      .limit(1)
      .get();
    if(!byEmailSnap.empty) legacyDoc = byEmailSnap.docs[0];
  }

  // 3) Compatibilidade com perfis antigos salvos com e-mail sem normalizar
  if(!legacyDoc && emailOriginal && emailOriginal !== email){
    const byOriginalEmailSnap = await db.collection('users')
      .where('email', '==', emailOriginal)
      .limit(1)
      .get();
    if(!byOriginalEmailSnap.empty) legacyDoc = byOriginalEmailSnap.docs[0];
  }

  if(!legacyDoc) return null;

  const legacyData = legacyDoc.data() || {};
  const mergedData = {
    ...legacyData,
    email,
    emailOriginal,
    pendingAuthLink:false,
    pendingAuth:false,
    migratedFrom: legacyDoc.id,
    syncedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  await directRef.set(mergedData, { merge:true });
  if(legacyDoc.id !== user.uid){
    try{ await legacyDoc.ref.delete(); } catch(_e){}
  }
  const finalDoc = await directRef.get();
  return { ref: directRef, doc: finalDoc, data: finalDoc.data(), migrated:true };
}

  const payload = {

    atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };
  await db.collection('efetividadeSemanal').doc(monthKey).set(payload, {merge:true});
}


async function savePedido(data, id=null){
  const setorDerived = Object.prototype.hasOwnProperty.call(data,'setor') ? data.setor : null;
  const statusDerived = setorDerived ? deriveStatusFromSetor(setorDerived) : null;
  if(id){
    const payload = { ...data, atualizadoEm: firebase.firestore.FieldValue.serverTimestamp() };
    if(statusDerived && !Object.prototype.hasOwnProperty.call(data,'status')) payload.status = statusDerived;
    // Se o setor for alterado manualmente para Baixar Intranet, registra a conclusão produtiva.
    if(isBaixarIntranetSetor(setorDerived) && !payload.conclProd){
      const atual = pedidos.find(p => String(p.id) === String(id));
      payload.conclProd = (atual && atual.conclProd) ? atual.conclProd : new Date().toISOString().substring(0,10);
    }
    await db.collection('pedidos').doc(id).update(payload);
  } else {
    const lista = getOrderedPedidos();
    const menorOrdem = lista.length ? Number(lista[0].ordem) || 10 : 10;
    const novaOrdem = Number.isFinite(Number(data.ordem)) ? Number(data.ordem) : (menorOrdem - 10);
    const payload = { ...data, ordem:novaOrdem, criadoEm: firebase.firestore.FieldValue.serverTimestamp(), atualizadoEm: firebase.firestore.FieldValue.serverTimestamp() };
    if(statusDerived && !Object.prototype.hasOwnProperty.call(data,'status')) payload.status = statusDerived;
    await db.collection('pedidos').add(payload);
  }
}

async function deletePedido(id){
  await db.collection('pedidos').doc(id).delete();
}


async function avancarSetor(id){
  try{
    if(!id) return false;
    if(!can('avancar')){
      showToast('Sem permissão para avançar status de pedidos.','err');
      return false;
    }

    const p = pedidos.find(x => String(x.id) === String(id));
    if(!p){
      showToast('Pedido não encontrado.','err');
      return false;
    }

    if(isPedidoFinalizado(p)){
      showToast('Pedido já está finalizado.','info');
      return false;
    }

    const fluxoBase = ['0. Pendente corte','1. Corte','2. Montagem','3. Baixar Intranet','4. Expedição','5. Entregue'];
    const fluxoCustom = Array.isArray(customSetores) && customSetores.length ? customSetores : [];
    const fluxo = [...new Set([...fluxoBase, ...fluxoCustom])];

    const setorAtual = String(p.setor || '0. Pendente corte');
    let idx = fluxo.findIndex(s => s === setorAtual);
    if(idx < 0){
      idx = fluxo.findIndex(s => setorAtual.includes(s) || s.includes(setorAtual));
    }
    if(idx < 0){
      showToast('Não consegui identificar o setor atual do pedido. Abra o pedido e ajuste o setor manualmente.','err',6000);
      return false;
    }

    const proximoSetor = fluxo[idx + 1];
    if(!proximoSetor){
      showToast('Não há próximo status configurado para este pedido.','info');
      return false;
    }

    const status = deriveStatusFromSetor(proximoSetor);
    const payload = {
      setor: proximoSetor,
      status,
      prior: calcPrior(p.prazo || '', proximoSetor),
      atualizadoPor: CU ? CU.name : '',
      atualizadoPorId: CU ? CU.uid : ''
    };

    // A data de conclusão da produção deve ser registrada quando o pedido entra em
    // "3. Baixar Intranet". Esse é o fechamento produtivo, antes da expedição/coleta.
    if(isBaixarIntranetSetor(proximoSetor) || status === 'Finalizado'){
      payload.conclProd = p.conclProd || new Date().toISOString().substring(0,10);
    }

    showLoading('Atualizando status do pedido...');
    await savePedido(payload, id);
    // Atualiza o objeto local imediatamente para a tela refletir a data sem depender do próximo snapshot.
    Object.assign(p, payload);
    hideLoading();
    showToast(`Pedido avançado para ${proximoSetor}.`,'ok');
    render();
    return false;
  }catch(e){
    hideLoading();
    console.error('Erro ao avançar setor:', e);
    showToast('Erro ao avançar status: ' + (e.message || e), 'err', 6000);
    return false;
  }
}

async function confirmDelete(id){
  try{
    if(!id) return false;

    const pedido = pedidos.find(p => String(p.id) === String(id));
    if(!pedido){
      showToast('Pedido não encontrado para exclusão.','err');
      return false;
    }

    if(!can('deletar')){
      showToast('Sem permissão para excluir pedidos.','err');
      return false;
    }

    if(pedido.status === 'Finalizado' || isPedidoFinalizado(pedido)){
      showToast('Pedido finalizado não pode ser excluído por esta tela.','err');
      return false;
    }

    const at = pedido.at ? `AT ${pedido.at}` : 'este pedido';
    const cliente = pedido.cliente ? ` - ${pedido.cliente}` : '';
    if(!confirm(`Excluir ${at}${cliente}?\n\nEssa ação não poderá ser desfeita.`)) return false;

    showLoading('Excluindo pedido...');
    await deletePedido(id);

    pedidos = pedidos.filter(p => String(p.id) !== String(id));
    hideLoading();
    showToast('Pedido excluído com sucesso.','ok');
    render();
    return false;
  }catch(e){
    hideLoading();
    console.error('Erro ao excluir pedido:', e);
    showToast('Erro ao excluir pedido: ' + (e.message || e), 'err', 5000);
    return false;
  }
}

async function seedManutencaoIfNeeded(){

  if(chamadosSnap.empty && MANUT_LEGACY_BACKUP && Array.isArray(MANUT_LEGACY_BACKUP.chamados)){

    MANUT_LEGACY_BACKUP.chamados.forEach(c=>{

      batch.set(db.collection('manut_chamados').doc(id), {...c, migratedFromLegacy:true}, {merge:true});
    });
    batch.set(db.collection('config').doc('manutencaoCatalogo'), MANUT_LEGACY_BACKUP.catalogo || MANUT_CATALOG_DEFAULT, {merge:true});
    batch.set(flagRef, {migratedAt: firebase.firestore.FieldValue.serverTimestamp(), total: MANUT_LEGACY_BACKUP.chamados.length, source:'backup-json-30-04-2026'}, {merge:true});

}

// Retorna há quantos dias o chamado está aberto (inteiro)
function manutDiasAberto(c){
  try{
    const aberto = c.abertoEm ? (c.abertoEm.toDate ? c.abertoEm.toDate() : new Date(c.abertoEm)) : null;
    if(!aberto || isNaN(aberto)) return null;
    const fim = (['concluido','cancelado'].includes(c.status) && c.historico)
      ? new Date(c.historico[c.historico.length-1]?.time || Date.now())
      : new Date();
    return Math.floor((fim - aberto) / 86400000);
  }catch(_){ return null; }
}

async function manutAprovarEdicao(editId){
  try{
    const edit = manutEditPendentes.find(e=>e.id===editId);
    if(!edit){ showToast('Edição não encontrada.','err'); return; }
    const upd = {};
    if(edit.campos.titulo)    upd.titulo    = edit.campos.titulo;
    if(edit.campos.descricao) upd.descricao = edit.campos.descricao;
    upd.editadoPor = CU.name || CU.email;
    upd.editadoEm  = new Date().toISOString();
    const hist = { time: new Date().toISOString(), user: CU.email||CU.uid, texto: `Edição aprovada por ${CU.name||CU.email}. Motivo informado: "${edit.motivoEdicao}"` };
    // Atualiza o chamado original
    const chamadoRef = db.collection('manut_chamados').doc(edit.chamadoId);
    const chamadoSnap = await chamadoRef.get();
    const historico = [...(chamadoSnap.data()?.historico || []), hist];
    await chamadoRef.set({...upd, historico}, {merge:true});
    // Remove a edição pendente
    await db.collection('manut_edits_pendentes').doc(editId).delete();
    showToast('Edição aprovada e aplicada.','ok');

}

  const pctAtivos = total ? Math.round((ativos.length/total)*100) : 0;
  const group=(key, base=filtered)=>{const m={}; base.forEach(c=>{const k=c[key]||'—';m[k]=(m[k]||0)+1;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
  const topBars=(items,limit=7)=>{ const max=Math.max(1,...items.map(x=>x[1])); return `<div class="manut-top-list">${items.slice(0,limit).map(([l,v])=>`<div class="manut-top-item"><div class="manut-top-name" title="${esc(l)}">${esc(String(l).slice(0,28))}</div><div class="manut-top-track"><div class="manut-top-fill" style="width:${Math.max(6,(v/max)*100)}%"></div></div><div class="manut-top-val">${v}</div></div>`).join('') || '<div class="manut-empty">Sem dados no período.</div>'}</div>`; };

  const mttrList = filtered.map(c=>{ const a=getOpenDate(c), f=getCloseDate(c); return a&&f&&f>=a ? (f-a)/36e5 : null; }).filter(v=>v!==null);
  const mttr = mttrList.length ? mttrList.reduce((a,b)=>a+b,0)/mttrList.length : 0;
  const prevMttrList = prev.map(c=>{ const a=getOpenDate(c), f=getCloseDate(c); return a&&f&&f>=a ? (f-a)/36e5 : null; }).filter(v=>v!==null);
  const prevMttr = prevMttrList.length ? prevMttrList.reduce((a,b)=>a+b,0)/prevMttrList.length : 0;
  const fmtHours = (h)=> h ? (h<24 ? `${h.toFixed(1)}h` : `${(h/24).toFixed(1)}d`) : '—';

  const monthKeys=[];
  const mStart = new Date(start.getFullYear(), start.getMonth(), 1);
  for(let d=new Date(mStart); d<=now; d=addMonths(d,1)) monthKeys.push(monthKey(d));
  const monthly = monthKeys.map(k=>{
    const open = manutChamados.filter(c=>{ const d=getOpenDate(c); return d && monthKey(d)===k; }).length;
    const closed = manutChamados.filter(c=>{ const d=getCloseDate(c); return d && monthKey(d)===k; }).length;
    const lastDay = (()=>{ const [y,m]=k.split('-').map(Number); return new Date(y,m,0,23,59,59); })();
    const backlog = manutChamados.filter(c=>{ const a=getOpenDate(c); const f=getCloseDate(c); return a && a<=lastDay && (!f || f>lastDay) && c.status!=='cancelado'; }).length;
    return {k,label:monthLabel(k),open,closed,backlog};
  });
  const lineChart = (data)=>{
    const W=760,H=250,padL=34,padR=14,padT=18,padB=34;
    const max=Math.max(1,...data.flatMap(x=>[x.open,x.closed,x.backlog]));
    const x=(i)=> padL + (data.length<=1 ? 0 : i*((W-padL-padR)/(data.length-1)));
    const y=(v)=> H-padB - (v/max)*(H-padT-padB);
    const path=(key)=> data.map((d,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(d[key]).toFixed(1)}`).join(' ');
    const area = data.map((d,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(d.backlog).toFixed(1)}`).join(' ') + ` L${x(data.length-1).toFixed(1)} ${H-padB} L${x(0).toFixed(1)} ${H-padB} Z`;
    const grid=[0,.25,.5,.75,1].map(t=>{const yy=padT+t*(H-padT-padB); return `<line class="manut-time-grid" x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}"></line>`}).join('');
    return `<svg class="manut-time-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}<path class="manut-time-area" d="${area}"></path><path class="manut-time-line open" d="${path('open')}"></path><path class="manut-time-line closed" d="${path('closed')}"></path><path class="manut-time-line backlog" d="${path('backlog')}"></path>${data.map((d,i)=>`<g><circle class="manut-time-dot open" cx="${x(i)}" cy="${y(d.open)}" r="3.5"></circle><circle class="manut-time-dot closed" cx="${x(i)}" cy="${y(d.closed)}" r="3.5"></circle><circle class="manut-time-dot backlog" cx="${x(i)}" cy="${y(d.backlog)}" r="3.5"></circle><text class="manut-time-label" x="${x(i)}" y="${H-12}" text-anchor="middle">${d.label}</text></g>`).join('')}</svg>`;
  };

  const typeGroup = group('motivo').reduce((a,[k,v])=>{ const low=String(k).toLowerCase(); const tipo=low.includes('prevent')?'Preventiva':'Corretiva / outros'; a[tipo]=(a[tipo]||0)+v; return a; },{});
  const tipoTotal = Object.values(typeGroup).reduce((a,b)=>a+b,0)||1;
  const tipoHtml = Object.entries(typeGroup).map(([k,v])=>`<div class="manut-type-row"><span>${esc(k)}</span><b>${v}</b><div class="manut-type-track"><i style="width:${Math.max(4,(v/tipoTotal)*100)}%"></i></div></div>`).join('') || '<div class="manut-empty">Sem dados.</div>';

  const week = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>[d, filtered.filter(c=>{const dt=getOpenDate(c); return dt && dt.getDay()===i;}).length]);
  const weekMax=Math.max(1,...week.map(x=>x[1]));
  const weekHtml=`<div class="manut-week-strip">${week.map(([d,v])=>`<div class="manut-week-day"><div class="bar" style="height:${Math.max(8,(v/weekMax)*82)}px"></div><b>${v}</b><span>${d}</span></div>`).join('')}</div>`;

  const recent = [...filtered].sort((a,b)=>{ const da=getOpenDate(a); const db=getOpenDate(b); return (db?db.getTime():0)-(da?da.getTime():0); }).slice(0,6);
  const timeline = `<div class="manut-timeline">${recent.map(c=>`<div class="manut-timeline-item" onclick="manutOpenDetalhe('${c.id}')"><div class="time">${fmtDate(getOpenDate(c))}</div><div class="dot"></div><div class="body"><b>${esc(c.titulo||'Chamado sem título')}</b><span>${esc(c.setor||'—')} · ${esc(c.equipamento||'—')} · ${MANUT_STATUS_LABEL[c.status]||c.status||'Aberto'}</span></div></div>`).join('') || '<div class="manut-empty">Sem chamados no período.</div>'}</div>`;

  const statusItems = group('status').map(([s,v])=>[MANUT_STATUS_LABEL[s]||s,v,s]);
  const statusColors = ['#1e5a3a','#e8a44a','#2a8080','#2d8a4e','#888','#cc2222'];
  const donut = (items)=>{
    const sum = items.reduce((a,x)=>a+x[1],0) || 1;
    let acc = 0;
    const segs = items.map((it,i)=>{ const pct=(it[1]/sum)*100; const dash=`${pct} ${100-pct}`; const off=-acc; acc+=pct; return `<circle class="manut-donut-seg" cx="100" cy="100" r="72" stroke="${statusColors[i%statusColors.length]}" stroke-dasharray="${dash}" stroke-dashoffset="${off}"></circle>`; }).join('');
    const leg = items.map((it,i)=>`<div class="manut-leg-item"><div class="manut-leg-left"><span class="manut-leg-dot" style="background:${statusColors[i%statusColors.length]}"></span><span class="manut-leg-label">${esc(it[0])}</span></div><span class="manut-leg-value">${it[1]}</span></div>`).join('') || '<div class="manut-empty">Sem dados.</div>';
    return `<div class="manut-donut-wrap compact"><svg class="manut-donut" viewBox="0 0 200 200"><circle class="manut-donut-bg" cx="100" cy="100" r="72"></circle>${segs}<text class="manut-donut-center" x="100" y="96" text-anchor="middle">${ativos.length}</text><text class="manut-donut-label" x="100" y="116" text-anchor="middle">ativos</text></svg><div class="manut-legend">${leg}</div></div>`;
  };

  const exec = total
    ? `No período selecionado foram abertos <b>${total}</b> chamados. O backlog atual do período é <b>${ativos.length}</b>, com <b>${urgentesAtivos}</b> urgentes e MTTR de <b>${fmtHours(mttr)}</b>.`
    : 'Não há chamados abertos no período selecionado. Use um intervalo maior para analisar tendência.';
  const periodLabel = manutDashPeriodo==='30d'?'30 dias':manutDashPeriodo==='90d'?'90 dias':manutDashPeriodo==='12m'?'12 meses':'6 meses';

  return `<div class="manut-inner manut-temporal">
    <div class="manut-head manut-head-temporal"><div><div class="manut-title">Manutenção · Dashboard temporal</div><div class="manut-sub">Chamados por período, tendência mensal, backlog, MTTR e reincidências.</div></div><div class="manut-period-actions"><div class="manut-period-tabs">
      ${[['30d','30d'],['90d','90d'],['6m','6m'],['12m','12m']].map(([v,l])=>`<button class="manut-period-btn ${manutDashPeriodo===v?'active':''}" onclick="manutDashPeriodo='${v}';render()">${l}</button>`).join('')}
    </div><button class="sBtn" onclick="manutExportarExcel()">Exportar Excel</button></div></div>
    <div class="manut-dash-hero temporal"><div class="manut-hero-card"><div class="manut-hero-kicker">Período analisado · ${periodLabel}</div><div class="manut-hero-title">${total} chamados abertos</div><div class="manut-hero-text">${exec}</div><div class="manut-hero-stats"><div class="manut-hero-stat"><div class="n">${ativos.length}</div><div class="l">backlog ativo</div></div><div class="manut-hero-stat"><div class="n">${fmtHours(mttr)}</div><div class="l">MTTR</div></div><div class="manut-hero-stat"><div class="n">${pctConcluido}%</div><div class="l">concluídos</div></div></div></div><div class="manut-alert-panel"><div class="manut-alert-title">Comparativo</div><div class="manut-alert-row"><span class="l">Abertos</span><span class="v">${total}</span></div>${compareBadge(comparePct(total,prev.length), true)}<div class="manut-alert-row warn"><span class="l">Urgentes ativos</span><span class="v">${urgentesAtivos}</span></div><div class="manut-alert-row"><span class="l">MTTR</span><span class="v">${fmtHours(mttr)}</span></div>${compareBadge(comparePct(mttr,prevMttr), true)}</div></div>
    <div class="manut-time-grid-layout"><div class="manut-panel manut-time-panel"><div class="manut-panel-head"><div><div class="manut-panel-title">Chamados por mês</div><div class="manut-panel-sub">Abertos, concluídos e backlog acumulado</div></div><div class="manut-time-legend"><span class="open">Abertos</span><span class="closed">Concluídos</span><span class="backlog">Backlog</span></div></div>${lineChart(monthly)}</div><div class="manut-panel"><div class="manut-panel-title">Status no período</div>${donut(statusItems)}</div></div>
    <div class="manut-time-grid-layout bottom"><div class="manut-panel"><div class="manut-panel-title">Reincidência por equipamento</div>${topBars(group('equipamento'),7)}</div><div class="manut-panel"><div class="manut-panel-title">Preventiva x corretiva</div>${tipoHtml}</div><div class="manut-panel"><div class="manut-panel-title">Distribuição semanal</div>${weekHtml}</div></div>
    <div class="manut-time-grid-layout bottom"><div class="manut-panel"><div class="manut-panel-title">Setores com mais chamados</div>${topBars(group('setor'),6)}</div><div class="manut-panel"><div class="manut-panel-title">Motivos mais recorrentes</div>${topBars(group('motivo'),6)}</div><div class="manut-panel"><div class="manut-panel-title">Timeline operacional</div>${timeline}</div></div>
  </div>`;
}

async function manutAddCatalog(type,inputId){ const el=$(inputId); const val=(el&&el.value||'').trim(); if(!val)return; const cat={...getManutCatalog()}; cat[type]=[...new Set([...(cat[type]||[]),val])]; await db.collection('config').doc('manutencaoCatalogo').set(cat,{merge:true}); showToast('Cadastro atualizado.','ok'); }
async function manutRemoveCatalog(type,val){ const cat={...getManutCatalog()}; cat[type]=(cat[type]||[]).filter(x=>x!==val); await db.collection('config').doc('manutencaoCatalogo').set(cat,{merge:true}); showToast('Item removido.','ok'); }
async function manutAddEquip(setor,inputId){ const el=$(inputId); const val=(el&&el.value||'').trim(); if(!val)return; const cat={...getManutCatalog(), equipamentos:{...(getManutCatalog().equipamentos||{})}}; cat.equipamentos[setor]=[...new Set([...(cat.equipamentos[setor]||[]),val])]; await db.collection('config').doc('manutencaoCatalogo').set(cat,{merge:true}); showToast('Equipamento adicionado.','ok'); }
async function manutRemoveEquip(setor,eq){ const cat={...getManutCatalog(), equipamentos:{...(getManutCatalog().equipamentos||{})}}; cat.equipamentos[setor]=(cat.equipamentos[setor]||[]).filter(x=>x!==eq); await db.collection('config').doc('manutencaoCatalogo').set(cat,{merge:true}); showToast('Equipamento removido.','ok'); }
async function manutSalvarNovo(){
  if(!(can('manut_chamados_abrir')||CU.role==='admin')){ showToast('Sem permissão para abrir chamado.','err'); return; }
  const prox=manutProximoCodigo();
  const payload={titulo:$('mc-titulo').value.trim(), setor:$('mc-setor').value, equipamento:$('mc-equip').value.trim(), tipo:$('mc-tipo').value, motivo:$('mc-motivo').value, prioridade:$('mc-prioridade').value, descricao:$('mc-desc').value.trim(), status:'aberto', codigoManut:prox.codigo, seqManut:prox.seq, abertoBy:CU.name||CU.email, abertoUid:CU.uid, abertoEm:new Date().toISOString(), historico:[{time:new Date().toISOString(), user:CU.email||CU.uid, texto:'Chamado '+prox.codigo+' aberto por '+(CU.name||CU.email)}]};
  if(!payload.titulo||!payload.setor||!payload.tipo){ showToast('Preencha título, setor e tipo.','err'); return; }
  await db.collection('manut_chamados').add(payload); modalState=null; showToast('Chamado aberto.','ok'); render();
}
// Salva uma observação no histórico sem alterar o status do chamado
async function manutSalvarObservacao(id){
  const obsEl = $('mc-obs');
  const obs = obsEl ? obsEl.value.trim() : '';
  if(!obs){ showToast('Digite uma observação antes de salvar.','err'); return; }
  try{
    const now = new Date().toISOString();
    const ref = db.collection('manut_chamados').doc(id);
    const snap = await ref.get();
    const historico = [...(snap.data()?.historico || []), {
      time: now,
      user: CU.email || CU.uid,
      texto: `Observação de ${CU.name||CU.email}: ${obs}`
    }];
    await ref.set({ historico }, { merge: true });
    if(obsEl) obsEl.value = '';
    showToast('Observação salva.','ok');
    // Não fecha o modal — apenas limpa o campo e recarrega o detalhe
    render();
  }catch(e){ showToast('Erro ao salvar: '+(e.message||e),'err'); }
}

async function manutAtualizarStatus(id,status){
  const c=manutChamados.find(x=>x.id===id); if(!c)return;
  if(status==='em_andamento' && !manutCanTech()){ showToast('Apenas técnico/admin pode iniciar reparo.','err'); return; }
  if(status==='aguardando_validacao' && !manutCanTech()){ showToast('Apenas técnico/admin pode enviar para validação.','err'); return; }
  const obsEl=$('mc-obs'); const obs=obsEl?obsEl.value.trim():''; const now=new Date().toISOString();
  const hist=[...(c.historico||[]),{time:now,user:CU.email||CU.uid,texto:`Status → "${MANUT_STATUS_LABEL[status]||status}" por ${CU.name||CU.email}${obs?'. Obs: '+obs:''}`}];
  if(status==='concluido' && !(c.abertoUid===CU.uid || c.abertoBy===CU.name || can('manut_validar') || CU.role==='admin')){ showToast('Somente quem abriu o chamado ou alguém com permissão de validação pode concluir.','err'); return; }
  const upd={status,historico:hist}; if(status==='em_andamento'&&!c.inicioReparo) upd.inicioReparo=now; if(status==='aguardando_validacao') upd.fimReparo=now; if(status==='concluido') upd.validadoEm=now;
  await db.collection('manut_chamados').doc(id).set(upd,{merge:true}); showToast('Status atualizado.','ok'); modalState=null; render();
}

             <div style="display:flex;gap:8px;margin-top:8px">
               <button class="mBtn green" onclick="manutAprovarEdicao('${e.id}')">✓ Aprovar</button>

           </div>`).join('')}`
      : '';
    // Formulário de solicitação de edição (expansível)

           <div style="margin-top:8px;display:flex;flex-direction:column;gap:8px;padding:10px;background:#fff8f0;border:1px solid #f3b37b;border-radius:6px">
             <div class="mfl"><label>Novo título (deixe em branco para manter)</label><input id="med-titulo" placeholder="${esc(c.titulo||'')}" /></div>

    return `<div class="overlay"><div class="modal modal-lg">
      <div class="modal-title">Chamado #${esc(manutCodigo(c))}${diasStr} <span class="mclose" onclick="manutCloseModal()">×</span></div>

        ${canValidate&&c.status==='aguardando_validacao'?`<button class="mBtn green" onclick="manutAtualizarStatus('${c.id}','concluido')">Validar e concluir</button>`:''}
        ${CU.role==='admin'&&!['concluido','cancelado'].includes(c.status)?`<button class="mBtn red" onclick="manutAtualizarStatus('${c.id}','cancelado')">Cancelar</button>`:''}
