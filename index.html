function getNcPeriodo(monthKey){
  const rng = getPeriodoProdutivo(monthKey);
  if(!rng) return {
    regs:[], total:0, pesoKg:0, quantM:0, totalQuadros:0,
    internas:0, externas:0, internasQuadros:0, externasQuadros:0, byNatureza:[],
    topProcesso:'—', topDefeito:'—', topDeteccao:'—',
    byProcesso:[], byCausador:[], byDeteccao:[], byDefeito:[], bySetorQuadros:[], bySetorInternas:[]
  };
  const regs = ncRegs.filter(r=>{
    const dt = toISO(r.dataOcorrencia||'');
    return dt && dt>=rng.startISO && dt<=rng.endISO;
  });
  const total = regs.length;
  const pesoKg = regs.reduce((a,r)=>a+normalizeHours(r.pesoKg),0);
  const quantM = regs.reduce((a,r)=>a+normalizeHours(r.quantM),0);
  const totalQuadros = regs.reduce((a,r)=>a+getQuadrosMortos(r),0);

  const groupCount = (arr, keyFn, valueFn = ()=>1, sortSecondary='label') => {
    const m = new Map();
    arr.forEach(r=>{
      const k = sanitizeText(keyFn(r) || '—', 180) || '—';
      m.set(k, (m.get(k)||0) + valueFn(r));
    });
    return [...m.entries()]
      .map(([label,qtd])=>({label,qtd}))
      .sort((a,b)=>b.qtd-a.qtd || String(a[sortSecondary]||a.label).localeCompare(String(b[sortSecondary]||b.label)));
  };

  const groupStats = (arr, keyFn) => {
    const m = new Map();
    arr.forEach(r=>{
      const k = sanitizeText(keyFn(r) || '—', 180) || '—';
      const cur = m.get(k) || {label:k, qtd:0, quadros:0};
      cur.qtd += 1;
      cur.quadros += getQuadrosMortos(r);
      m.set(k, cur);
    });
    return [...m.values()].sort((a,b)=>b.qtd-a.qtd || b.quadros-a.quadros || String(a.label).localeCompare(String(b.label)));
  };

  const byCausador = groupStats(regs, r=>r.processo);
  const byProcesso = byCausador;
  const byDefeito = groupCount(regs, r=>r.descricaoOcorrencia || (r.defeitoNr ? `Defeito ${r.defeitoNr}` : '—'));
  const byDeteccao = groupCount(regs, r=>r.setorOrigem || r.idSetor || '—');
  const bySetorQuadros = [...byCausador].sort((a,b)=>b.quadros-a.quadros || b.qtd-a.qtd || String(a.label).localeCompare(String(b.label)));
  const regsInternas = regs.filter(r=>classifyNcNatureza(r)==='Interna');
  const bySetorInternas = groupCount(regsInternas, r=>r.processo || '—', r=>getQuadrosMortos(r));
  const byNatureza = groupCount(regs, r=>classifyNcNatureza(r), ()=>1);
  const internas = regsInternas.length;
  const externas = regs.length - internas;
  const internasQuadros = regsInternas.reduce((a,r)=>a+getQuadrosMortos(r),0);
  const externasQuadros = totalQuadros - internasQuadros;

  return {
    regs,
    total,
    pesoKg,
    quantM,
    totalQuadros,
    internas,
    externas,
    internasQuadros,
    externasQuadros,
    byNatureza,
    topProcesso: byCausador[0] ? byCausador[0].label : '—',
    topDefeito: byDefeito[0] ? byDefeito[0].label : '—',
    topDeteccao: byDeteccao[0] ? byDeteccao[0].label : '—',
    byProcesso,
    byCausador,
    byDeteccao,
    bySetor: byCausador,
    bySetorQuadros,
    bySetorInternas,
    byDefeito
  };
}

function renderQualityColumnChart(items, valueKey='qtd', empty='Sem dados no período', metricLabel='NCs', gradientColors=['#2d8a4e','#66bb6a']){
  const startColor = Array.isArray(gradientColors) && gradientColors[0] ? gradientColors[0] : '#2d8a4e';
  const endColor = Array.isArray(gradientColors) && gradientColors[1] ? gradientColors[1] : '#66bb6a';
  if(!items || !items.length) return `<div style="color:#aaa;font-size:11px;padding:12px 0">${empty}</div>`;
  const top = items.slice(0,5);
  const maxVal = Math.max(...top.map(i=>Number(i[valueKey]||0)), 1);
  const w = 420, h = 190, ml = 26, mr = 10, mt = 16, mb = 52;
  const plotW = w-ml-mr, plotH = h-mt-mb;
  const barGap = 14;
  const barW = Math.max(26, (plotW - barGap*(top.length-1)) / top.length);
  const gradId = 'qcolGrad_' + Math.random().toString(36).slice(2,9);
  const valueTextColor = startColor.toLowerCase().includes('b91c1c') || startColor.toLowerCase().includes('ef4444') || startColor.toLowerCase().includes('cc2222') ? '#991b1b' : '#1e5a3a';
  return `<div style="margin-top:8px">
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="190" aria-label="${metricLabel}">
      <line x1="${ml}" y1="${mt+plotH}" x2="${w-mr}" y2="${mt+plotH}" stroke="#d9e1e8" stroke-width="1"></line>
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${startColor}"></stop>
          <stop offset="100%" stop-color="${endColor}"></stop>
        </linearGradient>
      </defs>
      ${top.map((i,idx)=>{
        const val = Number(i[valueKey]||0);
        const bh = Math.max(8, (val/maxVal)*plotH);
        const x = ml + idx*(barW+barGap);
        const y = mt + plotH - bh;
        const label = String(i.label||'—');
        const short = label.length > 13 ? label.slice(0,13)+'…' : label;
        return `
          <rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="7" fill="url(#${gradId})"></rect>
          <text x="${x + barW/2}" y="${y-6}" text-anchor="middle" style="font-size:11px;fill:${valueTextColor};font-weight:800">${val}</text>
          <text x="${x + barW/2}" y="${mt+plotH+16}" text-anchor="middle" style="font-size:10px;fill:#475569;font-weight:700">${short}</text>
        `;
      }).join('')}
    </svg>
  </div>`;
}

function getNcMonthlyTrend(monthKey){
  const info = parseMonthKey(monthKey || getMonthKey(new Date()));
  if(!info) return [];
  const months = [];
  for(let m=1; m<=12; m++){
    const key = `${info.year}-${String(m).padStart(2,'0')}`;
    const rng = getPeriodoProdutivo(key);
    let internas = 0;
    let externas = 0;
    if(rng){
      ncRegs.forEach(r=>{
        const dt = toISO(r.dataOcorrencia||'');
        if(!dt || dt<rng.startISO || dt>rng.endISO) return;
        if(classifyNcNatureza(r)==='Interna') internas += 1;
        else externas += 1;
      });
    }
    const hasNc = (internas + externas) > 0;
    const rawMeta = Object.prototype.hasOwnProperty.call(metasQualidade, key) ? Number(metasQualidade[key]) : null;
    months.push({
      key,
      label: new Date(info.year, m-1, 1).toLocaleDateString('pt-BR',{month:'short'}).replace('.', ''),
      internas: hasNc ? internas : null,
      externas: hasNc ? externas : null,
      meta: Number.isFinite(rawMeta) ? rawMeta : null,
      total: hasNc ? internas + externas : null
    });
  }
  return months;
}

function renderQualityMonthlyLineChart(monthKey){
  const data = getNcMonthlyTrend(monthKey);
  if(!data.length) return `<div style="color:#aaa;font-size:11px;padding:12px 0">Sem dados para montar tendência</div>`;
  const w = 760, h = 260, ml = 42, mr = 24, mt = 26, mb = 38;
  const plotW = w - ml - mr;
  const plotH = h - mt - mb;
  const values = [];
  data.forEach(d=>{
    ['internas','externas','meta'].forEach(k=>{ if(d[k]!==null && d[k]!==undefined && Number.isFinite(Number(d[k]))) values.push(Number(d[k])); });
  });
  const maxVal = Math.max(1, ...values);
  const xFor = idx => ml + (idx/11)*plotW;
  const yFor = val => mt + plotH - (Number(val||0)/maxVal)*plotH;
  const buildSegments = key => {
    const segs = [];
    let cur = [];
    data.forEach((d,idx)=>{
      const v = d[key];
      if(v===null || v===undefined || !Number.isFinite(Number(v))){
        if(cur.length>1) segs.push(cur);
        cur = [];
      }else{
        cur.push({x:xFor(idx), y:yFor(v), v});
      }
    });
    if(cur.length>1) segs.push(cur);
    return segs;
  };
  const polyline = (key, color, dashed='') => buildSegments(key).map(seg=>
    `<polyline points="${seg.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}" fill="none" stroke="${color}" stroke-width="3" ${dashed} stroke-linecap="round" stroke-linejoin="round"></polyline>`
  ).join('');
  const points = (key, color, textColor) => data.map((d,idx)=>{
    const v = d[key];
    if(v===null || v===undefined || !Number.isFinite(Number(v))) return '';
    const x = xFor(idx), y = yFor(v);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="#fff" stroke="${color}" stroke-width="2"></circle>
            <text x="${x.toFixed(1)}" y="${(y-8).toFixed(1)}" text-anchor="middle" style="font-size:9px;fill:${textColor};font-weight:800">${Number(v).toFixed(0)}</text>`;
  }).join('');
  const yTicks = Array.from({length:5}, (_,i)=>Math.round((maxVal/4)*i));
  return `<div style="margin-top:4px;display:flex;flex-direction:column;flex:1;min-height:0">
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap;flex-shrink:0">
      <div class="dash-chart-note">Janeiro a dezembro. Meses sem registros ou sem meta ficam em branco.</div>
      <div style="display:flex;gap:12px;font-size:10px;color:#475569;font-weight:700;flex-wrap:wrap">
        <span style="display:inline-flex;align-items:center;gap:5px"><i style="display:inline-block;width:18px;height:3px;background:#b91c1c;border-radius:5px"></i>Internas</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><i style="display:inline-block;width:18px;height:3px;background:#2a8080;border-radius:5px"></i>Externas</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><i style="display:inline-block;width:18px;height:3px;background:#d1a000;border-radius:5px;border-top:2px dashed #d1a000"></i>Meta interna</span>
      </div>
    </div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="260" aria-label="NCs internas, externas e meta por mês">
      <rect x="0" y="0" width="${w}" height="${h}" rx="12" fill="#fbfbfb"></rect>
      ${yTicks.map(t=>{
        const y = yFor(t);
        return `<line x1="${ml}" y1="${y.toFixed(1)}" x2="${w-mr}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1"></line>
                <text x="${ml-9}" y="${(y+3).toFixed(1)}" text-anchor="end" style="font-size:9px;fill:#64748b;font-weight:700">${t}</text>`;
      }).join('')}
      <line x1="${ml}" y1="${mt+plotH}" x2="${w-mr}" y2="${mt+plotH}" stroke="#cbd5e1" stroke-width="1"></line>
      ${polyline('meta', '#d1a000', 'stroke-dasharray="6 5"')}
      ${polyline('internas', '#b91c1c')}
      ${polyline('externas', '#2a8080')}
      ${points('meta', '#d1a000', '#9a6700')}
      ${points('internas', '#b91c1c', '#991b1b')}
      ${points('externas', '#2a8080', '#1f6f6f')}
      ${data.map((d,idx)=>`<text x="${xFor(idx).toFixed(1)}" y="${mt+plotH+20}" text-anchor="middle" style="font-size:9.5px;fill:#475569;font-weight:700">${d.label}</text>`).join('')}
    </svg>
  </div>`;
}

function addMonthsToKey(monthKey, delta){
  const info = parseMonthKey(monthKey);
  if(!info) return getPeriodoAtualKey();
  const d = new Date(info.year, info.month-1 + delta, 1, 12);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function gerNum(v){
  const n = normalizeHours(v);
  return Number.isFinite(n) ? n : 0;
}
function gerPctVal(real, meta){
  real = gerNum(real); meta = gerNum(meta);
  if(!meta) return 0;
  return ((real - meta) / meta) * 100;
}
function gerFmtDelta(real, meta, suffix=''){
  real = gerNum(real); meta = gerNum(meta);
  if(!meta) return '—';
  const d = real - meta;
  const sign = d > 0 ? '+' : '';
  return `${sign}${suffix==='%' ? d.toFixed(1) : d.toFixed(2)}${suffix}`;
}
function gerFmtTrend(current, previous, suffix=''){
  current = gerNum(current); previous = gerNum(previous);
  if(!previous) return '—';
  const pct = ((current - previous) / previous) * 100;
  const arrow = pct > 0 ? '↑' : pct < 0 ? '↓' : '→';
  return `${arrow} ${pct>0?'+':''}${pct.toFixed(1)}% vs ant.`;
}
function gerClassByTarget(real, meta, inverse=false){
  real = gerNum(real); meta = gerNum(meta);
  if(!meta) return 'neutral';
  const ratio = real / meta;
  if(inverse){
    if(ratio <= 1) return 'ok';
    if(ratio <= 1.15) return 'warn';
    return 'dan';
  }
  if(ratio >= 1) return 'ok';
  if(ratio >= .9) return 'warn';
  return 'dan';
}
function gerQualClass(taxa){
  taxa = gerNum(taxa);
  if(taxa < 0.02) return 'ok';
  if(taxa <= 0.05) return 'warn';
  return 'dan';
}
function gerCapClass(ocup){
  ocup = gerNum(ocup);
  if(!ocup) return 'neutral';
  if(ocup < .80) return 'warn';
  if(ocup <= 1) return 'ok';
  return 'dan';
}
function gerStatusLabel(cls){
  return cls==='ok' ? '🟢 Dentro do esperado' : cls==='warn' ? '🟡 Em atenção' : cls==='dan' ? '🔴 Crítico' : '⚪ Sem base';
}
function getGerencialManual(periodKey){
  const base = gerencialResumos[periodKey] || {};
  return {

function getGerencialStats(periodKey){
  const rng = getPeriodoProdutivo(periodKey);
  const prevKey = addMonthsToKey(periodKey, -1);
  const nextKey = addMonthsToKey(periodKey, 1);
  const finalizados = rng ? getProducedPedidosPeriodo(rng.startISO, rng.endISO) : [];
  const prevRng = getPeriodoProdutivo(prevKey);
  const prevFinalizados = prevRng ? getProducedPedidosPeriodo(prevRng.startISO, prevRng.endISO) : [];
  const qualidade = getNcPeriodo(periodKey);
  const prevQualidade = getNcPeriodo(prevKey);
  const efet = getEfetividadePeriodo(periodKey);
  const prevEfet = getEfetividadePeriodo(prevKey);
  const manual = getGerencialManual(periodKey);
  const novosProx = pedidos.filter(p=>getPedidoPeriodoKey(p)===nextKey);
  const coletados = rng ? pedidos.filter(p=>{
    const dt = toISO(p.coleta || '');
    return dt && dt>=rng.startISO && dt<=rng.endISO;
  }) : [];
  const finalUrp = urpTotal(finalizados);
  const prevUrp = urpTotal(prevFinalizados);
  const totalColabs = manual.colaboradoresEfetivos + manual.colaboradoresExperiencia;
  const urpPorColab = totalColabs ? finalUrp / totalColabs : 0;
  const ncIntTaxa = finalUrp ? qualidade.internas / finalUrp : 0;
  const ncExtTaxa = finalUrp ? qualidade.externas / finalUrp : 0;
  const ncInstTaxa = finalUrp ? manual.ncInstalacao / finalUrp : 0;
  const novosUrp = urpTotal(novosProx);
  const ocupacao = manual.capacidadeUrp ? novosUrp / manual.capacidadeUrp : 0;
  const perfPedidoCls = gerClassByTarget(finalizados.length, manual.metaPedidos);
  const perfUrpCls = gerClassByTarget(finalUrp, manual.metaUrp);
  const perfEfetCls = gerClassByTarget(efet.efetiv, manual.metaEfetividade);
  const ncIntCls = manual.metaNcInterna ? gerClassByTarget(qualidade.internas, manual.metaNcInterna, true) : gerQualClass(ncIntTaxa);
  const capCls = gerCapClass(ocupacao);
  let worst = 'ok';
  const order = {ok:0, warn:1, dan:2, neutral:0};
  [perfPedidoCls, perfUrpCls, perfEfetCls, ncIntCls, capCls].forEach(c=>{ if(order[c]>order[worst]) worst=c; });
  return {
    periodKey, prevKey, rng, nextKey, nextLabel:getMonthLabel(nextKey),
    finalizadosQtd: finalizados.length,
    finalizadosUrp: finalUrp,
    prevFinalizadosQtd: prevFinalizados.length,
    prevFinalizadosUrp: prevUrp,
    efetividade: efet,
    prevEfetividade: prevEfet,
    ncInternas: qualidade.internas,
    ncExternas: qualidade.externas,
    prevNcInternas: prevQualidade.internas,
    prevNcExternas: prevQualidade.externas,
    ncInstalacao: manual.ncInstalacao,
    ncIntTaxa, ncExtTaxa, ncInstTaxa,
    colaboradoresEfetivos: manual.colaboradoresEfetivos,
    colaboradoresExperiencia: manual.colaboradoresExperiencia,
    supervisores: manual.supervisores,
    totalColabs, urpPorColab,
    capacidadeUrp: manual.capacidadeUrp,
    ocupacao,
    novosPedidosQtd: novosProx.length,
    novosPedidosUrp: novosUrp,
    coletadosQtd: coletados.length,
    coletadosUrp: urpTotal(coletados),
    classes: { perfPedidoCls, perfUrpCls, perfEfetCls, ncIntCls, capCls, geral: worst },
    manual
  };
}

function refreshGerencialFromFields(){
  if(!CU || CU.role!=='admin') return;
  const periodKey = gerencialPeriodoSel || getPeriodoAtualKey();
  const current = gerencialResumos[periodKey] || {};
  gerencialResumos = { ...gerencialResumos, [periodKey]: { ...current, ...collectGerencialFormData() } };
  render();
}
async function saveGerencialResumo(){
  if(!CU || CU.role!=='admin'){ showToast('Acesso restrito ao administrador.','err'); return; }
  const periodKey = gerencialPeriodoSel || getPeriodoAtualKey();
  const data = {
    ...collectGerencialFormData(),
    atualizadoPor: CU ? CU.name : '',
    atualizadoEmISO: new Date().toISOString()
  };
  try{
    gerencialResumos = { ...gerencialResumos, [periodKey]: data };
    await db.collection('config').doc('gerencialResumos').set({
      periods: gerencialResumos,
      atualizadoPor: CU ? CU.name : '',
      atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge:true });
    showToast('Resumo gerencial salvo!','ok');
    render();
  }catch(e){ showToast('Erro ao salvar resumo gerencial: '+e.message,'err',5000); }
}

function renderPedidos(){
  const ordered = getOrderedPedidos();
  const useDefaultView = shouldUseDefaultPedidosView();
  const list=ordered.filter(p=>{
    const mq=!pedSearch||((p.at||'')+(p.cliente||'')+(p.cidade||'')).toLowerCase().includes(pedSearch);
    const ml=!pedFsetores.length || pedFsetores.some(f=>matchPedidoLocalizacao(p, f));
    const ma=!pedFano||String(p.ano)===pedFano;
    const mm=!pedFMeses.length||pedFMeses.includes(String(p.mes||''));
    const mp=!pedFpersiana||(pedFpersiana==='sim'?isPersianaValida(p.persiana):!isPersianaValida(p.persiana));
    const me=!pedFexterno||(pedFexterno==='externo'?isPedidoExternoLogistica(p):!isPedidoExternoLogistica(p));
    const md=matchesPedidosViewMode(p);
    return mq&&ml&&ma&&mm&&mp&&me&&md;
  });
  const totalURP=urpTotal(list).toFixed(2);
  const totalPersianas=subtotalPersianas(list).toFixed(0);
  const selectedUrpSum = getSelectedUrpSum(list);
  const selectedUrpCount = list.filter(p=>isUrpSelected(p.id)).length;
  const dragEnabled = can('editar');
  const pedidosAbertos = list.filter(p=>!isPedidoFinalizado(p));
  const emProducaoSetoresPedidos = ['1. Corte','2. Montagem','3. Baixar Intranet'];
  const pedEmProducao = pedidosAbertos.filter(p=>emProducaoSetoresPedidos.includes(String(p.setor||''))).length;
  const pedExpedicao = pedidosAbertos.filter(p=>isPedidoEmExpedicao(p)).length;
  const pedAtrasados = pedidosAbertos.filter(p=>getPedidoPrior(p)==='ATRASADO').length;
  const pedExternos = list.filter(p=>isPedidoExternoLogistica(p)).length;
  const filtrosAtivos = [pedFsetores.length?'localização':'', pedFMeses.length?'mês':'', pedFano?'ano':'', pedFpersiana?'persiana':'', pedSearch?'busca':''].filter(Boolean);

  const rows=list.map((p,i)=>{
    const cpBg=COR_PED_BG[p.corPed]||'#f8f8f8', cpFg=COR_PED_FG[p.corPed]||'#333';
    const ri=p.ressalvas&&p.ressalvas.length?`<span style="color:#e07b1a;font-size:10px;margin-left:3px;cursor:pointer" title="${p.ressalvas[p.ressalvas.length-1].texto}" onclick="openDet('${p.id}')">⚠${p.ressalvas.length}</span>`:'';
    const ps=prazoStyle(p.prazo);
    const bRow=i%2===0?'#fff':'#f0f4f0';
    const isExt = isPedidoExternoLogistica(p);
    const extBadge = isExt ? '<span class="ped-ext-badge">Externo</span>' : '';
    let ac=`<button onclick="openDet('${p.id}')" style="padding:3px 7px;border:1px solid var(--ph);background:#fff;color:var(--ph);border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">Ver</button>`;
    if(can('avancar')&&p.setor&&!p.setor.includes('5. Entregue')&&deriveStatusFromSetor(p.setor)!=='Finalizado')
      ac+=` <button onclick="avancarSetor('${p.id}')" style="padding:3px 7px;border:1px solid var(--pconcl);background:#fff;color:var(--pconcl);border-radius:3px;cursor:pointer;font-size:10px;font-weight:700" title="Avançar setor">›</button>`;
    if(can('coleta')&&(((p.setor||'').includes('4. Expedi')) || p.status==='Aguardando coleta'))
      ac+=` <button onclick="openColeta('${p.id}')" style="padding:3px 7px;background:var(--pcoleta);border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">Coleta</button>`;
    if(isPedidoFinalizado(p) && (p.coleta || (Array.isArray(p.checklistExpedicao) && p.checklistExpedicao.length)))
      ac+=` <button onclick="openColetaView('${p.id}')" style="padding:3px 7px;border:1px solid var(--pcoleta);background:#fff;color:var(--pcoleta);border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">Ver coleta</button>`;
    if(can('deletar')&&p.status!=='Finalizado')
      ac+=` <button onclick="confirmDelete('${p.id}')" style="padding:3px 7px;border:1px solid #cc2222;background:#fff;color:#cc2222;border-radius:3px;cursor:pointer;font-size:10px" title="Excluir">✕</button>`;

    const editCell=(field, value, type='text')=>can('editar')
      ? `<td class="editable-cell" style="border:1px solid var(--pbor);padding:5px 7px;cursor:pointer" ondblclick="return startInlineEdit('${p.id}','${field}',this,'${type}')" title="Duplo clique para editar">${value||'—'}</td>`
      : `<td style="border:1px solid var(--pbor);padding:5px 7px">${value||'—'}</td>`;

    const dragTd = dragEnabled
      ? `<td class="drag-col" style="border:1px solid var(--pbor);padding:5px 4px"><span class="drag-handle" title="Arrastar para reordenar" draggable="true" ondragstart="handleDragStart(event,'${p.id}')" ondragend="handleDragEnd()">⋮⋮</span></td>`
      : `<td class="drag-col" style="border:1px solid var(--pbor);padding:5px 4px;color:#ccc">⋮⋮</td>`;

    // Build cell map keyed by column key
    const cellMap = {
      ano:      `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#888;font-size:10px">${p.ano||'—'}</td>`,
      mes:      `<td style="border:1px solid var(--pbor);padding:5px 7px;font-weight:700;color:var(--ph)">${(p.mes||'').replace(/^\d+\. /,'')}</td>`,
      id:       `<td style="border:1px solid var(--pbor);padding:5px 7px;text-align:center"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:700;color:#fff;background:${COR_SEMANA_BADGE[p.corSemana]||'#555'}">${p.numPed||'—'}</span></td>`,
      nomes:    `<td style="border:1px solid var(--pbor);padding:5px 9px;text-align:left">${(p.cliente||'').length>30?(p.cliente||'').substr(0,30)+'…':(p.cliente||'')}${ri}${extBadge}</td>`,
      pedido:   `<td style="border:1px solid var(--pbor);padding:5px 7px;text-align:left;font-weight:700;color:#1a3a6a">${p.at||''}</td>`,
      cidade:   `<td style="border:1px solid var(--pbor);padding:5px 7px">${p.cidade||'—'}</td>`,
      uf:       `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#888">${p.uf||''}</td>`,
      urp:      `<td class="urp-selectable ${isUrpSelected(p.id)?'urp-selected':''}" style="border:1px solid var(--pbor);padding:5px 7px;font-weight:700" onclick="toggleUrpSelection('${p.id}')" title="Clique para selecionar e somar URPs">${(Number(p.urp)||0).toFixed(2)}</td>`,
      dtImp:    `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#888">${fmt(p.dtImp)}</td>`,
      setor:    `<td style="border:1px solid var(--pbor);padding:5px 7px">${setorBadge(p.setor)}</td>`,
      prazo:    `<td style="border:1px solid var(--pbor);padding:5px 7px;${ps}">${p.prazo?fmt(p.prazo):'—'}</td>`,
      prioridade:`<td style="border:1px solid var(--pbor);padding:5px 7px">${priorHTML(getPedidoPrior(p))}</td>`,
      prevTEC:  editCell('prevTEC', fmt(p.prevTEC), 'date'),
      conclProd:editCell('conclProd', fmt(p.conclProd), 'date'),
      coleta:   `<td style="border:1px solid var(--pbor);padding:5px 7px;color:${p.coleta?'var(--pcoleta)':'#ccc'};font-weight:${p.coleta?'700':'400'}">${fmt(p.coleta)||'—'}</td>`,
      corPed:   `<td style="border:1px solid var(--pbor);padding:5px 7px;text-align:center">${renderCorPedBola(p.corPed)}</td>`,
      persiana: `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#666">${p.persiana||'N/A'}</td>`,
      acoes:    `<td class="acoes-col" style="border:1px solid var(--pbor);padding:5px 7px;white-space:nowrap">${ac}</td>`,
    };

    return `<tr class="${isExt?'ped-row-external':''}" style="background:${bRow}" data-pedido-id="${p.id}" ${dragEnabled?`ondragover="handleDragOver(event,'${p.id}')" ondrop="handleDrop(event,'${p.id}')" ondragleave="handleDragLeave(event,'${p.id}')"`:''}>
      ${dragTd}
      ${colOrder.filter(key=>!colHidden.has(key)).map(key=>cellMap[key]||'').join('')}
    </tr>`;
  }).join('');

  const mkSel=(id,v,opts)=>`<select id="${id}" class="sSel" onchange="pedF('${id}',this.value)">${opts.map(([ov,ol])=>`<option value="${ov}"${v===ov?' selected':''}>${ol}</option>`).join('')}</select>`;
  const reorderHint = dragEnabled
    ? `<span class="reorder-hint">↕ Arraste pela alça para mudar a sequência dos pedidos</span>`
    : (can('editar') ? `<span class="reorder-hint warn">Para reordenar, limpe busca e filtros</span>` : '');

  return `<div class="ped-shell">
    <div class="ped-toolbar">
      <div class="ped-title-wrap">
        <span class="ped-title">Pedidos</span>
        <span class="ped-view-chip">${getPedidosViewModeLabel()}</span>
      </div>
      <div class="ped-search">
        <span>⌕</span>
        <input id="ped-search-main" type="text" placeholder="AT, cliente, cidade..." value="${pedSearch}" oninput="pedF('srch',this.value)" />
      </div>
      <div class="ped-chip-row">
        <span class="ped-mini-chip"><b>${list.length}</b> listados</span>
        <span class="ped-mini-chip"><b>${totalURP}</b> URP</span>
        ${selectedUrpCount>0 ? `<span class="ped-mini-chip teal"><b>${selectedUrpSum.toFixed(2)}</b> sel.</span>` : ``}
        ${filtrosAtivos.length ? `<span class="ped-mini-chip orange"><b>${filtrosAtivos.length}</b> filtros</span>` : ``}
      </div>
      <div class="ped-action-cluster">
        ${can('criar')?`<button class="sBtn green" onclick="openModal('novo')">+ Novo</button>`:''}
        <details class="ped-more">
          <summary class="sBtn">Mais ▾</summary>
          <div class="ped-more-panel">
            <div class="ped-more-card">
              <div class="ped-more-card-title">Filtros e visão</div>
              <div class="ped-filter-grid">
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="sBtn ${pedViewMode==='padrao'?'green':''}" onclick="setPedidosViewMode('padrao')">Visão padrão</button>
                  <button class="sBtn ${pedViewMode==='mesAtual'?'green':''}" onclick="setPedidosViewMode('mesAtual')">Período atual</button>
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  ${mkSel('fano',pedFano,[['','Todos os anos'],['2026','2026'],['2025','2025']])}
                  ${mkSel('fpersiana',pedFpersiana,[['','Persiana: todos'],['sim','Com persiana'],['nao','Sem persiana']])}
                </div>
                <div class="ped-filter-pop">
                  <button type="button" class="ped-fdrop-btn ${pedFsetores.length?'active':''}" onclick="pedToggleDrop('drop-localizacao')">
                    ${localizacaoFilterLabel()} ▾
                  </button>
                  <div class="ped-fdrop-menu ${pedOpenMultiFilter==='localizacao'?'open':''}" id="drop-localizacao">
                    ${['0. Pendente corte','1. Corte','2. Montagem','3. Baixar Intranet','4. Expedição','5. Finalizado'].map(v=>`<label><input type="checkbox" ${pedFsetores.includes(v)?'checked':''} onchange="toggleLocalizacaoFilter('${v}', this.checked)"/> ${v}</label>`).join('')}
                    <div class="ped-fdrop-footer"><button type="button" class="sBtn" style="padding:4px 8px;font-size:10px" onclick="clearLocalizacaoFilter()">Limpar</button></div>
                  </div>
                </div>
                <div class="ped-filter-pop">
                  <button type="button" class="ped-fdrop-btn ${pedFMeses.length?'active':''}" onclick="pedToggleDrop('drop-mes')">
                    Mês: ${monthFilterLabel()} ▾
                  </button>
                  <div class="ped-fdrop-menu ${pedOpenMultiFilter==='mes'?'open':''}" id="drop-mes">
                    ${MONTH_OPTIONS.map(v=>`<label><input type="checkbox" ${pedFMeses.includes(v)?'checked':''} onchange="toggleMonthFilter('${v}', this.checked)"/> ${v.replace(/^\d+\. /,'')}</label>`).join('')}
                    <div class="ped-fdrop-footer"><button type="button" class="sBtn" style="padding:4px 8px;font-size:10px" onclick="clearMonthFilter()">Limpar</button></div>
                  </div>
                </div>
                <div class="ped-filter-pop">
                  <button type="button" class="ped-fdrop-btn ${pedFexterno?'active':''}" onclick="pedToggleDrop('drop-externo')">
                    Origem: ${pedFexterno==='externo'?'Externos':pedFexterno==='interno'?'Internos':'Todos'} ▾
                  </button>
                  <div class="ped-fdrop-menu ${pedOpenMultiFilter==='externo'?'open':''}" id="drop-externo" style="min-width:160px">
                    <label><input type="radio" name="ped-externo" value="" ${!pedFexterno?'checked':''} onchange="setPedFexterno('')"/> Todos</label>
                    <label><input type="radio" name="ped-externo" value="interno" ${pedFexterno==='interno'?'checked':''} onchange="setPedFexterno('interno')"/> Somente internos</label>
                    <label><input type="radio" name="ped-externo" value="externo" ${pedFexterno==='externo'?'checked':''} onchange="setPedFexterno('externo')"/> Somente externos</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="ped-more-card">
              <div class="ped-more-card-title">Ações e leitura</div>
              <div class="ped-more-actions">
                <span class="urp-total">Total: ${totalURP} URPs</span>
                <span class="urp-total" style="background:#6b7280">Persianas: ${totalPersianas}</span>
                ${selectedUrpCount>0 ? `<span class="urp-total" style="background:#0f766e">Selecionadas: ${selectedUrpSum.toFixed(2)} (${selectedUrpCount})</span><button class="sBtn" onclick="clearUrpSelection()">Limpar seleção</button>` : ``}
                ${can('exportar')?`<button class="sBtn teal" onclick="exportExcel()">↓ Excel</button>`:''}
                ${can('exportar')?`<button class="sBtn" onclick="printReport()">Imprimir</button>`:''}
                ${can('importar')?`<button class="sBtn orange" onclick="openModal('importar')">↑ Importar</button>`:''}
                <button class="sBtn" onclick="openModal('colunas')" title="Mostrar/ocultar colunas">⊞ Colunas${colHidden.size>0 ? (' <span style="background:#e07b1a;color:#fff;border-radius:10px;padding:0 5px;font-size:9px;font-weight:700">' + colHidden.size + '</span>') : ''}</button>
              </div>

              ondragstart="colDragStart(event,'${c.key}')"
              ondragover="colDragOver(event,'${c.key}')"
              ondrop="colDrop(event,'${c.key}')"
              ondragleave="colDragLeave(event,'${c.key}')"
              ondragend="colDragEnd()"
              title="Arrastar para mover coluna">${c.label}</th>`;
          }).join('')}
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="19" style="text-align:center;padding:20px;color:#aaa;border:1px solid var(--pbor)">Nenhum pedido encontrado</td></tr>`}</tbody>
      </table>
    <!--TABLE_END--></div>
  </div>`;
}

function pedF(id,v){
  if(id==='srch')       pedSearch=v.toLowerCase().trim();
  else if(id==='fano')  pedFano=v;
  else if(id==='fpersiana') pedFpersiana=v;
  render();
}

function normalizeInlineDateValue(v){
  const iso = toISO(v);
  return /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso : '';
}

function startInlineEdit(id, field, cell, type='text'){
  try{
    const ev = window.event;
    if(ev){ ev.preventDefault(); ev.stopPropagation(); }
    if(!can('editar')){ showToast('Sem permissão para editar este campo.','err'); return false; }
    if(!id || !field || !cell) return false;
    if(cell.dataset && cell.dataset.editing === '1') return false;

    const pedido = pedidos.find(p => String(p.id) === String(id));
    if(!pedido){ showToast('Pedido não encontrado para edição.','err'); return false; }

    const originalValue = pedido[field] || '';
    const input = document.createElement('input');
    input.className = 'inline-edit';
    input.type = type === 'date' ? 'date' : 'text';
    input.value = input.type === 'date' ? normalizeInlineDateValue(originalValue) : String(originalValue || '');

    const originalHtml = cell.innerHTML;
    cell.dataset.editing = '1';
    cell.innerHTML = '';
    cell.appendChild(input);

    let saving = false;
    let cancelled = false;

    const restore = () => {
      cell.dataset.editing = '0';
      cell.innerHTML = originalHtml || '—';
    };

    const commit = async () => {
      if(saving || cancelled) return;
      saving = true;
      const newValue = input.type === 'date' ? normalizeInlineDateValue(input.value) : sanitizeText(input.value, 300);
      if(String(newValue || '') === String(originalValue || '')){ restore(); return; }

      try{
        await savePedido({ [field]: newValue }, id);
        pedido[field] = newValue;
        cell.dataset.editing = '0';
        cell.innerHTML = newValue ? fmt(newValue) : '—';
        showToast('Campo atualizado.','ok');
        if(['conclProd','urp','setor','status'].includes(field)){
          setTimeout(()=>render(), 120);
        }
      }catch(err){
        console.error('Erro ao editar campo inline:', err);
        restore();
        showToast('Erro ao salvar edição: ' + (err.message || err), 'err', 5000);
      }
    };

    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('dblclick', e => e.stopPropagation());
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if(e.key === 'Enter'){ e.preventDefault(); input.blur(); }
      if(e.key === 'Escape'){ e.preventDefault(); cancelled = true; restore(); }
    });
    input.addEventListener('blur', () => { setTimeout(commit, 0); });

    setTimeout(() => { input.focus(); if(input.type !== 'date') input.select(); }, 0);
    return false;
  }catch(err){
    console.error('Falha ao iniciar edição inline:', err);
    showToast('Erro ao abrir edição: ' + (err.message || err), 'err', 5000);
    return false;
  }
}

async function deleteEfetividadePeriodo(periodKey){
  if(!(CU && (CU.role==='admin' || can('editar')))){
    showToast('Você não tem permissão para excluir este período.', 'err');
    return;
  }
  if(!confirm(`Excluir o lançamento de efetividade do período ${periodKey}?`)) return;
  try{
    showLoading('Excluindo período de efetividade...');
    await db.collection('efetividadeSemanal').doc(periodKey).delete();

function updateEfetividadePreview(){

  const hTrab = normalizeHours(fv('ef-htrab'));
  const hExt  = normalizeHours(fv('ef-hextra'));
  const hImp  = normalizeHours(fv('ef-himp'));
  const efetiv = calcEfetividadeValue(urps, hTrab, hExt, hImp);
  const faixa = getEfetividadeFaixa(efetiv);
  const prev = $('ef-prev-box');
  if(prev){
    prev.textContent = `${fmtPct(efetiv)} · ${faixa.label}`;

                     faixa.cls==='regular' ? 'prior-display prior-prior-bg' :

function filterNcTable(term){
  const q = String(term||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  document.querySelectorAll('#nc-table-body tr').forEach(tr=>{
    const src = String(tr.getAttribute('data-nc-search')||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    tr.style.display = (!q || src.includes(q)) ? '' : 'none';
  });
}

function mapNcImportRow(row){
  const pick = (...keys) => {
    for(const k of keys){
      if(Object.prototype.hasOwnProperty.call(row,k) && row[k]!==undefined && row[k]!==null) return row[k];
    }
    return '';
  };
  const processo = String(pick('processo','Processo')).trim();
  const defeitoNrRaw = pick('defeitoNr','n do defeito','Nº do defeito','Defeito');
  const defeitoNr = defeitoNrRaw === '' ? '' : String(defeitoNrRaw).trim();
  const draft = {
    dataOcorrencia: toISO(pick('dataOcorrencia','Data da ocorrência','data')),
    idSetor: String(pick('idSetor','ID_Setor','ID setor')).trim(),
    setorOrigem: String(pick('setorOrigem','Setor de origem')).trim(),
    at: String(pick('at','AT','Nº AT')).trim(),
    feld: String(pick('feld','Feld')).trim() || NC_FELD_OPTIONS[0],
    codigo: String(pick('codigo','Código','Codigo')).trim(),
    cor: String(pick('cor','Cor')).trim(),
    reposicao: String(pick('reposicao','Reposição','Reposicao')).trim() || 'Parcial',
    largura: pick('largura','Largura','Largura (mm)'),
    altura: pick('altura','Altura','Altura (mm)'),
    compr: pick('compr','Compr.','Comprimento','Comprimento (mm)'),
    quantidadeQuadros: pick('quantidadeQuadros','Quantidade de quadros','Qtd Quadros','Quadros') || 1,
    disposicao: String(pick('disposicao','Disposição','Disposicao')).trim() || NC_DISPOSICAO_OPTIONS[0],
    processo,
    defeitoNr,
    descricaoOcorrencia: String(pick('descricaoOcorrencia','Descrição/ocorrência','Descricao')).trim(),
    turno: String(pick('turno','Turno')).trim() || NC_TURNO_OPTIONS[0],
    material: String(pick('material','PVC/Alumínio','PVC/Aluminio','Material')).trim() || NC_MATERIAL_OPTIONS[0],
    grupo: String(pick('grupo','Grupo')).trim() || NC_GRUPO_OPTIONS[0],
    observacoes: String(pick('observacoes','Observações','Observacoes')).trim()
  };
  recalcNcDraft(draft);
  return {
    ...draft,
    criadoPorUid: CU ? CU.uid : '',
    criadoPorNome: CU ? CU.name : '',
    criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
    atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };
}

async function triggerNcImport(){
  if(!(can('apontar_nc')||CU.role==='admin')){
    showToast('Você não tem permissão para importar NC.','err');
    return;
  }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls';
  input.onchange = async (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if(!file) return;
    showLoading('Importando não conformidades...');
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){
        hideLoading();
        showToast('Planilha vazia.','info');
        return;
      }
      const mapped = rows.map(mapNcImportRow).filter(Boolean);
      const batchSize = 250;
      for(let i=0;i<mapped.length;i+=batchSize){
        const chunk = mapped.slice(i, i+batchSize);
        const batch = db.batch();
        chunk.forEach(item => {
          const ref = db.collection('naoConformidades').doc();
          batch.set(ref, item);
        });
        await batch.commit();
      }
      hideLoading();
      showToast(`${mapped.length} NC(s) importadas com sucesso.`,'ok',3500);
    }catch(e){
      hideLoading();
      showToast('Erro ao importar NC: '+e.message,'err',5000);
    }
  };
  input.click();
}

async function migrarSetoresAntigos(executar){
  const statusEl = document.getElementById('mig-status');
  if(statusEl) statusEl.textContent = executar ? 'Executando migração...' : 'Verificando...';

  try{
    const snap = await db.collection('pedidos').get();
    const afetados = [];
    snap.forEach(doc => {
      const d = doc.data();
      const setor = d.setor || '';
      const status = d.status || '';
      // Detecta setores antigos
      if(setor === '3. Expedição' || setor === '4. Entregue' ||
         setor.startsWith('3. Expedi') || setor.startsWith('4. Entregue')){
        afetados.push({ id: doc.id, setorAntigo: setor, statusAntigo: status });
      }
    });

    if(!afetados.length){
      if(statusEl) statusEl.innerHTML = '<span style="color:#1e5a3a">✓ Nenhum pedido com setor antigo encontrado. Já está tudo atualizado!</span>';
      return;
    }

    if(!executar){
      if(statusEl) statusEl.innerHTML =
        `<span style="color:#cc6600">⚠ ${afetados.length} pedido(s) com setor antigo:<br>` +
        afetados.map(a=>`• ${a.id.substring(0,8)}… → setor: <strong>${a.setorAntigo}</strong>`).join('<br>') +
        `</span>`;
      return;
    }

    // Executar migração em batch
    showLoading('Migrando ' + afetados.length + ' pedido(s)...');
    let ok = 0, errs = 0;
    // Firestore batch limit = 500
    for(let i = 0; i < afetados.length; i += 400){
      const chunk = afetados.slice(i, i + 400);
      const batch = db.batch();
      chunk.forEach(p => {
        let novoSetor = p.setorAntigo;
        let novoStatus = p.statusAntigo;
        if(p.setorAntigo === '3. Expedição' || p.setorAntigo.startsWith('3. Expedi')){
          novoSetor = '4. Expedição';
          novoStatus = 'Aguardando coleta';
        } else if(p.setorAntigo === '4. Entregue' || p.setorAntigo.startsWith('4. Entregue')){
          novoSetor = '5. Entregue';
          novoStatus = 'Finalizado';
        }
        batch.update(db.collection('pedidos').doc(p.id), {
          setor: novoSetor,
          status: novoStatus,
          atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      try{ await batch.commit(); ok += chunk.length; }
      catch(e){ errs += chunk.length; console.error('Batch erro:', e); }
    }
    hideLoading();
    const msg = ok + ' pedido(s) migrado(s) com sucesso' + (errs ? ', ' + errs + ' erro(s)' : '') + '.';
    if(statusEl) statusEl.innerHTML = `<span style="color:#1e5a3a">✓ ${msg}</span>`;
    showToast(msg, errs ? 'info' : 'ok', 5000);
    render();
  } catch(e){
    hideLoading();
    const msg = 'Erro na migração: ' + e.message;
    if(statusEl) statusEl.textContent = msg;
    showToast(msg, 'err', 7000);
  }
}

async function salvarExpDireta(){
  const at = fv('ex-at').trim();
  const cliente = fv('ex-cliente').trim();
  const urp = parseFloat(fv('ex-urp')) || 0;
  const dataEntrada = fv('ex-data') || new Date().toISOString().substring(0,10);
  if(!at || !cliente){ showToast('Preencha AT e cliente.','err'); return; }
  if(urp <= 0){ showToast('Informe a URP do pedido.','err'); return; }
  const ano = yearFromISO(dataEntrada);
  const mes = monthOptionFromISO(dataEntrada);
  const seq = pedidos.filter(p=>p.mes===mes&&Number(p.ano)===Number(ano)).length+1;
  const payload = {
    seq, ano, mes, at,
    cliente,
    cidade: fv('ex-cidade').trim(),
    uf: fv('ex-uf').trim().toUpperCase(),
    urp,
    dtImp: dataEntrada,
    dataEntradaExpedicao: dataEntrada,
    setor: '4. Expedição',
    status: 'Aguardando coleta',
    prazo: fv('ex-prazo'),
    prevTEC: fv('ex-prev'),
    montagem:'', conclProd:'', coleta:'',
    corSemana: 0, corPed: 0, numPed: String(seq),
    prior: calcPrior(fv('ex-prazo'), '4. Expedição'),
    persiana:'N/A', ressalvas: expDiretaDraft.obs ? [{user:CU.name, data:new Date().toLocaleString('pt-BR'), texto:'Entrada direta na expedição: '+expDiretaDraft.obs}] : [],
    origemPedido:'LOGISTICA_EXTERNA', tipoEntrada:'DIRETO_EXPEDICAO', producaoLocal:false,
    criadoPor: CU.uid, criadoPorNome: CU.name
  };
  showLoading('Adicionando na expedição...');
  try{
    await savePedido(payload);
    expDiretaDraft = {};
    modalState = null;
    hideLoading();
    showToast('Pedido adicionado direto na expedição.','ok');
    render();
  }catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

// ============================================================
// DRAG & DROP — REORDENAÇÃO DE PEDIDOS E COLUNAS
// Corrige erro de link/tela quebrada ao arrastar: os handlers eram chamados no HTML,
// mas não estavam declarados. Também impede o comportamento padrão do navegador.
// ============================================================
function clearRowDragClasses(){
  document.querySelectorAll('tr.dragging,tr.drag-over-top,tr.drag-over-bottom').forEach(el=>{
    el.classList.remove('dragging','drag-over-top','drag-over-bottom');
  });
}

function handleDragStart(ev, pedidoId){
  try{
    if(ev){
      ev.stopPropagation();
      if(ev.dataTransfer){
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', String(pedidoId));
      }
    }
    dragPedidoId = String(pedidoId);
    dragOverPedidoId = null;
    dragOverPosition = null;
    const tr = document.querySelector(`tr[data-pedido-id="${CSS.escape(String(pedidoId))}"]`);
    if(tr) tr.classList.add('dragging');
  }catch(e){ console.warn('Falha ao iniciar arraste:', e); }
}

function handleDragOver(ev, pedidoId){
  try{
    if(ev){ ev.preventDefault(); ev.stopPropagation(); if(ev.dataTransfer) ev.dataTransfer.dropEffect = 'move'; }
    if(!dragPedidoId || String(pedidoId)===String(dragPedidoId)) return false;
    clearRowDragClasses();
    const tr = document.querySelector(`tr[data-pedido-id="${CSS.escape(String(pedidoId))}"]`);
    if(!tr) return false;
    const rect = tr.getBoundingClientRect();
    const pos = ev && ev.clientY < rect.top + rect.height/2 ? 'top' : 'bottom';
    dragOverPedidoId = String(pedidoId);
    dragOverPosition = pos;
    tr.classList.add(pos === 'top' ? 'drag-over-top' : 'drag-over-bottom');
    const dragged = document.querySelector(`tr[data-pedido-id="${CSS.escape(String(dragPedidoId))}"]`);
    if(dragged) dragged.classList.add('dragging');
    return false;
  }catch(e){ console.warn('Falha no dragover:', e); return false; }
}

function handleDragLeave(ev, pedidoId){
  try{
    if(ev) ev.stopPropagation();
    const tr = document.querySelector(`tr[data-pedido-id="${CSS.escape(String(pedidoId))}"]`);
    if(tr) tr.classList.remove('drag-over-top','drag-over-bottom');
  }catch(e){ console.warn('Falha no dragleave:', e); }
}

async function handleDrop(ev, pedidoId){
  try{
    if(ev){ ev.preventDefault(); ev.stopPropagation(); }
    const sourceId = String(dragPedidoId || (ev && ev.dataTransfer ? ev.dataTransfer.getData('text/plain') : ''));
    const targetId = String(pedidoId || dragOverPedidoId || '');
    const position = dragOverPosition || 'bottom';
    if(!sourceId || !targetId || sourceId === targetId){ handleDragEnd(); return false; }
    if(!can('editar')){ showToast('Sem permissão para reordenar pedidos.','err'); handleDragEnd(); return false; }

    const globalIds = getOrderedPedidos().map(p=>String(p.id)).filter(Boolean);
    if(!globalIds.includes(sourceId) || !globalIds.includes(targetId)){ handleDragEnd(); return false; }

    // Reordena dentro da sequência global, mesmo quando a tela está filtrada.
    // Os pedidos ocultos pelo filtro mantêm sua posição relativa.
    let newIds = globalIds.filter(id=>id !== sourceId);
    let targetIndex = newIds.indexOf(targetId);
    if(targetIndex < 0){ handleDragEnd(); return false; }
    if(position === 'bottom') targetIndex += 1;
    newIds.splice(targetIndex, 0, sourceId);

    showLoading('Atualizando sequência dos pedidos...');
    for(let start = 0; start < newIds.length; start += 400){
      const chunk = newIds.slice(start, start + 400);
      const batch = db.batch();
      chunk.forEach((id, localIdx)=>{
        const idx = start + localIdx;
        const local = pedidos.find(p=>String(p.id)===String(id));
        if(local) local.ordem = (idx + 1) * 10;
        batch.update(db.collection('pedidos').doc(id), {
          ordem: (idx + 1) * 10,
          atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      await batch.commit();
    }
    pedidos = getOrderedPedidos();
    hideLoading();
    showToast('Sequência atualizada.','ok');
    render();
    return false;
  }catch(e){
    hideLoading();
    console.error('Erro ao reordenar pedidos:', e);
    showToast('Erro ao reordenar: ' + (e.message || e), 'err', 5000);
    return false;
  }finally{
    handleDragEnd();
  }
}

function handleDragEnd(){
  dragPedidoId = null;
  dragOverPedidoId = null;
  dragOverPosition = null;
  clearRowDragClasses();
}

function clearColDragClasses(){
  document.querySelectorAll('th.col-dragging,th.col-drag-over').forEach(el=>el.classList.remove('col-dragging','col-drag-over'));
}

function colDragStart(ev, key){
  try{
    if(ev){
      ev.stopPropagation();
      if(ev.dataTransfer){
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', String(key));
      }
    }
    dragColKey = String(key);
    if(ev && ev.currentTarget) ev.currentTarget.classList.add('col-dragging');
  }catch(e){ console.warn('Falha ao iniciar arraste de coluna:', e); }
}

function colDragOver(ev, key){
  try{
    if(ev){ ev.preventDefault(); ev.stopPropagation(); if(ev.dataTransfer) ev.dataTransfer.dropEffect = 'move'; }
    clearColDragClasses();
    if(ev && ev.currentTarget) ev.currentTarget.classList.add('col-drag-over');
    return false;
  }catch(e){ console.warn('Falha no dragover de coluna:', e); return false; }
}

function colDrop(ev, key){
  try{
    if(ev){ ev.preventDefault(); ev.stopPropagation(); }
    const from = String(dragColKey || (ev && ev.dataTransfer ? ev.dataTransfer.getData('text/plain') : ''));
    const to = String(key || '');
    if(!from || !to || from === to){ colDragEnd(); return false; }
    const next = colOrder.filter(k=>k !== from);
    const idx = next.indexOf(to);
    if(idx < 0){ colDragEnd(); return false; }
    next.splice(idx, 0, from);
    colOrder = next;
    colDragEnd();
    render();
    return false;
  }catch(e){
    console.error('Erro ao mover coluna:', e);
    showToast('Erro ao mover coluna: ' + (e.message || e), 'err', 5000);
    colDragEnd();
    return false;
  }
}

function colDragLeave(ev, key){
  try{ if(ev) ev.stopPropagation(); if(ev && ev.currentTarget) ev.currentTarget.classList.remove('col-drag-over'); }catch(e){}
}

function colDragEnd(){
  dragColKey = null;
  clearColDragClasses();
}

async function salvarPedido(){
  const at  = ($('f-at')||{value:''}).value.trim();
  const cli = ($('f-cli')||{value:''}).value.trim();
  const urp = parseFloat(($('f-urp')||{value:0}).value)||0;
  if(!at||!cli){ showToast('Preencha AT e cliente.','err'); return; }
  const prazo    = ($('f-prazo')||{value:''}).value;
  const persTipo = ($('f-pers-tipo')||{value:'nao'}).value;
  const persNum  = ($('f-pers-num')||{value:''}).value.trim();
  const persiana = persTipo==='sim'?(persNum||'Sim'):'N/A';
  const mes = ($('f-mes')||{value:'4. ABRIL'}).value;
  const ano = parseInt(($('f-ano')||{value:'2026'}).value);
  const seq = pedidos.filter(p=>p.mes===mes&&p.ano===ano).length+1;
  const checklistExpedicao = (()=>{
    try{ return JSON.parse(novoPedidoDraft['f-checklist-json']||'[]'); }
    catch{ return []; }
  })();
  const totalPosicoes = checklistExpedicao.length;
  const urpChecklist = checklistExpedicao.reduce((a,i)=>a+(parseFloat(i.urp)||0),0);
  const data = {
    seq, ano, mes, at, cliente:cli,
    cidade: ($('f-cid')||{value:''}).value.trim(),
    uf:     ($('f-uf')||{value:''}).value.trim().toUpperCase(),
    urp,
    dtImp:  ($('f-dimp')||{value:''}).value,
    setor:  '0. Pendente corte', prazo,
    corSemana: parseInt(($('f-corsem')||{value:'0'}).value),
    corPed:    parseInt(($('f-corped')||{value:'0'}).value),
    numPed: ($('f-nped')||{value:''}).value.trim(),
    prior:  calcPrior(prazo, '0. Pendente corte'),
    prevTEC:($('f-prev')||{value:''}).value,
    montagem:'', conclProd:'', coleta:'',
    status:'Pendente corte', persiana, ressalvas:[],
    checklistExpedicao,
    totalPosicoes,
    urpChecklist: Number(urpChecklist.toFixed(2)),
    pdfChecklistNome: novoPedidoDraft['f-pdf-nome']||'',
    criadoPor: CU.uid, criadoPorNome: CU.name
  };
  showLoading('Salvando pedido...');
  try{ await savePedido(data); clearNovoPedidoDraft(); modalState=null; hideLoading(); showToast('Pedido criado!','ok'); render(); }
  catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

async function saveDetailEdit(id){
  const at = fv('e-at').trim();
  const cliente = fv('e-cliente').trim();
  const urp = parseFloat(fv('e-urp')) || 0;
  if(!at || !cliente){ showToast('AT e cliente são obrigatórios.','err'); return; }
  const prazo = fv('e-prazo');
  const update = {
    ano: parseInt(fv('e-ano')) || new Date().getFullYear(),
    mes: fv('e-mes'),
    at,
    numPed: fv('e-numped').trim(),
    cliente,
    urp,
    cidade: fv('e-cidade').trim(),
    uf: fv('e-uf').trim().toUpperCase(),
    dtImp: fv('e-dtimp'),
    prazo,
    prior: calcPrior(prazo, fv('e-setor')),
    prevTEC: fv('e-prevtec'),
    conclProd: fv('e-conclprod'),
    coleta: fv('e-coleta'),
    montagem: fv('e-montagem'),
    corSemana: parseInt(fv('e-corsem')) || 0,
    corPed: parseInt(fv('e-corped')) || 0,
    setor: fv('e-setor'),
    status: fv('e-status'),
    persiana: fv('e-persiana').trim() || 'N/A'
  };

async function salvarRes(id){
  const txt=($('nova-res')||{value:''}).value.trim();
  if(!txt){ showToast('Digite o texto.','err'); return; }
  const p=pedidos.find(x=>x.id===id); if(!p) return;
  const ressalvas=[...(p.ressalvas||[]),{user:CU.name,data:new Date().toLocaleDateString('pt-BR'),texto:txt}];
  try{ await savePedido({ressalvas},id); modalState=null; showToast('Ressalva salva!','ok'); render(); }
  catch(e){ showToast('Erro: '+e.message,'err'); }
}

async function reverterSetor(id){
  const s=($('rev-s')||{value:''}).value;
  if(!s){ showToast('Selecione um setor.','err'); return; }
  const status=deriveStatusFromSetor(s);
  try{ const p=pedidos.find(x=>x.id===id); await savePedido({setor:s,status,prior:calcPrior(p?p.prazo:'',s)},id); modalState=null; showToast('Setor revertido!','ok'); render(); }

}

function formatChecklistUrp(v){
  const n = Number(v||0);
  return Number.isFinite(n) ? n.toFixed(2) : '0.00';
}

function getChecklistStats(p){
  const itens = Array.isArray(p && p.checklistExpedicao) ? p.checklistExpedicao : [];
  const total = itens.length;
  const conferidos = itens.filter(i=>!!i.conferido).length;
  const urp = itens.reduce((a,i)=>a + (parseFloat(i.urp)||0),0);
  return { total, conferidos, pendentes: Math.max(0,total-conferidos), urp };
}

function updateNovoPedidoChecklistMeta(parsed){
  novoPedidoDraft = {
    ...novoPedidoDraft,
    'f-pdf-nome': parsed.fileName || '',
    'f-checklist-json': JSON.stringify(parsed.posicoes || []),
    'f-checklist-total': String((parsed.posicoes || []).length),
    'f-checklist-quadros': String(parsed.totalQuadros || 0),
    'f-checklist-urp': String(Number(parsed.totalUrp||0).toFixed(2))
  };
}

function normalizePdfDecimal(value){
  if(value===null || value===undefined) return 0;
  let s = String(value).trim();
  if(!s) return 0;
  s = s.replace(/\./g,'').replace(',', '.').replace(/[^0-9.-]/g,'');
  const n = parseFloat(s);
  return Number.isFinite(n) ? n : 0;
}

// Helpers para checklist no modal de coleta (operam em cópia local antes de salvar)
let _coletaChecklistRascunho = null;
function _initColetaRascunho(){
  const p = pedidos.find(x=>x.id===coletaId);
  if(!p) return;
  if(!_coletaChecklistRascunho || _coletaChecklistRascunho._id !== coletaId){
    _coletaChecklistRascunho = {
      _id: coletaId,
      itens: Array.isArray(p.checklistExpedicao) ? p.checklistExpedicao.map(i=>({...i})) : []
    };
  }
}
function coletaToggleItem(idx, checked){
  _initColetaRascunho();
  if(!_coletaChecklistRascunho.itens[idx]) return;
  _coletaChecklistRascunho.itens[idx].conferido = !!checked;
  _coletaChecklistRascunho.itens[idx].conferidoEm = checked ? new Date().toISOString() : '';
  _coletaChecklistRascunho.itens[idx].conferidoPor = checked ? (CU&&CU.name?CU.name:'') : '';
  // Update the pedidos local copy so re-render reflects state
  const p = pedidos.find(x=>x.id===coletaId);
  if(p) p.checklistExpedicao = _coletaChecklistRascunho.itens.map(i=>({...i}));
  // Partial re-render of just the table (avoid full modal rebuild while typing)
  render();
}
function coletaSetRessalva(idx, value){
  _initColetaRascunho();
  if(!_coletaChecklistRascunho.itens[idx]) return;
  _coletaChecklistRascunho.itens[idx].ressalva = value;
  const p = pedidos.find(x=>x.id===coletaId);
  if(p) p.checklistExpedicao = _coletaChecklistRascunho.itens.map(i=>({...i}));
}
function coletaMarcarTudo(v){
  _initColetaRascunho();
  const ts = v ? new Date().toISOString() : '';
  const by = v && CU ? CU.name : '';
  _coletaChecklistRascunho.itens = _coletaChecklistRascunho.itens.map(i=>({
    ...i, conferido:!!v, conferidoEm:ts, conferidoPor:by
  }));
  const p = pedidos.find(x=>x.id===coletaId);
  if(p) p.checklistExpedicao = _coletaChecklistRascunho.itens.map(i=>({...i}));
  render();
}

async function confirmarColeta(){
  const dt=($('f-col')||{value:''}).value;
  if(!dt){ showToast('Informe a data.','err'); return; }
  showLoading('Registrando coleta...');
  try{
    const p = pedidos.find(x=>x.id===coletaId);
    // Save checklist rascunho if it was modified
    const checklistFinal = (_coletaChecklistRascunho && _coletaChecklistRascunho._id===coletaId)
      ? _coletaChecklistRascunho.itens
      : (Array.isArray(p&&p.checklistExpedicao) ? p.checklistExpedicao : []);
    const payload = {
      coleta: dt,
      status: 'Finalizado',
      setor: '4. Entregue',
      prior: calcPrior(p?p.prazo:'','4. Entregue'),
      checklistExpedicao: checklistFinal
    };
    await savePedido(payload, coletaId);
    _coletaChecklistRascunho = null;
    modalState=null; hideLoading(); showToast('Coleta registrada!','ok'); render();
  } catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

function exportExcel(){
  try{
    const headers=['Ano','Mês','ID/Seq','Cor Semana','Pedido (AT)','Cliente','Cidade','UF','URP','Data Impressão','Setor/Localização','Prazo Contratual','Prioridade','Prev. TEC','Data Concl. Produção','Data Coleta','Cor do Pedido','Persiana','Status'];
    // Helper: ISO → JS Date para que SheetJS grave como data Excel nativa
    const toDate = iso => {
      if(!iso) return '';
      try{ const d=new Date(iso+'T12:00:00'); return isNaN(d)?iso:d; }
      catch{ return iso; }
    };
    const rows=getOrderedPedidos().map(p=>[
      p.ano||'', (p.mes||'').replace(/^\d+\. /,''), p.numPed||'',
      COR_SEMANA_NOMES[p.corSemana]||'Branco',
      p.at||'', p.cliente||'', p.cidade||'', p.uf||'',
      p.urp||0,
      toDate(p.dtImp),
      p.setor||'',
      toDate(p.prazo),
      p.prior||'',
      toDate(p.prevTEC),
      toDate(p.conclProd),
      toDate(p.coleta),
      COR_PED_NOMES[p.corPed]||'Branco',
      p.persiana||'N/A', p.status||''
    ]);
    if(typeof XLSX==='undefined' || !XLSX.utils) throw new Error('Biblioteca XLSX indisponível');
    const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
    // Formata colunas de data (índices 9,11,13,14,15) como dd/mm/aaaa
    const dateCols=[9,11,13,14,15];
    const fmt='dd/mm/yyyy';
    rows.forEach((_,ri)=>{
      dateCols.forEach(ci=>{
        const addr=XLSX.utils.encode_cell({r:ri+1,c:ci});
        if(ws[addr] && ws[addr].t==='d'){
          ws[addr].z = fmt;
        }
      });
    });

    const wb=XLSX.utils.book_new();

    const instrWs=XLSX.utils.aoa_to_sheet([
      ['INSTRUÇÕES DE IMPORTAÇÃO'],[''],
      ['Use a aba "Pedidos" como modelo para importação em massa.'],
      ['Campos obrigatórios: Pedido (AT), Cliente, URP'],
      ['Cor Semana: Branco, Rosa, Azul, Laranja, Verde, Vermelho ou Amarelo'],
      ['Cor Pedido: Branco, Preto ou Branco e Preto'],
      ['Datas: formato dd/mm/aaaa (geradas automaticamente pelo export)'],
      ['Prioridade: calculada automaticamente pelo prazo (não precisa preencher)'],
      ['Persiana: "N/A" ou número da persiana'],
    ]);
    XLSX.utils.book_append_sheet(wb,'Instruções',instrWs);
    XLSX.writeFile(wb,`weiku_pcp_${new Date().toISOString().split('T')[0]}.xlsx`);
    showToast(`${pedidos.length} pedidos exportados!`,'ok');
  } catch(e){
    console.warn('Falha no Excel, exportando CSV.', e);
    const headers=['Ano','Mês','ID/Seq','Cor Semana','Pedido (AT)','Cliente','Cidade','UF','URP','Data Impressão','Setor/Localização','Prazo Contratual','Prioridade','Prev. TEC','Data Concl. Produção','Data Coleta','Cor do Pedido','Persiana','Status'];
    const rows=getOrderedPedidos().map(p=>[
      p.ano||'', (p.mes||'').replace(/^\d+\. /,''), p.numPed||'', COR_SEMANA_NOMES[p.corSemana]||'',
      p.at||'', p.cliente||'', p.cidade||'', p.uf||'', p.urp||0, fmt(p.dtImp)||'', p.setor||'', fmt(p.prazo)||'',
      p.prior||'', fmt(p.prevTEC)||'', fmt(p.conclProd)||'', fmt(p.coleta)||'', COR_PED_NOMES[p.corPed]||'', p.persiana||'N/A', p.status||''
    ]);
    const csv = [headers,...rows].map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob = new Blob(["\ufeff"+csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `weiku_pcp_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
    showToast('Excel indisponível. CSV exportado com sucesso.','info',4000);
  }
}

function previewImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary', cellDates:true, dateNF:'yyyy-mm-dd'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1});
      if(data.length<2){ showToast('Arquivo vazio ou inválido.','err'); return; }
      const headers=data[0].map(h=>(h||'').toString().toLowerCase().trim());
      const findCol=(terms)=>{ for(const t of terms){const i=headers.findIndex(h=>h.includes(t));if(i>=0)return i;} return -1; };
      const cols={
        ano:     findCol(['ano']),
        mes:     findCol(['mês','mes']),
        numPed:  findCol(['id','seq','sequencial','nº']),
        corSem:  findCol(['cor semana','cor_semana','corsemana','cor da semana']),
        at:      findCol(['pedido','at']),
        cliente: findCol(['cliente','nome']),
        cidade:  findCol(['cidade']),
        uf:      findCol(['uf','estado']),
        urp:     findCol(['urp']),
        dtImp:   findCol(['impressão','impressao','data de impressão']),
        setor:   findCol(['localização','localizacao','setor']),
        prazo:   findCol(['prazo']),
        prevTEC: findCol(['prev. tec','prev tec','previsão tec','previsao tec']),
        conclProd: findCol(['concl','conclusão','conclusao','data concl']),
        coleta:  findCol(['coleta','data coleta']),
        corPed:  findCol(['cor do pedido','cor pedido','corpedido']),
        persiana:findCol(['persiana']),
        status:  findCol(['status']),
      };
      importData=data.slice(1).filter(r=>r.some(c=>c!=null&&c!=='')).map(r=>{
        // raw getter — preserves original type (numbers for dates/serial)
        const raw=i=>i>=0?r[i]:null;
        const g=i=>{ const v=raw(i); return v==null?'':String(v).trim(); };

        const at=g(cols.at);
        const cliente=g(cols.cliente);
        const urpRaw=parseFloat(g(cols.urp))||0;
        const erro=!at?'AT ausente':!cliente?'Cliente ausente':!urpRaw?'URP inválida':'';

        // Cor Semana: aceita índice (0-6) OU nome ("Branco", "Rosa"...)
        const corSemRaw = g(cols.corSem);
        const corSemNum = parseInt(corSemRaw);
        const corSemana = !isNaN(corSemNum) && corSemNum >= 0 && corSemNum <= 6
          ? corSemNum
          : Math.max(0, COR_SEMANA_NOMES.findIndex(n => n.toLowerCase()===corSemRaw.toLowerCase()));

        // Cor Pedido: aceita índice (0-2) OU nome ("Branco", "Preto", "Branco e Preto")
        const corPedRaw = g(cols.corPed);
        const corPedNum = parseInt(corPedRaw);
        const corPed = !isNaN(corPedNum) && corPedNum >= 0 && corPedNum <= 2
          ? corPedNum
          : Math.max(0, COR_PED_NOMES.findIndex(n => n.toLowerCase()===corPedRaw.toLowerCase()));

        // Mês: garante formato "N. NOME"
        let mesRaw = g(cols.mes).toUpperCase();
        if(mesRaw && !/^\d/.test(mesRaw)){
          const MESES=['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
          const mi = MESES.findIndex(m=>mesRaw.includes(m));
          if(mi>=0) mesRaw = `${mi+1}. ${MESES[mi]}`;
        }

        return{
          at, cliente, urp:urpRaw,
          ano:  parseInt(g(cols.ano))||new Date().getFullYear(),
          mes:  mesRaw||'4. ABRIL',
          numPed: g(cols.numPed),
          corSemana,
          cidade: g(cols.cidade), uf: g(cols.uf).toUpperCase(),
          dtImp:    toISO(raw(cols.dtImp)),
          prazo:    toISO(raw(cols.prazo)),
          prevTEC:  toISO(raw(cols.prevTEC)),
          conclProd:toISO(raw(cols.conclProd)),
          coleta:   toISO(raw(cols.coleta)),
          corPed,
          setor: g(cols.setor)||'1. Corte',
          persiana: g(cols.persiana)||'N/A',
          status: g(cols.status)||'Em produção',
          _erro: erro
        };
      });
      render();
    } catch(ex){ showToast('Erro ao ler arquivo: '+ex.message,'err'); }
  };
  reader.readAsBinaryString(file);
}

async function executeImport(){
  const valid=importData.filter(r=>!r._erro);
  if(!valid.length){ showToast('Nenhuma linha válida para importar.','err'); return; }
  showLoading(`Importando ${valid.length} pedidos...`);
  let ok=0, upd=0, err=0;
  for(const row of valid){
    try{
      // Verifica se AT já existe
      const existing=pedidos.find(p=>p.at===row.at);
      const data={ ...row, prior:calcPrior(row.prazo), ordem: existing ? (existing.ordem || ((getOrderedPedidos().length+1)*10)) : ((getOrderedPedidos().length+1)*10), ressalvas:existing?undefined:[], atualizadoEm:firebase.firestore.FieldValue.serverTimestamp() };
      delete data._erro;
      if(existing){
        delete data.ressalvas;
        await db.collection('pedidos').doc(existing.id).update(data); upd++;
      } else {
        data.ressalvas=[];
        data.criadoPor=CU.uid; data.criadoPorNome=CU.name;
        data.criadoEm=firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('pedidos').add(data); ok++;
      }
    } catch(e){ err++; console.error('Import error',e); }
  }
  hideLoading(); modalState=null; importData=[];
  showToast(`Importação concluída: ${ok} novos, ${upd} atualizados${err?`, ${err} erros`:''}!`, err?'info':'ok', 5000);
  render();
}

async function salvarNovoUser(){
  const uidRaw = ($('fu-uid')||{value:''}).value.trim();
  const uid = uidRaw.replace(/\s+/g,'');
  const name  = ($('fu-name')||{value:''}).value.trim();
  const emailInput = ($('fu-email')||{value:''}).value.trim();
  const email = emailInput.toLowerCase();
  const role  = ($('fu-role')||{value:'viewer'}).value;

  if(!uid){ showToast('Informe o UID do usuário criado no Firebase Authentication.','err'); return; }
  if(uid.length < 20 || /[^A-Za-z0-9_-]/.test(uid)){
    showToast('UID inválido. Copie o UID completo no Firebase Authentication.','err',6000); return;
  }
  if(!name||!email){ showToast('Preencha nome e e-mail.','err'); return; }

  const permissions={};
  ALL_PERMISSIONS.forEach(p=>{ const el=$(`perm-${p.key}`); if(el) permissions[p.key]=el.checked?1:0; });
  showLoading('Salvando perfil em users/{UID}...');
  try{
    const targetRef = db.collection('users').doc(uid);
    const targetDoc = await targetRef.get();

    // Evita duplicidade: se já existir outro perfil com o mesmo e-mail e outro ID, avisa antes de criar conflito.
    const existingByEmail = await db.collection('users').where('email','==',email).limit(3).get();
    const otherWithSameEmail = existingByEmail.docs.find(d=>d.id !== uid);
    if(otherWithSameEmail){
      hideLoading();
      showToast('Já existe um perfil com esse e-mail em outro ID. Remova/ajuste o cadastro antigo antes de salvar pelo UID.','err',8000);
      return;
    }

    const payload = {
      uid,
      name,
      email,
      emailOriginal: emailInput,
      role,
      permissions,
      pendingAuthLink:false,
      pendingAuth:false,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    await targetRef.set({
      ...payload,
      createdAt: targetDoc.exists ? (targetDoc.data().createdAt || firebase.firestore.FieldValue.serverTimestamp()) : firebase.firestore.FieldValue.serverTimestamp()
    }, { merge:true });

    hideLoading(); modalState=null;
    showToast('Perfil salvo diretamente pelo UID. O usuário já deve conseguir logar se as regras permitirem leitura de users/{UID}.','ok',7000);
    await loadUsers(); render();
  } catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

let estItems = [];
let estSearch = '';
let estFilter = 'todos';
let estSubPage = 'estoque'; // 'estoque' | 'movimentacoes' | 'entrada'
let estEntradaState = {
  xmlInfo: null,
  rows: [],
  manualItemId: '',
  manualQty: '',
  manualObs: '',
  manualNF: '',
  lastReport: null
};
let estRecentCadastros = {};
let estCatFilter = 'todos';
let estSortCol = 'id';
let estSortDir = 1;
let estModalItem = null;
let estEditDraft = {};
let estLastSync = null;
let unsubEstoque = null;
let unsubEstoqueAjustes = null;
let estCurrentBatchId = null;
let estUsingLocalFallback = false;
const EST_LOCAL_KEY = 'weiku_estoque_import_local_v1';

function estLoadLocalImport(){
  try{
    const raw = localStorage.getItem(EST_LOCAL_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !Array.isArray(parsed.items) || !parsed.items.length) return null;
    return parsed;
  }catch(e){
    return null;
  }
}

function estSaveLocalImport(items, source){
  try{
    localStorage.setItem(EST_LOCAL_KEY, JSON.stringify({
      savedAt: new Date().toISOString(),
      source: source || 'local',
      items: items
    }));
    return true;
  }catch(e){
    return false;
  }
}

function estClearLocalImport(){
  try{ localStorage.removeItem(EST_LOCAL_KEY); }catch(e){}
}

// ── Inicialização ──────────────────────────────────────────────

async function initEstoque(){
  const localImport = estLoadLocalImport();
  if(localImport && Array.isArray(localImport.items) && localImport.items.length && !estItems.length){
    estItems = localImport.items.map(r=>({...r}));
    estCurrentBatchId = 'local-fallback';
    estUsingLocalFallback = true;
    estLastSync = new Date(localImport.savedAt || Date.now());
  }else if(!estItems.length){
    estItems = ESTOQUE_SEED.map(r=>({...r}));
  }
  try{
    if(unsubEstoque) unsubEstoque();
    unsubEstoque = db.collection('estoque').onSnapshot(snap=>{
      if(!snap.empty){
        const imported = [];
        let metaBatchId = null;
        snap.forEach(doc=>{
          const d = doc.data() || {};
          if(doc.id === '_meta' || d.kind === 'meta'){
            metaBatchId = d.currentBatchId || null;
            return;
          }
          imported.push({...d, _fsId: doc.id});
        });
        estCurrentBatchId = metaBatchId;
        const visible = imported;
        visible.sort((a,b)=>Number(a.id||0)-Number(b.id||0));
        estItems = visible;
        estUsingLocalFallback = false;
        estClearLocalImport();
        estLastSync = new Date();
      }else if(localImport && Array.isArray(localImport.items) && localImport.items.length){
        estItems = localImport.items.map(r=>({...r}));
        estCurrentBatchId = 'local-fallback';
        estUsingLocalFallback = true;
        estLastSync = new Date(localImport.savedAt || Date.now());
      }else{
        estItems = ESTOQUE_SEED.map(r=>({...r}));
        estCurrentBatchId = null;
        estUsingLocalFallback = false;
      }
      if(activePage==='estoque') render();
    },()=>{
      if(localImport && Array.isArray(localImport.items) && localImport.items.length){
        estItems = localImport.items.map(r=>({...r}));
        estCurrentBatchId = 'local-fallback';
        estUsingLocalFallback = true;
        estLastSync = new Date(localImport.savedAt || Date.now());
        if(activePage==='estoque') render();
      }
    });
  }catch(e){}

  // Listener inventário ativo
  try{
    if(unsubInvAtivo) unsubInvAtivo();
    unsubInvAtivo = db.collection('inventarios')
      .where('status','in',['em_andamento','pausado'])
      .onSnapshot(snap=>{
        invAtivo = snap.empty ? null : {id:snap.docs[0].id,...snap.docs[0].data()};
        if(invAtivo && unsubInvContagens === null){
          unsubInvContagens = db.collection('inventarios').doc(invAtivo.id)
            .collection('contagens').onSnapshot(s=>{
              invContagens = s.docs.map(d=>({id:d.id,...d.data()}));
              if(activePage==='inventario'||activePage==='inventario_contagem') render();
            },()=>{});
        } else if(!invAtivo){
          if(unsubInvContagens){ unsubInvContagens(); unsubInvContagens=null; }
          invContagens = [];
        }
        if(activePage==='inventario'||activePage==='inventario_contagem') render();
      },()=>{ invAtivo=null; });
  }catch(e){}

  // Listener em tempo real de ajustes pendentes (visível para admin)
  try{
    if(unsubEstoqueAjustes) unsubEstoqueAjustes();
    unsubEstoqueAjustes = db.collection('estoque_ajustes')
      .where('status','==','pendente')
      .onSnapshot(snap=>{
        // Ordenar no JS para não depender de índice composto no Firestore
        // (documentos antigos podem não ter o campo 'timestamp')
        estPendentesAjuste = snap.docs
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>{
            const ta = a.timestamp?.toMillis?.() || new Date(a.criadoEm||0).getTime();
            const tb = b.timestamp?.toMillis?.() || new Date(b.criadoEm||0).getTime();
            return tb - ta;
          });
        if(activePage==='estoque') render();
      }, (err)=>{
        console.error('Erro ao carregar ajustes pendentes:', err);
        estPendentesAjuste = [];
      });
  }catch(e){ estPendentesAjuste = []; }
}

async function saveEstoqueItem(item){
  const payload={
    id:item.id, codigo:sanitizeText(item.codigo,120), descricao:sanitizeText(item.descricao,300),
    categoria:sanitizeText(item.categoria,60),
    unidade:sanitizeText(item.unidade,30),
    saldo:item.saldo, sap:item.sap, min:item.min, max:item.max,
    analise:item.analise,
    batchId: estCurrentBatchId || null,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy:CU?sanitizeText(CU.name,120):'sistema'
  };
  try{
    const docId='item_'+String(item.id).replace(/[^a-zA-Z0-9]/g,'_');
    await db.collection('estoque').doc(docId).set(payload,{merge:true});
    return true;
  }catch(e){ showToast('Erro ao salvar: '+e.message,'err'); return false; }
}

// ── Status ────────────────────────────────────────────────────
function estStatus(item){
  const s=item.saldo||0;
  if(s===0) return 'zerado';
  if(item.min==null||item.max==null) return 'analisar';
  if(s<item.min) return 'critico';
  if(s<item.max*0.5) return 'warn';
  return 'ok';
}

function estBar(item){

function estKpis(){

    analisar:statuses.filter(s=>s==='analisar').length,

  };
