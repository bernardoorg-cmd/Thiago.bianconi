// ── Filtro + Busca ────────────────────────────────────────────
function estFiltered(){
  let arr=[...estItems];
  if(estFilter==='ok') arr=arr.filter(x=>estStatus(x)==='ok');
  else if(estFilter==='analisar') arr=arr.filter(x=>estStatus(x)==='analisar');
  else if(estFilter==='critico') arr=arr.filter(x=>['critico','warn'].includes(estStatus(x)));
  else if(estFilter==='zerado') arr=arr.filter(x=>estStatus(x)==='zerado');
  if(estCatFilter!=='todos') arr=arr.filter(x=>estCategoriaGrupo(x.categoria) === estCatFilter);
  if(estSearch.trim()){
    const q=estSearch.toLowerCase();
    arr=arr.filter(x=>String(x.codigo||'').toLowerCase().includes(q)||String(x.descricao||'').toLowerCase().includes(q));
  }
  arr.sort((a,b)=>{
    let av=a[estSortCol],bv=b[estSortCol];
    if(av==null) av=estSortDir===1?Infinity:-Infinity;
    if(bv==null) bv=estSortDir===1?Infinity:-Infinity;
    if(typeof av==='string') return estSortDir*String(av).localeCompare(String(bv));
    return estSortDir*(av-bv);
  });
  return arr;
}
function estSetSort(col){ if(estSortCol===col) estSortDir*=-1; else{estSortCol=col;estSortDir=1;} render(); }
function estSetFilter(f){ estFilter=f; render(); }
function estSetCatFilter(c){ estCatFilter=c; render(); }

// ── Helpers ───────────────────────────────────────────────────
function fmtN(v){
  if(v==null) return '—';
  const n=Number(v); if(isNaN(n)) return String(v);
  return n%1===0?n.toLocaleString('pt-BR'):n.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2});
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc(s){ return escH(s); }

function estNormalizaCodigoBusca(code){
  return String(code || '').trim().toUpperCase().replace(/\s+/g,'');
}

function estCodigoSomenteDigitos(code){
  const raw = estNormalizaCodigoBusca(code);
  return /^\d+$/.test(raw) ? String(Number(raw)) : raw;
}

function estLocalizarItemPorCodigo(code){
  const normal = estNormalizaCodigoBusca(code);
  const compacto = estCodigoSomenteDigitos(code);
  return estItems.find(x => {
    const codItem = estNormalizaCodigoBusca(x.codigo || '');
    if(codItem === normal) return true;
    if(/^\d+$/.test(codItem) && compacto === String(Number(codItem))) return true;
    return false;
  }) || null;
}

function estResetEntradaState(){
  estEntradaState = {
    xmlInfo: null,
    rows: [],
    manualItemId: '',
    manualQty: '',
    manualObs: '',
    manualNF: '',
    lastReport: null
  };
}

function estParseQtySmart(raw){
  let s = String(raw || '').trim();
  if(!s) return 0;
  s = s.replace(/\s+/g, '');
  const hasComma = s.includes(',');
  const hasDot = s.includes('.');
  if(hasComma && hasDot){
    if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g, '').replace(',', '.');
    else s = s.replace(/,/g, '');
  }else if(hasComma){
    s = s.replace(',', '.');
  }
  const n = Number(s);
  return Number.isFinite(n) ? n : 0;
}

function estParseXmlEntrada(xmlText){
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'application/xml');
  if(xml.querySelector('parsererror')) throw new Error('XML inválido ou não reconhecido.');

  const getText = (ctx, tags) => {
    for(const tag of tags){
      const el = ctx.querySelector(tag);
      if(el && el.textContent != null && String(el.textContent).trim()) return String(el.textContent).trim();
    }
    return '';
  };

  const nNF = getText(xml, ['nNF']);
  const serie = getText(xml, ['serie']);
  const dhEmi = getText(xml, ['dhEmi','dEmi']);
  const fornecedor = getText(xml, ['emit > xNome','emit xNome']);
  const chave = getText(xml, ['protNFe chNFe','infProt chNFe','infNFe Id']);

  const dets = Array.from(xml.getElementsByTagName('det'));
  const rows = dets.map((det, idx) => {
    const prod = det.getElementsByTagName('prod')[0] || det;
    const codigoNF = getText(prod, ['cProd']) || `ITEM-${idx+1}`;
    const descricaoNF = getText(prod, ['xProd']) || codigoNF;
    const unidadeXml = getText(prod, ['uCom','uTrib']) || 'UN';
    const qtyNF = estParseQtySmart(getText(prod, ['qCom','qTrib']) || '0');
    const itemBase = estLocalizarItemPorCodigo(codigoNF);
    return {
      origem: 'xml',
      matched: !!itemBase,
      itemId: itemBase ? itemBase.id : null,
      codigoNF,
      codigoBase: itemBase ? itemBase.codigo : '',
      descricaoNF,
      descricaoBase: itemBase ? itemBase.descricao : '',
      unidade: itemBase ? (itemBase.unidade || unidadeXml || 'UN') : (unidadeXml || 'UN'),
      qtyNF,
      qtyRecebida: qtyNF,
      observacao: '',
      saldoAtual: itemBase ? Number(itemBase.saldo || 0) : null,
      cadastroCategoria: itemBase ? estNormalizarCategoria(itemBase.categoria || '') : '',
      cadastroUnidade: itemBase ? (itemBase.unidade || unidadeXml || 'UN') : (unidadeXml || 'UN'),
      cadastroDescricao: itemBase ? (itemBase.descricao || descricaoNF) : descricaoNF
    };
  });

  return {
    xmlInfo: { nNF, serie, dhEmi, fornecedor, chave },
    rows
  };
}

function estEntradaResumo(rows){
  const validos = rows.filter(r => r.matched);
  const divergentes = validos.filter(r => Number(r.qtyRecebida || 0) !== Number(r.qtyNF || 0));
  const faltas = validos.filter(r => Number(r.qtyRecebida || 0) < Number(r.qtyNF || 0));
  const sobras = validos.filter(r => Number(r.qtyRecebida || 0) > Number(r.qtyNF || 0));
  const naoCadastrados = rows.filter(r => !r.matched);
  return {
    total: rows.length,
    validos: validos.length,
    divergentes: divergentes.length,
    faltas: faltas.length,
    sobras: sobras.length,
    naoCadastrados: naoCadastrados.length
  };
}

function estEntradaStatusRow(row){
  if(!row.matched) return {txt:'Código não cadastrado', cls:'badge-critico'};
  if(row.origem === 'manual') return {txt:'Manual', cls:'badge-ok'};
  const nf = Number(row.qtyNF || 0);
  const rec = Number(row.qtyRecebida || 0);
  if(rec === nf) return {txt:'Conferido', cls:'badge-ok'};
  if(rec < nf) return {txt:'Falta', cls:'badge-critico'};
  return {txt:'Sobra', cls:'badge-warn'};
}

function estImportarXmlEntrada(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xml,text/xml,application/xml';
  inp.onchange = async (ev) => {
    const file = ev.target && ev.target.files && ev.target.files[0];
    if(!file) return;
    showLoading('Lendo XML da nota fiscal...');
    try{
      const xmlText = await file.text();
      const parsed = estParseXmlEntrada(xmlText);
      estEntradaState.xmlInfo = { ...(parsed.xmlInfo || {}), fileName: file.name };
      estEntradaState.rows = parsed.rows || [];
      estEntradaState.lastReport = null;
      hideLoading();
      const resumo = estEntradaResumo(estEntradaState.rows);
      showToast(`XML carregado: ${resumo.total} item(ns), ${resumo.validos} reconhecido(s), ${resumo.naoCadastrados} não cadastrado(s).`, resumo.naoCadastrados ? 'info' : 'ok', 7000);
      render();
    }catch(err){
      hideLoading();
      showToast('Erro ao ler XML: ' + err.message,'err',7000);
    }
  };
  inp.click();
}

async function estCadastrarItemPendente(index){
  if(!(can('estoque_cadastrar')||CU.role==='admin')){ showToast('Sem permissão para cadastrar novo item.','err'); return; }
  const row = estEntradaState.rows[index];
  if(!row || row.matched) return;
  const codigo = String(row.codigoNF || '').trim();
  const descricao = String(row.cadastroDescricao || row.descricaoNF || '').trim();
  const categoria = estNormalizarCategoria(row.cadastroCategoria || '');
  const unidade = String(row.cadastroUnidade || row.unidade || '').trim();
  if(!codigo){ showToast('Código do item não informado.','err'); return; }
  if(estLocalizarItemPorCodigo(codigo)){ showToast('Este código já existe no cadastro.','err'); return; }
  if(!descricao){ showToast('Informe a descrição para o novo cadastro.','err'); return; }
  if(!['PVC','ALU','AÇO','ACE'].includes(categoria)){ showToast('Selecione a categoria do item não cadastrado.','err'); return; }
  if(!unidade){ showToast('Informe a unidade de medida do item.','err'); return; }

  const novoId = estItems.reduce((acc, item) => Math.max(acc, Number(item.id || 0)), 0) + 1;
  const novoItem = {
    id: novoId,
    codigo,
    descricao,
    categoria,
    unidade,
    saldo: 0,
    sap: null,
    min: null,
    max: null,
    analise: 'Analisar',
    batchId: estCurrentBatchId || null
  };

  showLoading('Cadastrando item novo...');
  const ok = await saveEstoqueItem(novoItem);
  hideLoading();
  if(!ok) return;

  estItems.push(novoItem);
  row.matched = true;
  row.itemId = novoId;
  row.codigoBase = codigo;
  row.descricaoBase = descricao;
  row.unidade = unidade;
  row.cadastroCategoria = categoria;
  row.cadastroUnidade = unidade;
  row.cadastroDescricao = descricao;
  row.saldoAtual = 0;
  row.recentCadastroUntil = Date.now() + (20 * 60 * 1000);
  estRecentCadastros[codigo] = row.recentCadastroUntil;
  estEntradaState.lastReport = null;
  showToast(`Cadastro criado para ${codigo}.`, 'ok');
  render();
}

  estEntradaState.rows.push({

    descricaoNF: item.descricao,

    unidade: item.unidade || 'UN',

    qtyRecebida: qty,

}

async function estConfirmarEntradaMaterial(){
  const rows = Array.isArray(estEntradaState.rows) ? estEntradaState.rows : [];
  if(!rows.length){ showToast('Nenhum item carregado para entrada.','err'); return; }
  const validos = rows.filter(r => r.matched && Number(r.qtyRecebida || 0) > 0);
  if(!validos.length){ showToast('Não há itens válidos com quantidade recebida para lançar.','err'); return; }

  const resumo = estEntradaResumo(rows);
  const report = {
    origem: estEntradaState.xmlInfo ? 'xml' : 'manual',
    xmlInfo: estEntradaState.xmlInfo || null,
    resumo,
    itens: rows.map(r => ({
      origem: r.origem || 'xml',
      itemId: r.itemId || null,
      codigoNF: r.codigoNF || '',
      codigoBase: r.codigoBase || '',
      descricaoNF: r.descricaoNF || '',
      descricaoBase: r.descricaoBase || '',
      qtyNF: Number(r.qtyNF || 0),
      qtyRecebida: Number(r.qtyRecebida || 0),
      unidade: r.unidade || '',
      matched: !!r.matched,
      divergencia: Number(r.qtyRecebida || 0) - Number(r.qtyNF || 0),
      observacao: r.observacao || ''
    })),
    criadoEm: new Date().toISOString(),
    criadoPor: CU ? CU.name : 'sistema',
    criadoPorId: CU ? CU.uid : ''
  };

  showLoading('Confirmando entrada de material...');
  try{
    for(const row of validos){
      const idx = estItems.findIndex(x => Number(x.id) === Number(row.itemId));
      if(idx < 0) continue;
      const item = estItems[idx];
      const qty = Number(row.qtyRecebida || 0);
      const novoSaldo = parseFloat(((Number(item.saldo) || 0) + qty).toFixed(2));
      estItems[idx] = {...item, saldo: novoSaldo};
      const docId = 'item_' + String(item.id);
      await db.collection('estoque').doc(docId).set({
        ...estItems[idx],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: CU ? CU.name : 'sistema'
      }, {merge:true});
      await db.collection('estoque_log').add({
        tipo: 'entrada',
        origem: row.origem || 'xml',
        itemId: item.id,
        codigo: item.codigo,
        descricao: item.descricao,
        categoria: item.categoria || '',
        quantidade: qty,
        quantidadeNF: Number(row.qtyNF || 0),
        saldoAntes: Number(item.saldo || 0),
        saldoDepois: novoSaldo,
        setor: 'Almoxarifado',
        nfNumero: row.nfNumero || (estEntradaState.xmlInfo && estEntradaState.xmlInfo.nNF) || '',
        observacao: row.observacao || ((Number(row.qtyRecebida || 0) !== Number(row.qtyNF || 0)) ? 'Divergência identificada na entrada' : 'Entrada por NF/XML'),
        usuario: CU ? CU.name : 'desconhecido',
        usuarioId: CU ? CU.uid : '',
        data: new Date().toISOString(),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    // Reset da tela e toast ANTES de qualquer gravação extra opcional
    // (assim mesmo que ocorra um erro posterior a entrada já está confirmada e a tela zerada)
    const relatorioFinal = { ...report };
    estResetEntradaState();
    estEntradaState.lastReport = relatorioFinal;
    hideLoading();
    showToast(`✓ Entrada concluída: ${validos.length} item(ns) lançados. Divergências: ${resumo.divergentes}. Não cadastrados: ${resumo.naoCadastrados}.`, resumo.divergentes || resumo.naoCadastrados ? 'info' : 'ok', 8000);
    estGerarRelatorioPDF(relatorioFinal);
    render();
  }catch(err){
    hideLoading();
    showToast('Erro ao confirmar entrada: ' + err.message,'err',7000);
  }
}

// ── Modal de edição ───────────────────────────────────────────
function estOpenNovoItem(){
  if(!(can('estoque_cadastrar')||CU.role==='admin')){ showToast('Sem permissão para cadastrar novo item.','err'); return; }
  const novoId = estItems.reduce((acc,item)=>Math.max(acc, Number(item.id||0)), 0) + 1;
  estModalItem = {
    id: novoId,
    codigo: '',
    descricao: '',
    categoria: 'PVC',
    unidade: 'Mts',
    saldo: 0,
    sap: null,
    min: null,
    max: null,
    analise: 'Analisar',
    __novo: true
  };
  estEditDraft = {...estModalItem};
  render();
}
function estOpenEdit(id){
  if(!(can('estoque_editar')||CU.role==='admin')){ showToast('Sem permissão para editar item.','err'); return; }
  const item=estItems.find(x=>x.id===id);
  if(!item) return;
  estModalItem={...item};
  estEditDraft={...item};
  render();
}
function estCloseModal(){ estModalItem=null; estEditDraft={}; render(); }

function estDraftChange(field,value){
  if(field==='saldo'||field==='sap'||field==='min'||field==='max'){
    estEditDraft[field]=value===''||value==null?null:Number(value);
  } else { estEditDraft[field]=value; }
  const diffEl=document.getElementById('est-saldo-diff');
  if(diffEl&&field==='saldo'){
    const orig=estModalItem?Number(estModalItem.saldo||0):0;
    const novo=Number(estEditDraft.saldo)||0;
    const diff=novo-orig;
    if(diff===0) diffEl.innerHTML='<span class="est-diff est-diff-neu">Sem alteração no saldo</span>';
    else diffEl.innerHTML=`<span class="est-diff ${diff>0?'est-diff-pos':'est-diff-neg'}">${diff>0?'+':''}${fmtN(diff)} em relação ao atual (${fmtN(orig)})</span>`;
  }
}

async function estSaveEdit(){
  if(!estEditDraft) return;
  const isNewItemDraft = !!(estEditDraft && estEditDraft.__novo);
  if(isNewItemDraft && !(can('estoque_cadastrar')||CU.role==='admin')){ showToast('Sem permissão para cadastrar novo item.','err'); return; }
  if(!isNewItemDraft && !(can('estoque_editar')||CU.role==='admin')){ showToast('Sem permissão para editar item.','err'); return; }
  if(!String(estEditDraft.codigo||'').trim()){ showToast('Código é obrigatório.','err'); return; }
  if(!String(estEditDraft.descricao||'').trim()){ showToast('Descrição é obrigatória.','err'); return; }
  const original = estItems.find(x=>Number(x.id)===Number(estEditDraft.id));
  if(!original && estItems.some(x=>String(x.codigo||'').trim().toLowerCase()===String(estEditDraft.codigo||'').trim().toLowerCase())){
    showToast('Já existe um item cadastrado com este código.','err');
    return;
  }
  // Preserve saldo em item existente — alteração de saldo só via Baixa ou Ajuste.
  // Em item novo, permite saldo inicial.
  const safePayload = {
    ...estEditDraft,
    id: Number(estEditDraft.id),
    saldo: original ? original.saldo : (Number(estEditDraft.saldo)||0),
    sap: estEditDraft.sap==='' ? null : estEditDraft.sap,
    min: estEditDraft.min==='' ? null : estEditDraft.min,
    max: estEditDraft.max==='' ? null : estEditDraft.max,
    analise: estEditDraft.analise || 'Analisar'
  };
  delete safePayload.__novo;
  const idx=estItems.findIndex(x=>Number(x.id)===Number(safePayload.id));
  if(idx>=0) estItems[idx]={...estItems[idx],...safePayload};
  else estItems.push(safePayload);
  showLoading('Salvando...');
  const ok=await saveEstoqueItem(safePayload);
  hideLoading();
  if(ok){ showToast(original ? 'Cadastro atualizado!' : 'Novo item cadastrado!','ok'); estCloseModal(); }
}

function estExportXlsx(){
  if(typeof XLSX==='undefined'){ showToast('SheetJS não disponível.','err'); return; }
  const rows=estFiltered().map(x=>({
    '#':x.id,
    'Código':x.codigo,
    'Categoria':estCategoriaRotulo(x.categoria),
    'Descrição':x.descricao,
    'Unidade':x.unidade||'Mts',
    'Saldo Atual':x.saldo,
    'Estoque SAP':x.sap,
    'Est. Mínimo':x.min,
    'Est. Máximo':x.max
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:28},{wch:12},{wch:55},{wch:8},{wch:12},{wch:12},{wch:10},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Estoque');
  const d=new Date(),ts=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb,`Estoque_TEC_PVC_${ts}.xlsx`);
  showToast(`${rows.length} itens exportados para Excel.`,'ok');
}

function parseFabricacaoPdfText(rawText, fileName=''){
  const raw = String(rawText||'');

  // ── Extract AT number ──────────────────────────────────────
  const pedidoMatch = raw.match(/Pedido\s+(AT\d+)/i);
  const atNum = pedidoMatch ? pedidoMatch[1].trim() : '';

  // ── Extract client name ───────────────────────────────────
  // Format: "Cliente: <blank line> Cliente: <id> <name>" or "Construtora..."
  const clienteMatch = raw.match(/Construtora\s+\S+(?:\s+\S+)?/i)
    || raw.match(/\d{6}\s+([A-Z][^\n]+)/m);
  const clienteNome = clienteMatch ? clienteMatch[0].trim() : '';

  // ── Parse position lines ──────────────────────────────────
  // Winkhaus "Tempos de Fabricação" format:
  // Each data line: POS  QUANT  FORMAT  LARGURA  ALTURA  ...16 numeric cols...  SOMA  TOTAL  URP
  // POS examples: 12, 12.1, 13, 22.1, 36.2
  // FORMAT examples: 1×1, 2×1, 3×1, 5×1, 2×2
  // URP is the LAST column ("unidades")
  // The "47" total line has no FORMAT column — skip it
  const LINE_RE = /^(\d+(?:\.\d+)?)\s+(\d+)\s+(\d+[×xX]\d+)\s+\d+\s+\d+(?:\s+[\d,.]+){15,}\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s*$/;

  function parsePtBr(s){
    // Handle both "4,84" and "12.92" and "3.388,15"
    const str = String(s||'').trim();
    if(/^\d{1,3}(?:\.\d{3})+,\d+$/.test(str)) return parseFloat(str.replace(/\./g,'').replace(',','.'));
    return parseFloat(str.replace(',','.')) || 0;
  }

  // Split raw text into lines — PDF.js may join items with spaces on same line
  // so we also try splitting on patterns that look like a new position start
  const lines = raw
    .replace(/(\d+(?:\.\d+)?)\s+(\d+)\s+(\d+[×xX]\d+)/g, '\n$1 $2 $3')
    .split(/\r?\n/)
    .map(s => s.trim())
    .filter(Boolean);

  const posicoes = [];
  const seen = new Set();

  for(const line of lines){
    const m = LINE_RE.exec(line);
    if(!m) continue;
    const posicao = m[1];
    if(seen.has(posicao)) continue;
    seen.add(posicao);
    const quantidade = parseInt(m[2]) || 1;
    const formato = m[3];
    const urp = parsePtBr(m[6]); // last column = "unidades"
    posicoes.push({
      posicao,
      quantidade,
      formato,
      urp,
      conferido: false,
      conferidoEm: '',
      conferidoPor: '',
      observacao: ''
    });
  }

  // Sort numerically: 12 < 12.1 < 13 < 22.1
  posicoes.sort((a, b) => {
    const [aMain, aSub='0'] = a.posicao.split('.');
    const [bMain, bSub='0'] = b.posicao.split('.');
    const mainDiff = parseInt(aMain) - parseInt(bMain);
    return mainDiff !== 0 ? mainDiff : parseInt(aSub) - parseInt(bSub);
  });

  const totalUrp = posicoes.reduce((s, i) => s + (i.urp || 0), 0);
  const totalQuadros = posicoes.reduce((s, i) => s + (i.quantidade || 1), 0);

  return {
    fileName,
    at: atNum,
    cliente: clienteNome,
    posicoes,
    totalPosicoes: posicoes.length,
    totalQuadros,
    totalUrp
  };
}

async function importarChecklistPdf(input){
  const file = input && input.files && input.files[0];
  if(!file) return;
  if(typeof pdfjsLib === 'undefined'){
    showToast('PDF.js não carregado. Aguarde e tente novamente.','err',4000);
    return;
  }
  pdfImportBusy = true;
  render();
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
    let rawText = '';
    for(let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
      const page = await pdf.getPage(pageNo);
      const content = await page.getTextContent();
      // Build page text preserving line breaks by using Y-position grouping
      const items = content.items;
      const byY = {};
      for(const item of items){
        if(!item.str || !item.str.trim()) continue;
        const y = Math.round(item.transform[5]);
        if(!byY[y]) byY[y] = [];
        byY[y].push(item.str);
      }
      // Sort by Y descending (top of page first), join tokens on same line with space
      const sortedYs = Object.keys(byY).map(Number).sort((a,b)=>b-a);
      for(const y of sortedYs){
        rawText += byY[y].join(' ') + '\n';
      }
    }
    const parsed = parseFabricacaoPdfText(rawText, file.name);
    if(!parsed.posicoes.length){
      showToast('PDF lido mas nenhuma posição encontrada. Verifique se é um PDF de fabricação Winkhaus.','err',6000);
      pdfImportBusy = false;
      render();
      return;
    }
    updateNovoPedidoChecklistMeta(parsed);
    // Pre-fill AT, cliente and URP — PDF data takes priority
    if(parsed.at) novoPedidoDraft['f-at'] = parsed.at;
    if(parsed.cliente) novoPedidoDraft['f-cli'] = parsed.cliente;
    if(parsed.totalUrp > 0) novoPedidoDraft['f-urp'] = parsed.totalUrp.toFixed(2);
    showToast(`✓ PDF lido: ${parsed.totalPosicoes} posições · ${parsed.totalQuadros} quadros · URP ${parsed.totalUrp.toFixed(2)}`, 'ok', 5000);
  } catch(e){
    showToast('Erro ao ler PDF: ' + e.message, 'err', 6000);
    console.error('importarChecklistPdf error:', e);
  } finally {
    pdfImportBusy = false;
    render();
  }
}

async function importarPdfPedidoExistente(input, pedidoId){
  const file = input && input.files && input.files[0];
  if(!file) return;
  if(typeof pdfjsLib === 'undefined'){
    showToast('PDF.js não carregado. Aguarde e tente novamente.','err',4000);
    return;
  }
  const btn = document.getElementById('btn-import-pdf-existente');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Lendo PDF...'; }
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
    let rawText = '';
    for(let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
      const page = await pdf.getPage(pageNo);
      const pgContent = await page.getTextContent();
      const byY = {};
      for(const item of pgContent.items){
        if(!item.str || !item.str.trim()) continue;
        const y = Math.round(item.transform[5]);
        if(!byY[y]) byY[y] = [];
        byY[y].push(item.str);
      }
      const sortedYs = Object.keys(byY).map(Number).sort((a,b)=>b-a);
      for(const y of sortedYs){ rawText += byY[y].join(' ') + String.fromCharCode(10); }
    }
    const parsed = parseFabricacaoPdfText(rawText, file.name);
    if(!parsed.posicoes.length){
      showToast('PDF lido mas nenhuma posição encontrada. Verifique se é o PDF de fabricação Winkhaus.','err',6000);
      return;
    }
    const itens = parsed.posicoes.map(pos => ({
      posicao:       pos.posicao,
      quantidade:    pos.quantidade,
      formato:       pos.formato,
      urp:           pos.urp,
      conferido:     false,
      conferidoEm:   '',
      conferidoPor:  '',
      observacao:    ''
    }));
    showLoading('Salvando checklist...');
    await savePedido({
      checklistExpedicao: itens,
      totalPosicoes:      parsed.totalPosicoes,
      urpChecklist:       Number(parsed.totalUrp.toFixed(2)),
      pdfChecklistNome:   parsed.fileName
    }, pedidoId);
    hideLoading();
    showToast(`✓ PDF importado: ${parsed.totalPosicoes} posições · ${parsed.totalQuadros} quadros · URP ${parsed.totalUrp.toFixed(2)}`, 'ok', 5000);
    render();
  } catch(e){
    hideLoading();
    showToast('Erro ao ler PDF: ' + e.message, 'err', 6000);
    console.error('importarPdfPedidoExistente error:', e);
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = '📄 Importar PDF de fabricação'; }
    input.value = '';
  }
}

  itens[idx].conferido = !!checked;

function estNormalizarCategoria(cat){
  const raw = String(cat || '').trim().toUpperCase();

  // Respeita o valor explícito da planilha/cadastro.
  // Nada de inferir pela descrição, porque isso estava distorcendo a categoria real.
  if(!raw) return '';
  if(raw === 'PVC') return 'PVC';
  if(raw === 'ALU' || raw === 'ALUMÍNIO' || raw === 'ALUMINIO') return 'ALU';
  if(raw === 'AÇO' || raw === 'ACO') return 'AÇO';
  if(raw === 'ACE' || raw === 'ACESSÓRIOS' || raw === 'ACESSORIOS' || raw === 'ACESSORIO' || raw === 'ACESSÓRIO') return 'ACE';
  return raw;
}

function estCategoriaGrupo(cat){
  const norm = estNormalizarCategoria(cat);
  if(norm === 'PVC') return 'PVC';
  return norm || '';
}

function estCategoriaRotulo(cat){
  return estNormalizarCategoria(cat) || '—';
}

function estCategoriaBadge(cat){
  const key = estCategoriaRotulo(cat);
  const styles = {
    'ALU':'background:#fff8e1;color:#e65100',
    'AÇO':'background:#fce4ec;color:#880e4f',
    'ACE':'background:#f3e5f5;color:#6a1b9a'
  };
  const st = styles[key] || 'background:#f5f5f5;color:#777';
  return '<span class="est-cat-badge" style="'+st+'">'+(key||'—')+'</span>';
}

async function estSalvarItensFirestoreEmLotes(items, batchId){
  if(!(db && db.collection)) return {ok:false, message:'Firestore indisponível.'};
  const safeBatchId = sanitizeText(batchId || ('batch_' + Date.now()), 80) || ('batch_' + Date.now());
  const chunkSize = 300;
  for(let i = 0; i < items.length; i += chunkSize){
    const chunk = items.slice(i, i + chunkSize);
    const batch = db.batch();
    chunk.forEach(item => {
      const payload = {
        ...item,
        codigo: sanitizeText(item.codigo, 120),
        descricao: sanitizeText(item.descricao, 300),
        categoria: sanitizeText(item.categoria, 60),
        unidade: sanitizeText(item.unidade, 30),
        batchId: safeBatchId,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: CU ? sanitizeText(CU.name, 120) : 'importação Excel'
      };
      const docId = 'item_' + String(item.id).replace(/[^a-zA-Z0-9]/g,'_');
      batch.set(db.collection('estoque').doc(docId), payload, {merge:true});
    });
    const parcialFim = Math.min(i + chunk.length, items.length);
    showLoading('Importando planilha do estoque... ' + parcialFim + '/' + items.length);
    await batch.commit();
  }
  await db.collection('estoque').doc('_meta').set({
    kind:'meta',
    currentBatchId: safeBatchId,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: CU ? sanitizeText(CU.name, 120) : 'importação Excel'
  }, {merge:true});
  return {ok:true, batchId:safeBatchId};
}


function estImportarXlsx(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls';
  inp.onchange = async e => {
    const file = e.target.files[0];
    if(!file) return;
    if(typeof XLSX === 'undefined'){ showToast('SheetJS não carregado.','err'); return; }
    const confirmed = confirm('Esta importação vai substituir a base visível do estoque. Se o banco bloquear a gravação, o sistema salvará a nova base localmente neste navegador. Deseja continuar?');
    if(!confirmed) return;
    showLoading('Lendo planilha do estoque...');
    try{
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, {type:'array'});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
      if(!rows.length){ hideLoading(); showToast('Planilha vazia.','err'); return; }

      const normalizeKey = (v) => String(v || '')
        .normalize('NFD').replace(/[̀-ͯ]/g,'')
        .toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();

      const toNumber = (v) => {
        if(v == null || v === '') return null;
        if(typeof v === 'number') return Number.isFinite(v) ? v : null;
        let s = String(v).trim();
        if(!s) return null;
        s = s.replace(/\s+/g,'');
        if(s.includes(',') && s.includes('.')){
          if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g,'').replace(',', '.');
          else s = s.replace(/,/g,'');
        }else if(s.includes(',')){
          s = s.replace(',', '.');
        }
        const n = Number(s);
        return Number.isFinite(n) ? n : null;
      };

      const imported = [];
      const seenCodes = new Set();

      for(const row of rows){
        const keys = Object.keys(row || {});
        if(!keys.length) continue;
        const byNorm = {};
        keys.forEach(k => { byNorm[normalizeKey(k)] = row[k]; });
        const pick = (...names) => {
          for(const n of names){
            const wanted = normalizeKey(n);
            const exact = Object.keys(byNorm).find(k => k === wanted);
            if(exact) return byNorm[exact];
            const partial = Object.keys(byNorm).find(k => k.includes(wanted) || wanted.includes(k));
            if(partial) return byNorm[partial];
          }
          return null;
        };

        const codigoVal = pick('codigo','código');
        const codigo = codigoVal != null ? String(codigoVal).trim() : '';
        if(!codigo || codigo === '#') continue;
        if(seenCodes.has(codigo)) continue;
        seenCodes.add(codigo);

        const descricao = String(pick('descricao','descrição') || codigo).trim();
        const categoriaOrig = pick('categoria','tipo','classe');
        const item = {
          id: imported.length + 1,
          codigo,
          descricao,
          categoria: estNormalizarCategoria(categoriaOrig) || 'ACE',
          unidade: String(pick('unidade') || 'Mts').trim(),
          saldo: toNumber(pick('saldo atual','saldo')) || 0,
          sap: toNumber(pick('estoque sap','sap')),
          min: toNumber(pick('est minimo','estoque minimo','minimo','min')),
          max: toNumber(pick('est maximo','estoque maximo','maximo','max')),
          analise: 'Analisar'
        };
        imported.push(item);
      }

      if(!imported.length){ hideLoading(); showToast('Nenhum item válido encontrado na planilha.','err'); return; }

      const pendingBatchId = 'batch_' + Date.now();
      const preparedItems = imported.map(x => ({...x, categoria: estNormalizarCategoria(x.categoria) || 'ACE', batchId:pendingBatchId}));

      estCurrentBatchId = pendingBatchId;
      estItems = preparedItems.map(x => ({...x, categoria: estNormalizarCategoria(x.categoria) || 'ACE'}));
      estUsingLocalFallback = false;
      estLastSync = new Date();
      render();

      let remoteSaved = false;
      let remoteError = null;
      try{
        const result = await estSalvarItensFirestoreEmLotes(preparedItems, pendingBatchId);
        remoteSaved = !!result.ok;
        if(!result.ok) remoteError = new Error(result.message || 'Falha ao gravar no banco.');
      }catch(errDb){
        remoteError = errDb;
      }

      hideLoading();

      if(remoteSaved){
        estClearLocalImport();
        estCurrentBatchId = (result && result.batchId) || pendingBatchId;
        estUsingLocalFallback = false;
        showToast(`Importação concluída: ${preparedItems.length} itens carregados e gravados no banco.`, 'ok', 7000);
      }else{
        estSaveLocalImport(preparedItems, 'fallback-local');
        estCurrentBatchId = 'local-fallback';
        estUsingLocalFallback = true;
        const msg = remoteError && remoteError.message ? remoteError.message : 'sem detalhe';
        showToast(`Importação concluída localmente (${preparedItems.length} itens). O banco não confirmou a gravação: ${msg}`, 'info', 9000);
      }
    } catch(err){
      hideLoading();
      showToast('Erro ao importar: ' + err.message, 'err');
    }
  };
  inp.click();
}

function estFecharBaixa(){
  estBaixaState = null;
  if(modalState === 'estBaixa') modalState = null;
  render();
}

async function estConfirmarBaixa(){
  const itemId = estBaixaState && estBaixaState.itemId;
  const qty    = parseFloat(estBaixaState && estBaixaState.qty) || 0;
  const setor  = (estBaixaState && estBaixaState.setor || '').trim();
  const obs    = (estBaixaState && estBaixaState.obs   || '').trim();

  if(!itemId){ showToast('Selecione um material.','err'); return; }
  if(!qty || qty <= 0){ showToast('Informe uma quantidade válida.','err'); return; }
  if(!setor){ showToast('Selecione o setor abastecido.','err'); return; }

  const item = estItems.find(x => Number(x.id) === Number(itemId));
  if(!item){ showToast('Material não encontrado.','err'); return; }
  if(qty > item.saldo){
    showToast(`Quantidade (${fmtN(qty)}) maior que saldo disponível (${fmtN(item.saldo)}).`,'err',5000);
    return;
  }

  showLoading('Registrando baixa...');
  try{
    const novoSaldo = parseFloat((item.saldo - qty).toFixed(2));
    // 1. Update item in memory
    const idx = estItems.findIndex(x => Number(x.id) === Number(itemId));
    estItems[idx] = {...item, saldo: novoSaldo};

    // 2. Save updated item to Firestore
    const docId = 'item_' + String(itemId);
    await db.collection('estoque').doc(docId).set({
      ...estItems[idx],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: CU ? CU.name : 'sistema'
    },{merge:true});

    // 3. Write movement log
    const logEntry = {
      tipo: 'baixa',
      itemId,
      codigo: item.codigo,
      descricao: item.descricao,
      categoria: item.categoria || '',
      quantidade: qty,
      saldoAntes: item.saldo,
      saldoDepois: novoSaldo,
      setor,
      observacao: obs,
      usuario: CU ? CU.name : 'desconhecido',
      usuarioId: CU ? CU.uid : '',
      data: new Date().toISOString(),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('estoque_log').add(logEntry);

    hideLoading();
    showToast(`Baixa registrada: ${fmtN(qty)} ${item.unidade||'Mts'} de "${item.descricao.substring(0,35)}" → ${setor}`, 'ok', 6000);
    estBaixaState = null;
    modalState = null;
    render();
  } catch(err){
    hideLoading();
    showToast('Erro ao registrar baixa: ' + err.message, 'err');
  }
}

let estLogItems = [];
let estLogLoading = false;

async function estCarregarLog(){
  estLogLoading = true;
  try{
    const snap = await db.collection('estoque_log')
      .orderBy('timestamp','desc').limit(200).get();
    estLogItems = [];
    snap.forEach(doc => estLogItems.push({id: doc.id, ...doc.data()}));
  } catch(e){ estLogItems = []; }
  estLogLoading = false;
  render();
}

async function estEstornarEntrada(logId){
  if(!can('estoque_estornar')){
    showToast('Sem permissão para estornar movimentação.','err');
    return;
  }
  const mov = estLogItems.find(x => String(x.id) === String(logId));
  if(!mov){ showToast('Movimentação não encontrada.','err'); return; }
  if(mov.tipo !== 'entrada'){ showToast('Use esta função apenas para entradas.','err'); return; }
  if(mov.estornado){ showToast('Esta entrada já foi estornada.','err'); return; }

  const itemId = Number(mov.itemId);
  const idx = estItems.findIndex(x => Number(x.id) === itemId);
  if(idx < 0){ showToast('Item da movimentação não encontrado.','err'); return; }

  const nfRef = mov.nfNumero ? ` (NF: ${mov.nfNumero})` : '';
  const ok = window.confirm(`Confirmar estorno da entrada de ${fmtN(mov.quantidade)} ${mov.unidade||estItems[idx].unidade||'UN'} do item ${mov.codigo}${nfRef}?

Isso irá reduzir o saldo em ${fmtN(mov.quantidade)} unidades.`);
  if(!ok) return;

  const item = estItems[idx];
  const qty = parseFloat(mov.quantidade) || 0;
  const novoSaldo = parseFloat(((parseFloat(item.saldo) || 0) - qty).toFixed(2));
  const obsBase = (mov.observacao || '').trim();
  const obsEstorno = `Estorno de entrada${mov.nfNumero ? ' NF ' + mov.nfNumero : ''}${obsBase ? ' | Origem: ' + obsBase : ''}`;

  showLoading('Estornando entrada...');
  try{
    estItems[idx] = {...item, saldo: novoSaldo};
    const docId = 'item_' + String(itemId);
    await db.collection('estoque').doc(docId).set({
      ...estItems[idx],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: CU ? CU.name : 'sistema'
    },{merge:true});

    await db.collection('estoque_log').doc(String(logId)).set({
      estornado: true,
      estornadoEm: new Date().toISOString(),
      estornadoPor: CU ? CU.name : 'sistema',
      estornadoPorId: CU ? CU.uid : ''
    }, {merge:true});

    await db.collection('estoque_log').add({
      tipo: 'estorno',
      refTipo: 'entrada',
      logOrigemId: String(logId),
      itemId,
      codigo: item.codigo,
      descricao: item.descricao,
      categoria: item.categoria || mov.categoria || '',
      quantidade: qty,
      nfNumero: mov.nfNumero || '',
      saldoAntes: item.saldo,
      saldoDepois: novoSaldo,
      setor: 'Estorno de Entrada',
      observacao: obsEstorno,
      usuario: CU ? CU.name : 'desconhecido',
      usuarioId: CU ? CU.uid : '',
      data: new Date().toISOString(),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    await estCarregarLog();
    hideLoading();
    showToast('Entrada estornada com sucesso.','ok');
    render();
  }catch(err){
    hideLoading();
    showToast('Erro ao estornar entrada: ' + err.message,'err',7000);
  }
}

  const item = estItems[idx];

  showLoading('Estornando movimentação...');
  try{
    estItems[idx] = {...item, saldo: novoSaldo};

    const docId = 'item_' + String(itemId);
    await db.collection('estoque').doc(docId).set({
      ...estItems[idx],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),

    await db.collection('estoque_log').doc(String(logId)).set({
      estornado: true,
      estornadoEm: new Date().toISOString(),
      estornadoPor: CU ? CU.name : 'sistema',
      estornadoPorId: CU ? CU.uid : ''
    }, {merge:true});

    await db.collection('estoque_log').add({
      tipo: 'estorno',
      refTipo: mov.tipo || 'baixa',
      logOrigemId: String(logId),
      itemId,
      codigo: item.codigo,
      descricao: item.descricao,
      categoria: item.categoria || mov.categoria || '',
      quantidade: qty,
      saldoAntes: item.saldo,
      saldoDepois: novoSaldo,
      setor: mov.setor || 'Estorno',
      observacao: obsEstorno,
      usuario: CU ? CU.name : 'desconhecido',
      usuarioId: CU ? CU.uid : '',
      data: new Date().toISOString(),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    await estCarregarLog();
    hideLoading();
    showToast('Movimentação estornada com sucesso.','ok');
    render();
  } catch(err){
    hideLoading();
    estItems[idx] = item;
    showToast('Erro ao estornar: ' + err.message,'err');
    render();
  }
}

function renderEstLog(){
  if(estLogLoading) return '<div style="padding:20px;text-align:center;font-family:Arial;color:#aaa">Carregando...</div>';
  if(!estLogItems.length) return '<div style="padding:20px;text-align:center;font-family:Arial;font-size:12px;color:#aaa">Nenhuma movimentação registrada.</div>';

  const podeEstornar = can('estoque_estornar');
  // Aplica filtros antes de renderizar
  const itemsFiltrados = estLogItems.filter(estLogItemPassaFiltro);
  const temFiltro = !!(estLogFiltroTipo || estLogFiltroTexto);
  // Itens elegíveis para seleção (baixas e entradas não estornados, nos itens filtrados)
  const elegiveis = itemsFiltrados.filter(e => (e.tipo==='baixa'||e.tipo==='entrada') && !e.estornado);
  const todosElegiveis = elegiveis.map(e=>String(e.id));
  const selecionadosVisiveis = todosElegiveis.filter(id=>estLogSelecionados.has(id));
  const todosSelecionados = todosElegiveis.length > 0 && selecionadosVisiveis.length === todosElegiveis.length;

  const rows = itemsFiltrados.map(e => {
    const dt = e.data ? new Date(e.data).toLocaleString('pt-BR') : '—';
    let tipoBadge = '<span style="background:#f3f4f6;color:#555;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:Arial">MOV</span>';
    if(e.tipo === 'baixa'){
      tipoBadge = '<span style="background:#fff3e0;color:#e65100;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:Arial">BAIXA</span>';
    }else if(e.tipo === 'entrada'){

    }else if(e.tipo === 'estorno'){
      tipoBadge = '<span style="background:#e8f5e8;color:#1e5a3a;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:Arial">ESTORNO</span>';

    const qtyColor = e.tipo === 'estorno' || e.tipo === 'entrada' ? '#1e5a3a' : (e.tipo === 'baixa' ? '#e65100' : '#1565c0');
    const qtyPrefix = e.tipo === 'estorno' || e.tipo === 'entrada' ? '+' : (e.tipo === 'baixa' ? '-' : '±');
    const estornado = !!e.estornado;
    const elegivel = podeEstornar && (e.tipo === 'baixa' || e.tipo === 'entrada') && !estornado;
    const selecionado = estLogSelecionados.has(String(e.id));

    const statusHtml = estornado
      ? '<span style="background:#f3f4f6;color:#666;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:Arial">ESTORNADO</span>'

          : '<span style="background:#eef2ff;color:#4f46e5;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:Arial">ATIVO</span>');

    // Checkbox para seleção múltipla (só para elegíveis)
    const chkCell = elegivel

  // Barra de ações em lote

  const batchBar = podeEstornar ? `

        <input type="checkbox" ${todosSelecionados?'checked':''} ${elegiveis.length===0?'disabled':''}
          onchange="estToggleTodosLog(this.checked)"
          style="width:14px;height:14px;accent-color:var(--ph);cursor:pointer"/>
        <span style="color:#444">${todosSelecionados?'Desmarcar todos':'Selecionar todos elegíveis'} <span style="color:#888">(${elegiveis.length})</span></span>
      </label>
      ${sel>0 ? `
        <span id="est-log-sel-count" style="font-size:11px;font-family:Arial;color:#1e5a3a;font-weight:700">${sel} selecionado(s)</span>
        <button class="sBtn" style="background:#cc4400;color:#fff;border-color:#cc4400;font-size:11px;padding:5px 12px"
          onclick="estEstornarLote()">↺ Estornar ${sel} item(ns)</button>
        <button class="sBtn" style="font-size:11px" onclick="estLogSelecionados.clear();render()">Limpar seleção</button>
      ` : `<span style="font-size:11px;font-family:Arial;color:#888">Marque os itens para estornar em lote</span>`}
    </div>` : '';

  const tipoOpts = [
    ['', 'Todos os tipos'],
    ['entrada', 'Entrada'],
    ['baixa', 'Baixa'],
    ['estorno', 'Estorno'],
    ['ajuste', 'Ajuste'],
  ];
  const filtroBar = `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8f8f8;border:1px solid #e0e8e0;border-radius:6px;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:700;color:#555;font-family:Arial">Filtrar:</span>
      <div style="display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #bbb;border-radius:4px;padding:3px 8px">
        <span style="color:#aaa;font-size:12px">⌕</span>
        <input type="text" placeholder="Código, NF, material, usuário..."
          value="${estLogFiltroTexto}"
          oninput="estLogSetFiltroTexto(this.value)"
          style="border:none;outline:none;font-size:11px;font-family:Arial;min-width:200px;background:none"/>
      </div>
      <select onchange="estLogSetFiltroTipo(this.value)"
        style="background:#fff;border:1px solid #bbb;border-radius:4px;padding:5px 7px;font-size:11px;font-family:Arial;outline:none">
        ${tipoOpts.map(([v,l])=>`<option value="${v}" ${estLogFiltroTipo===v?'selected':''}>${l}</option>`).join('')}
      </select>
      ${temFiltro ? `<button onclick="estLogLimparFiltros()" style="padding:4px 10px;border-radius:4px;border:1px solid #bbb;background:#fff;font-size:11px;font-family:Arial;cursor:pointer;color:#555">✕ Limpar</button>` : ''}
      <span style="margin-left:auto;font-size:11px;font-family:Arial;color:#888">

  return `<div>

// ── Filtros do log ────────────────────────────────────────────
function estLogSetFiltroTipo(v){
  estLogFiltroTipo = v;
  render();
}
function estLogSetFiltroTexto(v){
  estLogFiltroTexto = v.toLowerCase().trim();
  render();
}
function estLogLimparFiltros(){
  estLogFiltroTipo = '';
  estLogFiltroTexto = '';
  render();
}
function estLogItemPassaFiltro(e){
  if(estLogFiltroTipo && e.tipo !== estLogFiltroTipo) return false;
  if(estLogFiltroTexto){
    const haystack = [e.codigo, e.descricao, e.nfNumero, e.usuario, e.observacao, e.setor]
      .map(x => String(x||'').toLowerCase()).join(' ');
    if(!haystack.includes(estLogFiltroTexto)) return false;
  }
  return true;
}

// ── Seleção múltipla ──────────────────────────────────────────
function estToggleLogSel(id, checked){
  if(checked) estLogSelecionados.add(String(id));
  else estLogSelecionados.delete(String(id));
  // Atualiza só a linha e a barra sem re-renderizar (evita scroll reset)
  const tr = document.querySelector('[data-logid="' + id + '"]');
  if(tr) tr.style.background = checked ? '#f0faf4' : '';
  _estAtualizarBarraSelecao();
}
function estToggleTodosLog(checked){
  if(checked){
    estLogItems
      .filter(e=>(e.tipo==='baixa'||e.tipo==='entrada')&&!e.estornado)
      .forEach(e=>estLogSelecionados.add(String(e.id)));
  } else {
    estLogSelecionados.clear();
  }
  // Atualiza todas as linhas visíveis sem re-renderizar
  document.querySelectorAll('[data-logid]').forEach(tr => {
    const id = tr.getAttribute('data-logid');
    const elegivel = estLogItems.some(e=>String(e.id)===id && (e.tipo==='baixa'||e.tipo==='entrada') && !e.estornado);
    if(elegivel){
      const sel = estLogSelecionados.has(id);
      tr.style.background = sel ? '#f0faf4' : '';
      const chk = tr.querySelector('input[type="checkbox"]');
      if(chk) chk.checked = sel;
    }
  });
  _estAtualizarBarraSelecao();
}

function _estAtualizarBarraSelecao(){
  // Atualiza contador e botão na barra sem re-renderizar tudo
  const sel = estLogSelecionados.size;
  const countEl = document.getElementById('est-log-sel-count');
  if(countEl){
    countEl.textContent = sel + ' selecionado(s)';
  } else {
    // Barra ainda não existe (0 -> >0) ou sumiu (>0 -> 0): precisa render completo
    // Salva scroll, renderiza, restaura
    const sc = document.getElementById('est-log-scroll');
    const st = sc ? sc.scrollTop : 0;
    render();
    setTimeout(()=>{ const s=document.getElementById('est-log-scroll'); if(s) s.scrollTop=st; }, 0);
  }
  // Atualiza também o botão de estornar com a contagem certa
  const btn = document.querySelector('[onclick="estEstornarLote()"]');
  if(btn) btn.textContent = '↺ Estornar ' + sel + ' item(ns)';
  // Atualiza checkbox "selecionar todos"
  const chkAll = document.querySelector('[onchange="estToggleTodosLog(this.checked)"]');
  if(chkAll){
    const elegiveis = estLogItems.filter(e=>(e.tipo==='baixa'||e.tipo==='entrada')&&!e.estornado);
    const todos = elegiveis.length > 0 && elegiveis.every(e=>estLogSelecionados.has(String(e.id)));
    chkAll.checked = todos;
  }
}

async function estEstornarLote(){
  if(!can('estoque_estornar')){ showToast('Sem permissão para estornar.','err'); return; }
  const ids = [...estLogSelecionados];
  if(!ids.length){ showToast('Nenhum item selecionado.','err'); return; }

  // Separar por tipo
  const movs = ids.map(id => estLogItems.find(e=>String(e.id)===String(id))).filter(Boolean);
  const nomes = movs.map(function(m){ return '\u2022 '+m.tipo.toUpperCase()+' \u2014 '+m.codigo+' | '+fmtN(m.quantidade)+' '+(m.unidade||'UN')+(m.nfNumero?' | NF:'+m.nfNumero:''); }).join('\n');
  const ok = window.confirm('Confirmar estorno em lote de '+movs.length+' item(ns)?\n\n'+nomes+'\n\nEsta a\u00e7\u00e3o n\u00e3o pode ser desfeita.');
  if(!ok) return;

  showLoading(`Estornando ${movs.length} item(ns)...`);
  let ok_count=0, err_count=0;
  for(const mov of movs){
    try{
      if(mov.tipo==='entrada'){
        await _estEstornarEntradaSilent(mov);
      } else {
        await _estEstornarBaixaSilent(mov);
      }
      ok_count++;
    } catch(e){
      err_count++;
      console.error('Estorno em lote erro:', mov.id, e);
    }
  }
  await estCarregarLog();
  estLogSelecionados.clear();
  hideLoading();
  showToast(`Estorno concluído: ${ok_count} item(ns) estornado(s)${err_count?', '+err_count+' erro(s)':''}.`, err_count?'info':'ok', 5000);
  render();
}

// Versões silent (sem confirm individual) para uso no lote
async function _estEstornarEntradaSilent(mov){
  const itemId = Number(mov.itemId);
  const idx = estItems.findIndex(x=>Number(x.id)===itemId);
  if(idx<0) throw new Error('Item não encontrado');
  const item = estItems[idx];
  const qty = parseFloat(mov.quantidade)||0;
  const novoSaldo = parseFloat(((parseFloat(item.saldo)||0)-qty).toFixed(2));
  const obsEstorno = `Estorno de entrada${mov.nfNumero?' NF '+mov.nfNumero:''}${mov.observacao?' | '+mov.observacao:''}`;
  estItems[idx]={...item,saldo:novoSaldo};
  const docId='item_'+String(itemId);
  await db.collection('estoque').doc(docId).set({...estItems[idx],updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:CU?CU.name:'sistema'},{merge:true});
  await db.collection('estoque_log').doc(String(mov.id)).set({estornado:true,estornadoEm:new Date().toISOString(),estornadoPor:CU?CU.name:'sistema',estornadoPorId:CU?CU.uid:''},{merge:true});
  await db.collection('estoque_log').add({tipo:'estorno',refTipo:'entrada',logOrigemId:String(mov.id),itemId,codigo:item.codigo,descricao:item.descricao,categoria:item.categoria||mov.categoria||'',quantidade:qty,nfNumero:mov.nfNumero||'',saldoAntes:item.saldo,saldoDepois:novoSaldo,setor:'Estorno de Entrada',observacao:obsEstorno,usuario:CU?CU.name:'desconhecido',usuarioId:CU?CU.uid:'',data:new Date().toISOString(),timestamp:firebase.firestore.FieldValue.serverTimestamp()});
}
async function _estEstornarBaixaSilent(mov){
  const itemId = Number(mov.itemId);
  const idx = estItems.findIndex(x=>Number(x.id)===itemId);
  if(idx<0) throw new Error('Item não encontrado');
  const item = estItems[idx];
  const qty = parseFloat(mov.quantidade)||0;
  const novoSaldo = parseFloat(((parseFloat(item.saldo)||0)+qty).toFixed(2));
  const obsEstorno = `Estorno da baixa${mov.observacao?' | '+mov.observacao:''}`;
  estItems[idx]={...item,saldo:novoSaldo};
  const docId='item_'+String(itemId);
  await db.collection('estoque').doc(docId).set({...estItems[idx],updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:CU?CU.name:'sistema'},{merge:true});
  await db.collection('estoque_log').doc(String(mov.id)).set({estornado:true,estornadoEm:new Date().toISOString(),estornadoPor:CU?CU.name:'sistema',estornadoPorId:CU?CU.uid:''},{merge:true});
  await db.collection('estoque_log').add({tipo:'estorno',refTipo:'baixa',logOrigemId:String(mov.id),itemId,codigo:item.codigo,descricao:item.descricao,categoria:item.categoria||mov.categoria||'',quantidade:qty,nfNumero:mov.nfNumero||'',saldoAntes:item.saldo,saldoDepois:novoSaldo,setor:mov.setor||'Estorno',observacao:obsEstorno,usuario:CU?CU.name:'desconhecido',usuarioId:CU?CU.uid:'',data:new Date().toISOString(),timestamp:firebase.firestore.FieldValue.serverTimestamp()});
}

// ============================================================
// ESTOQUE — MODAL SOLICITAÇÃO DE AJUSTE (requer aprovação)
// ============================================================
let estAjusteState = null;
let estLogSelecionados = new Set(); // IDs selecionados para estorno em lote
let estLogFiltroTipo   = '';   // '', 'entrada', 'baixa', 'estorno', 'ajuste'
let estLogFiltroTexto  = '';   // busca livre: código, NF, material, usuário

function estAbrirAjuste(itemId){
  const item = estItems.find(x => Number(x.id) === Number(itemId));
  if(!item) return;
  estAjusteState = { itemId, novoSaldo: item.saldo, justificativa: '' };
  modalState = 'estAjuste';
  render();
}

function renderEstAjusteModal(){
  if(!estAjusteState) return '';
  const item = estItems.find(x => x.id === estAjusteState.itemId);
  if(!item) return '';
  const diff = (parseFloat(estAjusteState.novoSaldo)||0) - item.saldo;
  const diffHtml = diff === 0
    ? '<span style="color:#888;font-size:11px;font-family:Arial">Sem alteração</span>'
    : `<span style="color:${diff>0?'#2d8a4e':'#cc2222'};font-size:11px;font-family:Arial;font-weight:700">${diff>0?'+':''}${fmtN(diff)} em relação ao saldo atual (${fmtN(item.saldo)})</span>`;

  return `<div class="overlay" onclick="if(event.target===this){estAjusteState=null;modalState=null;render()}">
  <div class="est-modal" onclick="event.stopPropagation()" style="max-width:460px">
    <div class="est-modal-title">📋 Solicitar Ajuste de Saldo
      <span style="cursor:pointer;color:#aaa;font-size:18px" onclick="estAjusteState=null;modalState=null;render()">✕</span>
    </div>
    <div style="background:#fff8e0;border:1px solid #e8a44a;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:11px;font-family:Arial;color:#7a4f00">
      ⚠ Ajuste direto de saldo requer justificativa e aprovação do administrador.
    </div>
    <div style="background:#f4f8f4;border:1px solid #c8d8c8;border-radius:6px;padding:10px;margin-bottom:14px">
      <div style="font-size:11px;font-family:Arial;font-weight:700;color:var(--ph)">${escH(item.codigo)}</div>
      <div style="font-size:11px;font-family:Arial;color:#555">${escH(item.descricao)}</div>
      <div style="font-size:12px;font-family:Arial;margin-top:4px">Saldo atual: <strong>${fmtN(item.saldo)}</strong> ${item.unidade||'Mts'}</div>
    </div>

async function estEnviarAjuste(){
  if(invAtivo && invAtivo.status === 'em_andamento'){
    showToast('⚠ Ajustes bloqueados durante o inventário em andamento.','err',5000); return;
  }
  const item = estItems.find(x => x.id === estAjusteState.itemId);
  if(!item) return;
  const novoSaldo = parseFloat(estAjusteState.novoSaldo) || 0;
  const just = (estAjusteState.justificativa || '').trim();
  if(!just){ showToast('Justificativa obrigatória.','err'); return; }
  if(novoSaldo === item.saldo){ showToast('Saldo não foi alterado.','err'); return; }
  showLoading('Enviando solicitação...');
  try{
    await db.collection('estoque_ajustes').add({
      itemId: item.id,
      codigo: item.codigo,
      descricao: item.descricao,
      saldoAtual: item.saldo,
      novoSaldo,
      diferenca: novoSaldo - item.saldo,
      justificativa: just,
      status: 'pendente',
      solicitante: CU ? CU.name : '',
      solicitanteId: CU ? CU.uid : '',
      criadoEm: new Date().toISOString(),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    hideLoading();
    showToast('Solicitação enviada! Aguardando aprovação do administrador.', 'ok', 6000);
    estAjusteState = null;
    modalState = null;
    render();
  } catch(err){
    hideLoading();
    showToast('Erro ao enviar: ' + err.message,'err');
  }
}

let estPendentesAjuste = [];

async function estCarregarAjustesPendentes(){
  try{
    const snap = await db.collection('estoque_ajustes')
      .where('status','==','pendente').get();
    estPendentesAjuste = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>{
        const ta = a.timestamp?.toMillis?.() || new Date(a.criadoEm||0).getTime();
        const tb = b.timestamp?.toMillis?.() || new Date(b.criadoEm||0).getTime();
        return tb - ta;
      });
  } catch(e){ estPendentesAjuste = []; }
  render();
}

async function estAprovarAjuste(ajusteId, aprovado, silencioso=false){
  const aj = estPendentesAjuste.find(x => x.id === ajusteId);
  if(!aj) return;
  const acao = aprovado ? 'aprovado' : 'rejeitado';
  if(!silencioso) showLoading(aprovado ? 'Aprovando ajuste...' : 'Rejeitando ajuste...');
  try{
    await db.collection('estoque_ajustes').doc(ajusteId).update({
      status: acao,
      decididoPor: CU ? CU.name : '',
      decididoEm: new Date().toISOString()
    });
    if(aprovado){
      // Apply the saldo change
      const idx = estItems.findIndex(x => x.id === aj.itemId);
      if(idx >= 0){
        estItems[idx] = {...estItems[idx], saldo: aj.novoSaldo};
        const docId = 'item_' + String(aj.itemId);
        await db.collection('estoque').doc(docId).set({
          saldo: aj.novoSaldo,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: CU ? CU.name : ''
        },{merge:true});
        // Log it
        await db.collection('estoque_log').add({
          tipo: 'ajuste',
          itemId: aj.itemId,
          codigo: aj.codigo,
          descricao: aj.descricao,
          quantidade: Math.abs(aj.diferenca),
          saldoAntes: aj.saldoAtual,
          saldoDepois: aj.novoSaldo,
          setor: 'Ajuste admin',
          observacao: `Aprovado: ${aj.justificativa}`,
          usuario: CU ? CU.name : '',
          usuarioId: CU ? CU.uid : '',
          data: new Date().toISOString(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }
    if(!silencioso){
      hideLoading();
      showToast(`Ajuste ${acao}!`, 'ok');
    }
    // onSnapshot atualiza estPendentesAjuste automaticamente
  } catch(err){
    if(!silencioso) hideLoading();
    throw err; // re-lança para estAprovarSelecionados capturar
  }
}

function invFmtDate(v){
  if(!v) return '—';
  try{
    const d = v.toDate ? v.toDate() : new Date(v);
    return isNaN(d) ? '—' : d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(_){ return '—'; }
}
function invMatIcon(m){ return {PVC:'🟦',ALU:'🟧',AÇO:'🟥',ACE:'🟪',LP:'🔵'}[m]||'📦'; }
function invMatBadgeCls(m){ return {PVC:'inv-badge-pvc',ALU:'inv-badge-alu','AÇO':'inv-badge-aco',ACE:'inv-badge-ace',LP:'inv-badge-lp'}[m]||''; }

function invNormCategoria(cat){
  const s = String(cat||'').trim().toUpperCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'');
  if(['PVC','PERFIL PVC'].includes(s) || s.includes('PVC')) return 'PVC';
  if(['ALU','ALUMINIO','ALUMINIUM','AL'].includes(s) || s.includes('ALUMIN')) return 'ALU';
  if(['ACO','AÇO','AC'].includes(s) || s.includes('ACO')) return 'AÇO';
  if(['ACE','ACESSORIO','ACESSORIOS'].includes(s) || s.includes('ACESS')) return 'ACE';
  return s;
}

// ── Iniciar inventário ────────────────────────────────────────
async function invIniciar(){
  if(estPendentesAjuste.length){
    showToast('⚠ Existem '+estPendentesAjuste.length+' ajuste(s) pendente(s). Resolva antes de iniciar o inventário.','err',6000);
    return;
  }
  if(invAtivo){ showToast('Já existe um inventário em andamento ou pausado.','err'); return; }
  if(!confirm('Iniciar novo inventário? As movimentações de estoque serão congeladas até o encerramento.')) return;
  showLoading('Iniciando inventário...');
  try{
    const now = new Date().toISOString();
    const ref = await db.collection('inventarios').add({
      status: 'em_andamento',
      iniciadoPor: CU.name||CU.email,
      iniciadoUid: CU.uid,
      iniciadoEm: now,
      estoqueConfirmado: false,
      lpConfirmada: false,
      rodadaAtualEstoque: 1,
      rodadaAtualLP: 1
    });
    // Criar contagem 1 para cada material (estoque) + LP
    const materiais = ['PVC','ALU','AÇO','ACE'];
    const itensPorMat = (mat) => estItems
      .filter(i => invNormCategoria(i.categoria) === mat)
      .map(i => ({ itemId:i.id, codigo:i.codigo||'', descricao:i.descricao||'', unidade:i.unidade||'un', saldoSistema:i.saldo||0, qtdContada:null, contadoPor:'', divergente:false }));

    const batch = db.batch();
    for(const mat of materiais){
      const itens = itensPorMat(mat);
      if(!itens.length) continue;
      const cRef = ref.collection('contagens').doc();
      batch.set(cRef,{ numero:1, tipo:'estoque', material:mat, status:'aberta', criadaEm:now, itens });
    }
    // LP — todos os itens
    const itensLP = estItems.map(i=>({ itemId:i.id, codigo:i.codigo||'', descricao:i.descricao||'', unidade:i.unidade||'un', saldoSistema:i.saldo||0, qtdContada:null, contadoPor:'', divergente:false }));
    const lpRef = ref.collection('contagens').doc();
    batch.set(lpRef,{ numero:1, tipo:'lp', material:'LP', status:'aberta', criadaEm:now, itens:itensLP });

    // Etapa 3 — Contagem de pedidos em Corte e Montagem
    const pedidosInv = (typeof pedidos !== 'undefined' ? pedidos : []).filter(p=>{
      const s = p.setor||'';
      const ext = isPedidoExternoLogistica ? isPedidoExternoLogistica(p) : false;
      return !ext && (s.includes('1. Corte') || s.includes('2. Montagem'));
    });
    const itensPed = pedidosInv.map(p=>({
      pedidoId: p.id,
      at: p.at||'',
      nomes: p.nomes||p.cliente||'',
      setor: p.setor||'',
      urp: p.urp||0,
      posicoes: (Array.isArray(p.checklistExpedicao) ? p.checklistExpedicao : []).map(pos=>({
        posicao: pos.posicao||'',
        quantidade: pos.quantidade||1,
        formato: pos.formato||'',
        urp: pos.urp||0,
        etapa: null,   // etapa física encontrada
        obs: ''
      }))
    }));
    const pedRef = ref.collection('contagens').doc();
    batch.set(pedRef,{ numero:1, tipo:'pedidos', material:'PEDIDOS', status:'aberta', criadaEm:now, itens:itensPed });

    await batch.commit();
    hideLoading();
    showToast('Inventário iniciado! Movimentações congeladas.','ok',5000);
    render();
  }catch(e){ hideLoading(); showToast('Erro: '+(e.message||e),'err'); }
}

// ── Encerrar uma contagem e gerar próxima se necessário ──────
async function invEncerrarContagem(contagemId){
  if(!invAtivo) return;
  const cont = invContagens.find(c=>c.id===contagemId);
  if(!cont) return;
  const naoContados = cont.itens.filter(it=>it.qtdContada===null||it.qtdContada==='');
  if(naoContados.length){
    if(!confirm(`${naoContados.length} item(ns) sem contagem. Encerrar mesmo assim (serão marcados como divergentes)?`)) return;
  }
  showLoading('Encerrando contagem...');
  try{
    const now = new Date().toISOString();
    const ref = db.collection('inventarios').doc(invAtivo.id);
    const cRef = ref.collection('contagens').doc(contagemId);

    const isLP = cont.tipo === 'lp';

    // Calcular divergências comparando com contagem anterior do mesmo material
    const anteriores = invContagens
      .filter(c=>c.tipo===cont.tipo && c.material===cont.material && c.status==='encerrada')
      .sort((a,b)=>b.numero-a.numero);
    const anterior = anteriores[0] || null;

    let itensAtualizados;
    if(!anterior){
      // Rodada 1: divergente = diferença com saldo sistema
      itensAtualizados = cont.itens.map(it=>({
        ...it,
        qtdContada: it.qtdContada ?? null,
        divergente: it.qtdContada !== null && it.qtdContada !== it.saldoSistema
      }));
    } else {
      // Rodada N: divergente = diferença com contagem anterior
      const mapAnt = Object.fromEntries(anterior.itens.map(it=>[it.itemId, it.qtdContada]));
      itensAtualizados = cont.itens.map(it=>({
        ...it,
        divergente: it.qtdContada !== mapAnt[it.itemId]
      }));
    }

    await cRef.update({ status:'encerrada', encerradaEm:now, itens:itensAtualizados });

    const divergentes = itensAtualizados.filter(it=>it.divergente);

    // Verificar se já há convergência (≥2 contagens consecutivas idênticas)
    const mesmaMat = invContagens
      .filter(c=>c.tipo===cont.tipo && c.material===cont.material)
      .sort((a,b)=>a.numero-b.numero);

    let convergiu = false;
    if(mesmaMat.length >= 2){
      const ultima = itensAtualizados;
      const penultima = mesmaMat[mesmaMat.length-2].itens;
      const mapUlt = Object.fromEntries(ultima.map(it=>[it.itemId,it.qtdContada]));
      convergiu = penultima.every(it=>mapUlt[it.itemId]===it.qtdContada);
    }

    if(convergiu || divergentes.length === 0){
      // Marcar esta contagem do material como convergida
      await cRef.update({ convergida:true });
      showToast(`✓ ${cont.material} convergiu na rodada ${cont.numero}!`,'ok',5000);
    } else {
      // Criar próxima contagem apenas com divergentes (LP sempre 100%)
      const prox = cont.numero + 1;
      const proximosItens = isLP
        ? itensAtualizados.map(it=>({...it, qtdContada:null, contadoPor:'', divergente:false}))
        : divergentes.map(it=>({...it, qtdContada:null, contadoPor:'', divergente:false}));

      await ref.collection('contagens').add({
        numero:prox, tipo:cont.tipo, material:cont.material,
        status:'aberta', criadaEm:now, itens:proximosItens
      });
      showToast(`Contagem ${cont.numero} encerrada. ${divergentes.length} divergência(s) → nova rodada ${prox} criada.`,'ok',6000);
    }
    hideLoading();
    invVoltarPainel();
  }catch(e){ hideLoading(); showToast('Erro: '+(e.message||e),'err'); }
}

// ── Confirmar e aplicar saldos finais (estoque) ──────────────
async function invConfirmarEstoque(){
  if(!invAtivo) return;
  // Verificar se todas as contagens de estoque convergiram
  const mats = ['PVC','ALU','AÇO','ACE'];
  for(const mat of mats){
    const conts = invContagens.filter(c=>c.tipo==='estoque'&&c.material===mat);
    if(!conts.length) continue;
    const ultima = conts.sort((a,b)=>b.numero-a.numero)[0];
    if(!ultima.convergida){ showToast(`Material ${mat} ainda não convergiu.`,'err',5000); return; }
  }
  if(!confirm('Aplicar saldos finais do inventário ao estoque? Esta ação não pode ser desfeita.')) return;
  showLoading('Aplicando saldos...');
  try{
    const now = new Date().toISOString();
    const batch = db.batch();
    for(const mat of mats){
      const conts = invContagens.filter(c=>c.tipo==='estoque'&&c.material===mat&&c.convergida);
      if(!conts.length) continue;
      const ultima = conts.sort((a,b)=>b.numero-a.numero)[0];
      for(const it of ultima.itens){
        if(it.extra) continue; // Itens extras validados separadamente
        const docId = 'item_'+String(it.itemId);
        const esRef = db.collection('estoque').doc(docId);
        batch.set(esRef,{ saldo:it.qtdContada, updatedAt:firebase.firestore.FieldValue.serverTimestamp(), updatedBy:'Inventário '+invAtivo.id },{ merge:true });
        // Log
        const logRef = db.collection('estoque_log').doc();
        batch.set(logRef,{ tipo:'inventario', itemId:it.itemId, codigo:it.codigo, descricao:it.descricao, quantidade:Math.abs((it.qtdContada||0)-it.saldoSistema), saldoAntes:it.saldoSistema, saldoDepois:it.qtdContada, setor:'Inventário', observacao:'Fechamento inventário '+invAtivo.id, usuario:CU.name||CU.email, usuarioId:CU.uid, data:now, timestamp:firebase.firestore.FieldValue.serverTimestamp() });
      }
    }
    await batch.commit();
    await db.collection('inventarios').doc(invAtivo.id).update({ estoqueConfirmado:true, estoqueConfirmadoEm:now, estoqueConfirmadoPor:CU.name||CU.email });
    hideLoading();
    showToast('Saldos do inventário aplicados ao estoque!','ok',6000);
    render();
  }catch(e){ hideLoading(); showToast('Erro: '+(e.message||e),'err'); }
}

async function invCommitBatchInChunks(ops, chunkSize=350){
  for(let i=0;i<ops.length;i+=chunkSize){
    const batch = db.batch();
    ops.slice(i,i+chunkSize).forEach(op=>{
      if(op.type==='set') batch.set(op.ref, op.data, op.options||{});
      else if(op.type==='update') batch.update(op.ref, op.data);
    });
    await batch.commit();
  }
}

  if(!invAtivo) return;
  if(CU?.role !== 'admin'){ showToast('Apenas admin pode estornar inventário.','err'); return; }
  if(!invAtivo.estoqueConfirmado){
    showToast('Este inventário ainda não aplicou saldos. Use Cancelar inventário de teste.','info',6000);
    return;
  }
  if(invAtivo.estornadoEm){ showToast('Este inventário já foi estornado.','err'); return; }
  const ok = confirm('ESTORNAR o inventário aplicado?\n\nO sistema tentará restaurar o saldo anterior registrado nos logs do inventário. Esta ação é crítica.');
  if(!ok) return;
  showLoading('Localizando logs do inventário...');
  try{
    const snap = await db.collection('estoque_log').where('tipo','==','inventario').get();
    const logs = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(l => !l.estornado && String(l.observacao||'').includes(invAtivo.id));
    if(!logs.length){ hideLoading(); showToast('Nenhum log de inventário encontrado para estorno.','err',7000); return; }

    const now = new Date().toISOString();
    const ops = [];
    logs.forEach(l=>{
      const itemId = l.itemId;
      const docId = 'item_'+String(itemId);
      const saldoAntes = parseFloat(l.saldoAntes)||0;
      const saldoDepois = parseFloat(l.saldoDepois)||0;
      const esRef = db.collection('estoque').doc(docId);
      const logRef = db.collection('estoque_log').doc(String(l.id));
      const novoLogRef = db.collection('estoque_log').doc();
      ops.push({type:'set', ref:esRef, data:{ saldo:saldoAntes, updatedAt:firebase.firestore.FieldValue.serverTimestamp(), updatedBy:'Estorno inventário '+invAtivo.id }, options:{merge:true}});
      ops.push({type:'set', ref:logRef, data:{ estornado:true, estornadoEm:now, estornadoPor:CU.name||CU.email, estornadoPorId:CU.uid }, options:{merge:true}});
      ops.push({type:'set', ref:novoLogRef, data:{ tipo:'estorno', refTipo:'inventario', logOrigemId:String(l.id), inventarioId:invAtivo.id, itemId, codigo:l.codigo||'', descricao:l.descricao||'', quantidade:Math.abs(saldoDepois-saldoAntes), saldoAntes:saldoDepois, saldoDepois:saldoAntes, setor:'Estorno de Inventário', observacao:'Estorno do inventário '+invAtivo.id, usuario:CU.name||CU.email, usuarioId:CU.uid, data:now, timestamp:firebase.firestore.FieldValue.serverTimestamp() }});
    });
    ops.push({type:'update', ref:db.collection('inventarios').doc(invAtivo.id), data:{ status:'estornado', estornadoEm:now, estornadoPor:CU.name||CU.email }});
    await invCommitBatchInChunks(ops);
    invContagemSel = null;
    activePage = 'inventario';
    hideLoading();
    showToast('Inventário estornado. Saldos anteriores restaurados e movimentações liberadas.','ok',8000);
  }catch(e){ hideLoading(); showToast('Erro ao estornar: '+(e.message||e),'err',8000); }
}

// ── Exportar CSV ─────────────────────────────────────────────
async function invExportarCSV(invId){
  try{
    const snap = await db.collection('inventarios').doc(invId).collection('contagens').get();
    const rows = [['Inventário','Rodada','Tipo','Material','Código','Descrição','Unidade','Saldo Sistema','Qtd Contada','Diferença','Divergente','Contado Por']];
    snap.forEach(doc=>{
      const c = doc.data();
      (c.itens||[]).forEach(it=>{
        const dif = it.qtdContada!==null ? (it.qtdContada-(it.saldoSistema||0)).toFixed(4) : '';
        rows.push([invId, c.numero, c.tipo==='lp'?'LP':'Estoque', c.material||'', it.codigo||'', it.descricao||'', it.unidade||'', it.saldoSistema??'', it.qtdContada??'', dif, it.divergente?'Sim':'Não', it.contadoPor||'']);
      });
    });
    const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inventario_'+invId+'_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
    showToast('CSV exportado.','ok');
  }catch(e){ showToast('Erro ao exportar: '+(e.message||e),'err'); }
}

// ── Salvar etapa de uma posição (etapa 3) ────────────────────
async function invSalvarEtapaPosicao(contagemId, pedidoId, posIdx, etapa, obs){
  if(!invAtivo) return;
  const cont = invContagens.find(c=>c.id===contagemId);
  if(!cont) return;
  const novosItens = cont.itens.map(it=>{
    if(it.pedidoId !== pedidoId) return it;
    const novasPosicoes = it.posicoes.map((pos,i)=>
      i === posIdx ? {...pos, etapa: etapa||null, obs: obs||'', lancadoPor: CU.name||CU.email} : pos
    );
    return {...it, posicoes: novasPosicoes};
  });
  await db.collection('inventarios').doc(invAtivo.id)
    .collection('contagens').doc(contagemId)
    .update({ itens: novosItens });
}

// ── Pedido selecionado na etapa 3 ────────────────────────────
let invPedidoExpandido = null;
function invTogglePedido(pedidoId){
  invPedidoExpandido = invPedidoExpandido === pedidoId ? null : pedidoId;

  const el = document.getElementById('inv-ped-detail-'+pedidoId);
  if(el) el.style.display = invPedidoExpandido===pedidoId ? 'table-row' : 'none';
  else render();

// ── Encerrar contagem de pedidos ─────────────────────────────
async function invEncerrarContagemPedidos(contagemId){
  if(!invAtivo) return;
  const cont = invContagens.find(c=>c.id===contagemId);
  if(!cont) return;
  const semEtapa = cont.itens.reduce((acc,it)=>
    acc + it.posicoes.filter(p=>!p.etapa).length, 0);
  if(semEtapa > 0){
    if(!confirm(`${semEtapa} posição(ões) sem etapa informada. Encerrar mesmo assim?`)) return;
  }
  const now = new Date().toISOString();
  await db.collection('inventarios').doc(invAtivo.id)
    .collection('contagens').doc(contagemId)
    .update({ status:'encerrada', encerradaEm:now, convergida:true });
  showToast('Contagem de pedidos encerrada.','ok',4000);
  invVoltarPainel();
}

// ── Exportar CSV de pedidos ───────────────────────────────────
async function invExportarCSVPedidos(invId){
  try{
    const snap = await db.collection('inventarios').doc(invId).collection('contagens')
      .where('tipo','==','pedidos').get();
    const rows = [['Inventário','Pedido (AT)','Cliente','Setor Sistema','Posição','Quantidade','Formato','URP pos.','Etapa Física','Observação','Lançado por']];
    snap.forEach(doc=>{
      const c = doc.data();
      (c.itens||[]).forEach(it=>{
        if(!it.posicoes||!it.posicoes.length){
          rows.push([invId, it.at||'', it.nomes||'', it.setor||'', '—','','','','','','']);
        } else {
          it.posicoes.forEach(pos=>{
            rows.push([invId, it.at||'', it.nomes||'', it.setor||'', pos.posicao||'', pos.quantidade||1, pos.formato||'', pos.urp||0, pos.etapa||'', pos.obs||'', pos.lancadoPor||'']);
          });
        }
      });
    });
    const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inv_pedidos_'+invId+'_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
    showToast('CSV de pedidos exportado.','ok');
  }catch(e){ showToast('Erro: '+(e.message||e),'err'); }
}

  // Card LP

  const abrLP  = contagensLP.find(c=>c.status==='aberta');
  const itLPtot= ultiLP?.itens?.length||0;

  const lpCard = `<div class="inv-mat-card ${lpConv?'done':abrLP&&itLPct>0?'divergente':''}" style="grid-column:1/-1;max-width:300px">
