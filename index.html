function renderInventarioContagem(){
  if(!invContagemSel) return '<div class="ger-inner"><div class="warn-box">Nenhuma contagem selecionada.</div></div>';
  const { invId, contagemId } = invContagemSel;
  const inv  = invAtivo;
  const cont = invContagens.find(c=>c.id===contagemId);
  // Etapa 3 — contagem de pedidos tem render próprio
  if(cont && cont.tipo === 'pedidos') return renderInventarioContagemPedidos();
  if(!cont) return '<div class="ger-inner"><div class="warn-box">Contagem não encontrada.</div></div>';

  const isLP      = cont.tipo === 'lp';
  const isPausado = inv?.status === 'pausado';
  const isEncerrada = cont.status === 'encerrada';
  const itens = cont.itens || [];

  const totalItens    = itens.length;
  const contados      = itens.filter(i=>i.qtdContada!==null).length;
  const divergentes   = itens.filter(i=>i.divergente).length;
  const pct           = totalItens ? Math.round(contados/totalItens*100) : 0;

  const matCls = invMatBadgeCls(cont.material);

  const rows = itens.map((it,idx)=>{
    const isFilled = it.qtdContada !== null;
    const isDiv    = it.divergente;
    const isConv   = isEncerrada && !isDiv;
    const rowCls   = isConv ? 'convergido' : isDiv ? 'divergente' : '';
    return `<tr class="${rowCls}">
      <td style="padding:8px;font-size:11px;color:#888;text-align:center;width:40px">${idx+1}</td>
      <td style="padding:8px;font-family:monospace;font-size:11px;font-weight:700;color:#444;white-space:nowrap">${escH(it.codigo||'—')}</td>
      <td style="padding:8px;font-size:12px;color:#222">${escH(it.descricao||'—')}</td>
      <td style="padding:8px;font-size:11px;color:#888;text-align:center">${escH(it.unidade||'un')}</td>
      <td style="padding:8px;font-size:12px;text-align:right;color:#555">${it.saldoSistema??'—'}</td>
      <td style="padding:8px;text-align:center">
        ${!isEncerrada&&!isPausado
          ? `<input type="number" step="any" class="inv-count-input ${isFilled?'filled':''}"
               id="inp-${it.itemId}" value="${isFilled?it.qtdContada:''}"
               placeholder="0"
               onchange="invSalvarItem('${contagemId}','${it.itemId}',this.value,'')"
               onblur="invSalvarItem('${contagemId}','${it.itemId}',this.value,'')">`
          : `<span style="font-weight:700;color:${isDiv?'#cc2222':'#2d8a4e'}">${isFilled?it.qtdContada:'—'}</span>`}
      </td>
      <td style="padding:8px;font-size:10px;color:#888;text-align:center">${escH(it.contadoPor||'—')}</td>
      ${isEncerrada?`<td style="padding:8px;text-align:center;font-size:12px">${isDiv?'⚠':'✓'}</td>`:'<td></td>'}
    </tr>`;
  }).join('');

  return `<div class="inv-count-wrap">
    <!-- Header -->
    <div class="inv-count-header">
      <button onclick="invVoltarPainel()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px">← Voltar</button>
      <div style="flex:1">
        <div class="inv-count-title">
          <span class="${matCls}" style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;margin-right:8px">${cont.material}</span>
          ${isLP?'Linha de Produção':'Estoque'} · Rodada ${cont.numero}
          ${isEncerrada?'<span style="margin-left:10px;font-size:11px;opacity:.8">✓ Encerrada</span>':''}
        </div>
        <div class="inv-count-sub">${invFmtDate(inv?.iniciadoEm)} · ID ${invId}</div>
      </div>
      <!-- Progresso -->
      <div style="text-align:right;min-width:120px">
        <div style="font-size:11px;opacity:.8;margin-bottom:3px">${contados}/${totalItens} lançados</div>
        <div style="background:rgba(255,255,255,.2);border-radius:999px;height:6px;overflow:hidden">
          <div style="background:#fff;height:100%;width:${pct}%;border-radius:999px;transition:width .3s"></div>
        </div>
        <div style="font-size:10px;opacity:.7;margin-top:2px">${pct}% concluído</div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="inv-count-tbl">
      <table>
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>Código</th>
            <th>Descrição</th>
            <th style="width:50px">Un.</th>
            <th style="width:90px;text-align:right">Sist.</th>
            <th style="width:110px;text-align:center">Contagem</th>
            <th style="width:100px;text-align:center">Contado por</th>
            <th style="width:40px;text-align:center">Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <!-- Footer com ações -->
    <div class="inv-count-footer">
      <div style="font-size:11px;color:#888">
        ${divergentes>0&&isEncerrada?`<span style="color:#cc2222;font-weight:700">⚠ ${divergentes} divergência(s)</span>`:''}
        ${isEncerrada&&divergentes===0?'<span style="color:#2d8a4e;font-weight:700">✓ Sem divergências</span>':''}
      </div>
      ${!isEncerrada&&!isPausado?`
        <button class="sBtn" onclick="invAdicionarItemExtra('${contagemId}')" style="margin-left:auto">+ Item não encontrado</button>
        <button class="mBtn green" onclick="invEncerrarContagem('${contagemId}')" style="margin-left:8px">
          Encerrar contagem ${cont.numero}
        </button>`:
        `<span style="margin-left:auto;font-size:11px;color:#888">${isPausado?'Inventário pausado — retome para editar':''}</span>`}
    </div>
  </div>`;
}


// Seleção múltipla de ajustes pendentes (Set de ids)
let estAjustesSel = new Set();

function estToggleAjusteSel(id){
  if(estAjustesSel.has(id)) estAjustesSel.delete(id);
  else estAjustesSel.add(id);
  // Atualiza só o checkbox e a toolbar sem re-renderizar a página toda
  const cb = document.getElementById('cb-aj-'+id);
  if(cb) cb.checked = estAjustesSel.has(id);
  estUpdateSelToolbar();
}

function estToggleAllAjustes(checked){
  estAjustesSel = checked ? new Set(estPendentesAjuste.map(a=>a.id)) : new Set();
  document.querySelectorAll('.cb-ajuste').forEach(cb => cb.checked = checked);
  estUpdateSelToolbar();
}

function estUpdateSelToolbar(){
  const n = estAjustesSel.size;
  const bar = document.getElementById('ajuste-sel-bar');
  const cbAll = document.getElementById('cb-aj-all');
  if(bar){
    bar.style.display = n ? 'flex' : 'none';
    const lbl = bar.querySelector('.sel-count');
    if(lbl) lbl.textContent = n + ' selecionado' + (n>1?'s':'');
  }
  if(cbAll){
    cbAll.indeterminate = n > 0 && n < estPendentesAjuste.length;
    cbAll.checked = n === estPendentesAjuste.length && n > 0;
  }
}

async function estAprovarSelecionados(aprovado){
  const ids = [...estAjustesSel];
  if(!ids.length) return;
  const acao = aprovado ? 'aprovar' : 'rejeitar';
  if(!confirm(`Deseja ${acao} ${ids.length} ajuste${ids.length>1?'s':''}?`)) return;
  showLoading(aprovado ? 'Aprovando ajustes...' : 'Rejeitando ajustes...');
  try{
    for(const id of ids){
      await estAprovarAjuste(id, aprovado, true); // true = silencioso
    }
    estAjustesSel = new Set();
    hideLoading();
    showToast(`${ids.length} ajuste${ids.length>1?'s':''} ${aprovado?'aprovado':'rejeitado'}${ids.length>1?'s':''}.`,'ok');
    render();
  }catch(e){
    hideLoading();
    showToast('Erro: '+(e.message||e),'err');
  }
}

        <div style="font-size:13px;font-family:Arial;color:#333;margin-bottom:4px">
          Saldo: <b>${fmtN(aj.saldoAtual)}</b> → <b style="color:#1e5a3a">${fmtN(aj.novoSaldo)}</b>
          <span style="margin-left:6px;font-weight:700;color:${(aj.diferenca||0)>0?'#2d8a4e':'#cc2222'}">${(aj.diferenca||0)>0?'▲ +':'▼ '}${fmtN(aj.diferenca)}</span>
        </div>
        <div style="font-size:10px;color:#777;font-family:Arial">
          📋 Solicitado por <b>${escH(aj.solicitante||'—')}</b> em ${aj.criadoEm ? new Date(aj.criadoEm).toLocaleString('pt-BR') : '—'}
        </div>
        <div style="font-size:11px;color:#555;font-family:Arial;font-style:italic;margin-top:3px;padding:5px 8px;background:#fffde7;border-left:3px solid #f5cc6a;border-radius:0 4px 4px 0">
          "${escH((aj.justificativa||'').substring(0,100))}"
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;min-width:100px">
        <button class="mBtn green" onclick="estAprovarAjuste('${aj.id}',true)" style="font-size:11px;width:100%">✓ Aprovar</button>
        <button class="mBtn red"   onclick="estAprovarAjuste('${aj.id}',false)" style="font-size:11px;width:100%">✗ Rejeitar</button>
      </div>
    </div>`).join('')
  : `<div style="font-size:12px;color:#888;font-family:Arial;padding:8px 0">Nenhum ajuste pendente no momento.</div>`;

  return `<div style="padding:12px 16px 14px;background:#fffbf0;border-bottom:2px solid #f5cc6a;margin-bottom:4px">
    <div style="font-size:13px;font-weight:800;color:#7a4f00;font-family:Arial;margin-bottom:10px;display:flex;align-items:center;gap:8px">
      ⏳ Ajustes de saldo — aprovação admin
      ${n ? `<span style="background:#e8a44a;color:#fff;border-radius:999px;padding:2px 10px;font-size:11px;font-weight:800">${n} pendente${n>1?'s':''}</span>` : '<span style="background:#e9f8ee;color:#2d8a4e;border-radius:999px;padding:2px 10px;font-size:11px">✓ Em dia</span>'}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">${rows}</div>
  </div>`;
}

// IMPRESSÃO DO RELATÓRIO DE PEDIDOS
// Corrige botão "Imprimir relatório": antes chamava printReport(), mas a função não existia.
// ============================================================
function printReport(){
  try{
    const beforeTitle = document.title;
    document.title = 'Relatório de Pedidos de Produção - Weiku TEC';

    // Fecha todos os <details> abertos (menu "Mais", dropdowns nativos, etc.)
    const openDetails = Array.from(document.querySelectorAll('details[open]'));
    openDetails.forEach(d => d.removeAttribute('open'));

    // Fecha os dropdowns customizados de filtro
    document.querySelectorAll('.ped-fdrop-menu.open').forEach(m => m.classList.remove('open'));

    // Colapsa a sidebar se estiver expandida
    const appWrap = document.querySelector('.app-wrap');
    const sidebarWasOpen = appWrap && !appWrap.classList.contains('sidebar-collapsed');
    if(sidebarWasOpen && appWrap) appWrap.classList.add('sidebar-collapsed');

    // Aguarda o DOM atualizar antes de chamar print()
    setTimeout(() => {
      window.print();
      // Restaura estado original após a impressão
      setTimeout(() => {
        document.title = beforeTitle;
        openDetails.forEach(d => d.setAttribute('open', ''));
        if(sidebarWasOpen && appWrap) appWrap.classList.remove('sidebar-collapsed');
      }, 500);
    }, 80);
  }catch(err){
    console.error('Erro ao imprimir relatório:', err);
    showToast('Erro ao abrir impressão: ' + (err.message || err), 'err', 5000);
  }
}

window.addEventListener('error', ev => {
  console.error('Erro global:', ev.error || ev.message || ev);
  if(document.readyState !== 'loading') renderFatalScreen(ev.error || new Error(ev.message || 'Erro global não identificado'));
});
window.addEventListener('unhandledrejection', ev => {
  const reason = ev && ev.reason ? ev.reason : new Error('Promise rejeitada sem tratamento');
  console.error('Promise rejeitada:', reason);
  if(document.readyState !== 'loading') renderFatalScreen(reason);
});
